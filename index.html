/* ═══════════════════════════════════════════
   DARK THEME (default)
═══════════════════════════════════════════ */
:root[data-theme="dark"] {
  --bg:#080809; --s1:#101012; --s2:#17171A; --s3:#1F1F24; --s4:#27272D;
  --b1:rgba(255,255,255,0.06); --b2:rgba(255,255,255,0.11); --b3:rgba(255,255,255,0.18);
  --t1:#EDEDF0; --t2:#8A8A9E; --t3:#555568;
  --tapflash:rgba(255,255,255,0.10);
  --work:#4F8EF7; --wlow:rgba(79,142,247,0.12); --wmid:rgba(79,142,247,0.25);
  --personal:#2DD4BF; --plow:rgba(45,212,191,0.12); --pmid:rgba(45,212,191,0.25);
  --danger:#F56565; --dlow:rgba(245,101,101,0.15);
  --warn:#FBBF24; --warnlow:rgba(251,191,36,0.15);
  --success:#34D399; --slow:rgba(52,211,153,0.15);
  --purple:#A78BFA; --purplow:rgba(167,139,250,0.15);
  --a1c:#FF6B6B; --a1low:rgba(255,107,107,0.15);
  --orange:#FB923C; --orangelow:rgba(251,146,60,0.15);
  --school:#F59E0B; --schoollow:rgba(245,158,11,0.15);
  --lesson:#8B5CF6; --lessonlow:rgba(139,92,246,0.15);
  --budget:#EC4899; --budgetlow:rgba(236,72,153,0.15);
  --tabbar-bg:rgba(8,8,9,0.93);
  --card-shadow:0 2px 12px rgba(0,0,0,0.4);
  --overlay:rgba(0,0,0,0.7);
}
/* ═══════════════════════════════════════════
   LIGHT THEME
═══════════════════════════════════════════ */
:root[data-theme="light"] {
  --bg:#FFFFFF; --s1:#FFFFFF; --s2:#F8F9FC; --s3:#EEF0F6; --s4:#E2E5EF;
  --b1:rgba(17,24,39,0.06); --b2:rgba(17,24,39,0.11); --b3:rgba(17,24,39,0.18);
  --t1:#0F172A; --t2:#475569; --t3:#94A3B8;
  --work:#2563EB; --wlow:rgba(37,99,235,0.08); --wmid:rgba(37,99,235,0.16);
  --personal:#059669; --plow:rgba(5,150,105,0.08); --pmid:rgba(5,150,105,0.16);
  --danger:#DC2626; --dlow:rgba(220,38,38,0.08);
  --warn:#D97706; --warnlow:rgba(217,119,6,0.10);
  --success:#059669; --slow:rgba(5,150,105,0.10);
  --purple:#7C3AED; --purplow:rgba(124,58,237,0.10);
  --a1c:#DC2626; --a1low:rgba(220,38,38,0.08);
  --orange:#EA580C; --orangelow:rgba(234,88,12,0.10);
  --school:#B45309; --tapflash:rgba(0,0,0,0.05); --schoollow:rgba(180,83,9,0.10);
  --lesson:#6D28D9; --lessonlow:rgba(109,40,217,0.10);
  --budget:#BE185D; --budgetlow:rgba(190,24,93,0.10);
  --tabbar-bg:rgba(255,255,255,0.96);
  --card-shadow:0 1px 8px rgba(15,23,42,0.08), 0 0 0 1px rgba(15,23,42,0.05);
  --overlay:rgba(0,0,0,0.45);
}


*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body,#root{
  height:100%;
  font-family:'GmarketSans','Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--t1);
}
body{overflow:hidden;font-size:16px;line-height:1.55}
::-webkit-scrollbar{width:0;height:0}
button,input,textarea,select{font-family:inherit}
input,textarea,select{background:none;color:inherit}
input::placeholder,textarea::placeholder{color:var(--t3)}
input:focus,textarea:focus,select:focus{outline:none}
button:focus{outline:none}
button{cursor:pointer}

.press{transition:transform 0.08s ease,opacity 0.08s ease;cursor:pointer}
.press:active{transform:scale(0.96);opacity:0.85}
.no-dim.press:active{opacity:1}

@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet-in{animation:su 0.22s cubic-bezier(0.16,1,0.3,1) forwards}
.fade-in{animation:fi 0.18s ease forwards}
@keyframes faderow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row-in{animation:faderow 0.2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease infinite}
@keyframes tapflash{0%{opacity:0.18}100%{opacity:0}}
.tap-flash::after{content:'';position:absolute;inset:0;border-radius:12px;background:var(--tapflash);animation:tapflash 0.14s ease forwards;pointer-events:none}
@keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.pop-in{animation:popIn 0.18s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

.mono{font-family:'DM Mono',monospace}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--tabbar-bg);
  border-top:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.fab{
  position:fixed;bottom:74px;right:20px;
  width:56px;height:56px;border-radius:28px;
  background:var(--work);border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(79,142,247,0.45);
  z-index:110;cursor:pointer;
  transition:transform 0.12s ease,box-shadow 0.12s ease;
}
.fab:active{transform:scale(0.92);box-shadow:0 2px 10px rgba(79,142,247,0.3)}
.fab.held{transform:scale(1.08);background:#6BA3FF;box-shadow:0 6px 28px rgba(79,142,247,0.6)}
.prog-track{height:4px;border-radius:2px;background:var(--s3);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--success);transition:width 0.4s cubic-bezier(0.16,1,0.3,1)}
.focus-item{display:flex;align-items:center;gap:12px;padding:10px 0}
.focus-item+.focus-item{border-top:1px solid var(--b1)}

/* Swipe */
.swipe-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:6px;user-select:none}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;border-radius:12px;z-index:1}
.swipe-bg-left{justify-content:flex-start;padding-left:16px;gap:8px}
.swipe-bg-right{justify-content:flex-end;padding-right:16px;gap:8px}
.swipe-front{position:relative;border-radius:12px;background:var(--s1);border:1px solid var(--b1);will-change:transform;transition:transform 0.22s cubic-bezier(0.16,1,0.3,1);z-index:2}
.swipe-front.dragging{transition:none}
.swipe-front.snapped{}

.dot{width:5px;height:5px;border-radius:3px;display:inline-block}
.tl-now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);pointer-events:none;z-index:5}
.tl-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:5px;background:var(--danger)}
.energy-dot{width:8px;height:8px;border-radius:4px;display:inline-block;flex-shrink:0}
select{-webkit-appearance:none;appearance:none}

/* Budget gauge */
.budget-gauge{height:12px;border-radius:6px;background:var(--s3);overflow:hidden}
.budget-fill{height:100%;border-radius:6px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}

/* Habit circle */
.habit-circle{width:44px;height:44px;border-radius:22px;border:2.5px solid var(--s4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;font-size:20px}
.habit-circle.done{background:var(--success);border-color:var(--success)}

/* Role banner */
.role-banner{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;
  background:var(--s2);
  border-bottom:1px solid var(--b1);
}

/* Card */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;box-shadow:var(--card-shadow)}

/* Theme transition */
:root{transition:background 0.3s ease,color 0.3s ease}

/* ═══════════════════════════════════════════
   v11.0 DESIGN SYSTEM UPGRADE
═══════════════════════════════════════════ */
:root {
  --fs-title: 24px;
  --fs-section: 13px;
  --fs-card-title: 15px;
  --fs-body: 15px;
  --fs-meta: 12px;
  --fs-badge: 11px;
  --lh-body: 1.6;
  --radius-card: 16px;
  --radius-row: 12px;
  --radius-badge: 8px;
  --spacing-section: 20px;
}
body { font-size: var(--fs-body) !important; line-height: var(--lh-body); }

/* ── 섹션 헤더 ── */
.sec-hdr { display:flex; align-items:center; justify-content:space-between; padding:0 2px; margin-bottom:10px; }
.sec-hdr-left { display:flex; align-items:center; gap:8px; }
.sec-hdr-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.sec-hdr-label { font-size:var(--fs-section); font-weight:800; color:var(--t1); letter-spacing:0.3px; }
.sec-hdr-count { font-size:11px; font-weight:700; color:var(--t2); background:var(--s3); border-radius:20px; padding:2px 8px; min-width:22px; text-align:center; }
.sec-hdr-add { font-size:13px; font-weight:700; color:var(--work); background:var(--wlow); border:none; border-radius:8px; padding:5px 12px; cursor:pointer; }
.sec-hdr-add:active { opacity:0.7; }

/* ── 카드 컨테이너 ── */
.task-card { background:var(--s1); border-radius:var(--radius-card); border:1px solid var(--b1); box-shadow:var(--card-shadow); overflow:hidden; }

/* ── TaskRow 업그레이드 ── */
.task-row { display:flex; align-items:center; gap:12px; padding:14px 16px; position:relative; cursor:pointer; transition:background 0.1s; }
.task-row:active { background:var(--s2); }
.task-row + .task-row { border-top:1px solid var(--b1); }
.task-row-check { width:24px; height:24px; border-radius:12px; flex-shrink:0; border:2px solid; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; }
.task-row-title { font-size:var(--fs-card-title); font-weight:600; color:var(--t1); line-height:1.4; word-break:break-word; }
.task-row-title.done { text-decoration:line-through; color:var(--t3); font-weight:400; }
.task-row-meta { display:flex; align-items:center; gap:6px; margin-top:4px; flex-wrap:wrap; }
.meta-chip { font-size:var(--fs-badge); font-weight:600; border-radius:var(--radius-badge); padding:2px 7px; display:inline-flex; align-items:center; gap:3px; }
.prio-badge { font-size:var(--fs-badge); font-weight:800; border-radius:var(--radius-badge); padding:3px 8px; flex-shrink:0; }

/* ── Focus 카드 ── */
.focus-card-item { display:flex; align-items:center; gap:14px; padding:15px 16px; cursor:pointer; transition:background 0.1s; }
.focus-card-item:active { background:var(--s2); }
.focus-card-item + .focus-card-item { border-top:1px solid var(--b1); }
.focus-num { width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; font-weight:900; }

/* ── AI 패널 ── */
.ai-panel { background:linear-gradient(135deg,var(--wlow),var(--purplow)); border-radius:var(--radius-card); border:1px solid var(--wmid); padding:16px; margin-bottom:var(--spacing-section); }
.ai-panel-title { font-size:13px; font-weight:800; color:var(--work); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.ai-panel-content { font-size:14px; color:var(--t1); line-height:1.6; }
.ai-btn { background:var(--work); color:#fff; border:none; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.ai-btn:active { opacity:0.8; }
.ai-btn.secondary { background:var(--s2); color:var(--t1); border:1px solid var(--b2); }

/* ── 탭 아이템 ── */
.tab-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 0 4px; flex:1; cursor:pointer; border:none; background:none; transition:opacity 0.1s; }
.tab-icon { font-size:22px; line-height:1; }
.tab-label { font-size:10px; font-weight:700; letter-spacing:0.3px; }

/* ── 빈 상태 ── */
.empty-state { padding:24px 16px; text-align:center; color:var(--t3); font-size:13px; display:flex; flex-direction:column; align-items:center; gap:8px; }
.empty-state-icon { font-size:28px; opacity:0.5; }

/* ── 지연 카드 ── */
.overdue-card { background:var(--dlow); border-radius:14px; padding:14px 16px; border:1px solid rgba(220,38,38,0.2); margin-bottom:16px; }
.overdue-item { display:flex; align-items:center; gap:10px; padding:5px 0; cursor:pointer; }
.overdue-item + .overdue-item { border-top:1px solid rgba(220,38,38,0.1); }

/* ── 아코디언 ── */
/* ═══════════════════════════════════════════
   v19 CARD MODULE DESIGN SYSTEM
═══════════════════════════════════════════ */
/* ── 모듈 카드 (섹션 단위 컨테이너) ── */
.mod-card {
  background: var(--s1);
  border-radius: 20px;
  border: 1px solid var(--b1);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  margin-bottom: 14px;
}
.mod-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--b1);
}
.mod-card-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.mod-card-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.mod-card-title {
  font-size: 14px; font-weight: 800;
  color: var(--t1); letter-spacing: -0.2px;
}
.mod-card-subtitle {
  font-size: 11px; color: var(--t2); margin-top: 1px;
}
.mod-card-badge {
  font-size: 11px; font-weight: 700;
  background: var(--s3); color: var(--t2);
  border-radius: 20px; padding: 3px 9px;
}
.mod-card-action {
  font-size: 12px; font-weight: 700;
  color: var(--work); background: var(--wlow);
  border: none; border-radius: 8px;
  padding: 5px 12px; cursor: pointer;
}
.mod-card-action:active { opacity: 0.7; }
.mod-card-body { padding: 0; }
.mod-card-body.padded { padding: 14px 16px; }
.mod-card-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: center;
}
.mod-card-footer-btn {
  font-size: 12px; font-weight: 700; color: var(--t2);
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
/* ── 통계 그리드 카드 ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--b1);
}
.stat-grid-2 { grid-template-columns: repeat(2, 1fr); }
.stat-grid-4 { grid-template-columns: repeat(4, 1fr); }
.stat-cell {
  background: var(--s1);
  padding: 14px 12px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.stat-cell-value {
  font-size: 22px; font-weight: 900;
  letter-spacing: -1px; color: var(--t1);
}
.stat-cell-label {
  font-size: 10px; font-weight: 600;
  color: var(--t2); text-align: center;
}
/* ── 진행률 바 카드 ── */
.progress-bar-wrap {
  height: 8px; background: var(--s3);
  border-radius: 6px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 6px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
/* ── 수평 스크롤 칩 행 ── */
.chip-scroll {
  display: flex; gap: 8px;
  overflow-x: auto; padding: 12px 16px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chip-scroll::-webkit-scrollbar { display: none; }
.chip-btn {
  flex-shrink: 0; padding: 7px 14px;
  border-radius: 20px; border: 1.5px solid var(--b2);
  background: transparent; font-size: 12px; font-weight: 700;
  color: var(--t2); cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.chip-btn.active {
  background: var(--work); color: #fff;
  border-color: var(--work);
}
/* ── 리스트 아이템 (카드 내부) ── */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; cursor: pointer;
  transition: background 0.1s;
}
.list-item:active { background: var(--s2); }
.list-item + .list-item { border-top: 1px solid var(--b1); }
.list-item-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.list-item-content { flex: 1; min-width: 0; }
.list-item-title {
  font-size: 14px; font-weight: 600; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.list-item-meta { font-size: 11px; color: var(--t2); margin-top: 2px; }
.list-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
/* ── 빠른 액션 버튼 그리드 ── */
.quick-actions {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 14px 16px;
}
.quick-action-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  padding: 12px 4px; border-radius: 14px;
  border: 1px solid var(--b1); background: var(--s2);
  cursor: pointer; transition: all 0.15s;
}
.quick-action-btn:active { transform: scale(0.95); }
.quick-action-icon { font-size: 20px; }
.quick-action-label { font-size: 10px; font-weight: 700; color: var(--t2); }
/* ── 가족 멤버 아바타 카드 ── */
.member-card {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  padding: 16px 12px; border-radius: 16px;
  background: var(--s2); border: 1px solid var(--b1);
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  min-width: 80px;
}
.member-card:active { transform: scale(0.96); }
.member-avatar {
  width: 48px; height: 48px; border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; border: 2px solid var(--b2);
}
.member-name { font-size: 12px; font-weight: 700; color: var(--t1); }
.member-progress { font-size: 10px; color: var(--t2); }
/* ── 날짜 네비게이터 ── */
.date-nav {

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useContext,createContext,useCallback,useReducer}=React;

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
let _uid=0;
function uid(){return 'id_'+(++_uid)+'_'+Math.random().toString(36).slice(2,7)}

// v8.8: human-friendly lessonId (slug)
function slugifyBase(s){
  return String(s||'')
    .toLowerCase()
    .trim()
    .replace(/[\s_]+/g,'-')
    .replace(/[^a-z0-9\-]/g,'')
    .replace(/\-+/g,'-')
    .replace(/^\-+|\-+$/g,'');
}
function suggestLessonSlug(title){
  const t=String(title||'').toLowerCase();
  // quick mapping for common korean lesson names
  if(t.includes('피아노')) return 'piano';
  if(t.includes('영어')) return 'eng';
  if(t.includes('수학')) return 'math';
  if(t.includes('국어')) return 'kor';
  if(t.includes('미술')) return 'art';
  if(t.includes('코딩')||t.includes('프로그')) return 'coding';
  const base=slugifyBase(t);
  return base || 'lesson';
}
function generateLessonId(base, existingIds){
  const b=slugifyBase(base) || 'lesson';
  const set=new Set(existingIds||[]);
  if(!set.has(b)) return b+'-1';
  // if base already has -n, still generate base-n
  let i=1;
  while(set.has(`${b}-${i}`)) i++;
  return `${b}-${i}`;
}
const TASK_TYPES=[
  {value:'deepwork',label:'딥워크',icon:'🎯'},
  {value:'task',label:'할일',icon:'✓'},
  {value:'shopping',label:'쇼핑',icon:'🛒'},
  {value:'exercise',label:'운동',icon:'💪'},
  {value:'call',label:'전화',icon:'📞'},
  {value:'research',label:'연구',icon:'🔬'},
  {value:'homework',label:'숙제',icon:'📝'},
  {value:'researchinfo',label:'리서치',icon:'🔍'},
  {value:'reading',label:'독서',icon:'📚'},
  {value:'meeting',label:'미팅',icon:'👥'},
  {value:'lesson',label:'레슨',icon:'🎓'},
];
function todayStr(){
  const d=new Date();
  const yy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${yy}-${mm}-${dd}`;
}

// ───────────────────────────────────────────
// ROLE / LESSON SCOPE HELPERS (v8)
// ──────────────────────────────────────────
function homeworkSummaryForPost(data, postId){
  const arr=(data.homeworks||[]).filter(hw=>hw.sourcePostId===postId);
  const total=arr.length;
  const done=arr.filter(h=>Number(h.progress||0)>=100 || h.status==='done').length;
  return {total, done};
}

function me(d){return d.familyMembers.find(m=>m.id===d.settings.currentUserId);}
function myRole(d){return me(d)?.role||'parent';}
function myLessonIds(d){
  const m=me(d);
  if(!m) return [];
  if(m.role==='teacher') return m.lessonIds||[];
  if(m.role==='child') return d.lessons.filter(L=>L.studentIds?.includes(m.id)).map(L=>L.id);
  return d.lessons.map(L=>L.id);
}
function canAccessLesson(d,lessonId){return myLessonIds(d).includes(lessonId);}
function visiblePosts(d){
  const role=myRole(d);
  const allowed=new Set(myLessonIds(d));
  return (d.posts||[]).filter(p=>{
    if(p.scopeType==='family') return role==='parent';
    if(p.scopeType==='lesson') return allowed.has(p.lessonId);
    return false;
  });
}
function visibleMaterials(d){
  const role=myRole(d);
  const allowed=new Set(myLessonIds(d));
  return (d.materials||[]).filter(m=>{
    if(m.scopeType==='family') return role==='parent';
    if(m.scopeType==='lesson') return allowed.has(m.lessonId);
    return false;
  });
}
function visibleHomeworks(d){
  const role=myRole(d);
  const allowed=new Set(myLessonIds(d));
  const u=me(d);
  return (d.homeworks||[]).filter(hw=>{
    if(!hw.lessonId) return role==='parent';
    if(!allowed.has(hw.lessonId)) return false;
    if(role==='child') return hw.assigneeId===u?.id;
    return true; // parent/teacher within scope
  });
}
function normTags(x){if(!x) return []; if(Array.isArray(x)) return x; return String(x).split(',').map(s=>s.trim()).filter(Boolean);}
function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}
function p2(n){return String(n).padStart(2,'0')}
function addDays(dateStr,days){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d+days);
  return `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`;
}
function fmt(dateStr){
  if(!dateStr)return{m:0,d:0,day:'',full:''};
  const [y,m,d]=dateStr.split('-').map(Number);
  const days=['일','월','화','수','목','금','토'];
  const dt=new Date(y,m-1,d);
  return{m,d,day:days[dt.getDay()],full:`${m}월 ${d}일 (${days[dt.getDay()]})`,dow:dt.getDay()};
}
function toMin(hhmm){if(!hhmm)return 0;const [h,m]=hhmm.split(':').map(Number);return h*60+(m||0)}
function toHHMM(min){return `${p2(Math.floor(min/60))}:${p2(min%60)}`}
function relativeDay(dateStr){
  const today=todayStr();
  if(dateStr===today)return'오늘';
  if(dateStr===addDays(today,1))return'내일';
  if(dateStr===addDays(today,-1))return'어제';
  const f=fmt(dateStr);
  return `${f.m}/${f.d}(${f.day})`;
}
function daysBetween(a,b){
  const [ay,am,ad]=a.split('-').map(Number);
  const [by,bm,bd]=b.split('-').map(Number);
  const da=new Date(ay,am-1,ad).getTime();
  const db=new Date(by,bm-1,bd).getTime();
  return Math.round((db-da)/86400000);
}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function nowHHMM(){const d=new Date();return `${p2(d.getHours())}:${p2(d.getMinutes())}`}
function fmtMoney(n){return n.toLocaleString('ko-KR')+'원'}

/* ═══════════════════════════════════════════
   SIGNAL / BUCKET UTILS
═══════════════════════════════════════════ */
function importanceOf(t){if(t.priority===1)return'A';if(t.priority===2)return'B';return'C'}
function urgencyOf(t,today){
  const d=t.deadlineDate||t.dueDate;
  if(!d)return 3;
  const diff=daysBetween(today,d);
  if(diff<=1)return 1;if(diff<=3)return 2;return 3;
}
function bucketOf(t,today){return importanceOf(t)+''+urgencyOf(t,today)}
function bucketSortKey(b){const imp=b[0]==='A'?0:b[0]==='B'?1:2;return imp*10+(Number(b[1])-1)}
const ALL_BUCKETS=['A1','A2','A3','B1','B2','B3','C1','C2','C3'];

/* ═══════════════════════════════════════════
   DEPENDENCY PARSING
═══════════════════════════════════════════ */
function parseDeps(notes){
  if(!notes)return[];
  const re=/^(선행|depends_on|prereq)\s*:\s*([^\n]+)/im;
  const m=(notes||'').match(re);
  if(!m)return[];
  return m[2].split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
}
function upsertDepsInNotes(notes,depIds){
  const lines=(notes||'').split('\n');
  const next=lines.filter(l=>!/^(선행|depends_on|prereq)\s*:/i.test(l.trim()));
  if(depIds.length)next.unshift('선행: '+[...new Set(depIds)].join(', '));
  return next.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function buildDepGraph(tasks){
  const depsByTaskId=new Map();
  const dependentsByTaskId=new Map();
  const existing=new Set(tasks.filter(t=>!t.deletedAt).map(t=>t.id));
  for(const t of tasks){
    if(t.deletedAt)continue;
    const deps=parseDeps(t.notes).filter(id=>existing.has(id));
    depsByTaskId.set(t.id,deps);
    for(const depId of deps){
      const arr=dependentsByTaskId.get(depId)||[];
      arr.push(t.id);
      dependentsByTaskId.set(depId,arr);
    }
  }
  return{depsByTaskId,dependentsByTaskId};
}

/* ═══════════════════════════════════════════
   HEURISTIC TRIAGE
═══════════════════════════════════════════ */
const KW_RISK=['계약','자금','대출','등기','세금','분양','착공','준공','소송','민원','투자','법인','허가'];
const KW_URGENT=['오늘','내일','긴급','당장','마감','회신','제출','즉시','바로'];
const KW_DEEP=['작성','기획','전략','검토','분석','제안서','계약서','보고서','설계','연구','정리','구현'];
const KW_CALL=['전화','콜','통화','연락','회신','미팅','회의'];
const KW_ERRAND=['방문','현장','이동','픽업','구매','배달','수령'];
function includesAny(text,words){const t=(text||'').toLowerCase();return words.some(w=>t.includes(w.toLowerCase()))}
function heuristicTriage(title,today){
  let type='admin';
  if(includesAny(title,KW_DEEP))type='deepwork';
  if(includesAny(title,KW_CALL))type='call';
  if(includesAny(title,KW_ERRAND))type='errand';
  let dur=30;
  if(type==='deepwork')dur=90;
  if(type==='errand')dur=60;
  if(type==='call')dur=30;
  let priority=3;
  if(includesAny(title,KW_RISK))priority=1;
  else if(includesAny(title,KW_URGENT))priority=1;
  else if(type==='deepwork')priority=2;
  let dueDate=null;
  if(includesAny(title,KW_URGENT))dueDate=today;
  return{type,durationMin:dur,priority,dueDate};
}

/* ═══════════════════════════════════════════
   PROMOTION REASON
═══════════════════════════════════════════ */
function computePromotionReason(task,allTasks,today){
  let score=0;const bullets=[];
  const d=task.deadlineDate||task.dueDate;
  if(d){
    const diff=daysBetween(today,d);
    if(diff<=0){score+=60;bullets.push('마감/실행일이 오늘이거나 지연 → 지금 처리 가치 매우 큼');}
    else if(diff<=1){score+=45;bullets.push('내일까지 영향 → 미루면 일정 깨질 확률 큼');}
    else if(diff<=3){score+=25;bullets.push('3일 이내 마감 → 이번 주 초반 처리 유리');}
    else{score+=10;bullets.push('마감은 여유 있으나 선제 처리로 리스크 감소');}
  }else{score+=8;bullets.push('명시 마감 없음 → 리스크/의존성 기반 선제 처리 후보');}
  const riskHit=KW_RISK.filter(w=>task.title.includes(w));
  if(riskHit.length){score+=35;bullets.push('리스크/금액 키워드: '+riskHit.slice(0,3).join(', '));}
  const graph=buildDepGraph(allTasks);
  const deps=(graph.dependentsByTaskId.get(task.id)||[]);
  const byId=new Map(allTasks.map(t=>[t.id,t]));
  const activeDeps=deps.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt&&t.status!=='done');
  if(activeDeps.length){
    let pressure=0;
    for(const dt of activeDeps){
      const dd2=dt.deadlineDate||dt.dueDate;
      if(dd2){const diff=daysBetween(today,dd2);pressure+=diff<=0?30:diff<=1?22:diff<=3?14:8;}
      else pressure+=4;
    }
    const bonus=Math.min(30,activeDeps.length*6+Math.round(pressure/10));
    score+=bonus;
    bullets.push(`병목: 후행 ${activeDeps.length}개 대기 → ${activeDeps.slice(0,2).map(t=>t.title).join(', ')}`);
  }
  if(task.type==='deepwork'){score+=12;bullets.push('딥워크 → 90분 블록 확보 필요');}
  else if(task.type==='call'){score+=10;bullets.push('콜/회신 → 짧게 처리하면 대기 감소');}
  const dur=task.durationMin||30;
  if(dur>=120){score-=6;bullets.push('2시간+ → 오늘은 1개만 배치 권장');}
  else if(dur>=60){score+=6;bullets.push('1시간 내외 → 오늘 타임라인 배치 적합');}
  else{score+=8;bullets.push('30분 내외 → 오늘 끝내기 좋은 퀵윈');}
  return{score:clamp(score,0,100),bullets:bullets.slice(0,4)};
}

/* ═══════════════════════════════════════════
   SCHEDULER v3 — improved clustering + insights
═══════════════════════════════════════════ */
const MEETING_GAP=30;
function mergeBusy(busy){
  const arr=busy.slice().sort((a,b)=>a.start-b.start);
  const out=[];
  for(const s of arr){const l=out[out.length-1];if(l&&s.start<=l.end)l.end=Math.max(l.end,s.end);else out.push({...s});}
  return out;
}
function clusterBusy(busy){
  const merged=mergeBusy(busy);
  if(merged.length<=1)return merged;
  const out=[];let cur={...merged[0]};
  for(let i=1;i<merged.length;i++){
    const nxt=merged[i];
    if(nxt.start-cur.end<=MEETING_GAP)cur.end=Math.max(cur.end,nxt.end);
    else{out.push(cur);cur={...nxt};}
  }
  out.push(cur);return out;
}
function subtractBusy(free,busy){
  let out=[...free];
  for(const b of busy){
    const next=[];
    for(const s of out){
      if(b.end<=s.start||b.start>=s.end){next.push(s);continue;}
      if(b.start>s.start)next.push({start:s.start,end:b.start});
      if(b.end<s.end)next.push({start:b.end,end:s.end});
    }
    out=next.filter(s=>s.end>s.start);
  }
  return out;
}
function splitIntoSlots(ranges,slotMin){
  const out=[];
  for(const r of ranges){let c=r.start;while(c+slotMin<=r.end){out.push({start:c,end:c+slotMin});c+=slotMin;}}
  return out;
}
function overlapMin(r,windows){
  let s=0;
  for(const w of windows)s+=Math.max(0,Math.min(r.end,w.end)-Math.max(r.start,w.start));
  return s;
}
function findBestRun(slots,needMin,deepWindows,preferDeep){
  if(!slots.length)return null;
  const slotLen=slots[0]?slots[0].end-slots[0].start:30;
  if(slotLen<=0)return null;
  const needSlots=Math.ceil(needMin/slotLen);
  let best=null,bestScore=-1e9;
  for(let i=0;i<slots.length;i++){
    let end=slots[i].end,count=1;
    const start=slots[i].start;
    for(let j=i+1;j<slots.length&&slots[j].start===end;j++){end=slots[j].end;count++;}
    if(count>=needSlots){
      const run={start,end:start+needSlots*slotLen};
      let sc=preferDeep&&deepWindows?overlapMin(run,deepWindows)*2:0;
      sc+=(1000-start);
      if(sc>bestScore){bestScore=sc;best=run;}
    }
  }
  return best;
}
function consumeRun(slots,run){
  return slots.filter(s=>{
    const ov=Math.min(s.end,run.end)-Math.max(s.start,run.start);
    return ov<=0;
  });
}
function scoreTask(t,date){
  let s=(4-(t.priority||3))*100;
  if(t.dueDate===date)s+=90;
  if(t.deadlineDate){const dl=daysBetween(date,t.deadlineDate);s+=clamp(220-25*dl,-100,220);}
  if(t.type==='deepwork')s+=60;
  if(!t.durationMin)s-=120;
  return s;
}
function scheduleDayV3({date,tasks,events,existingBlocks,settings}){
  const ws=toMin(settings.workdayStart||'09:00');
  const we=toMin(settings.workdayEnd||'18:00');
  const ls=toMin(settings.lunchStart||'12:00');
  const le=toMin(settings.lunchEnd||'13:00');
  const slotMin=settings.slotMin||30;
  const deepWin=(settings.deepWorkWindows||[{start:'10:00',end:'12:00'},{start:'14:00',end:'16:00'}])
    .map(w=>({start:toMin(w.start),end:toMin(w.end)}));

  const eventBusy=(events||[]).filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===date)
    .map(e=>({start:toMin((e.startDateTime||'').slice(11,16)),end:toMin((e.endDateTime||'').slice(11,16))}))
    .filter(e=>e.start<e.end);

  const fixedBusy=(existingBlocks||[]).filter(b=>!b.deletedAt&&b.date===date&&!b.linkedTaskId)
    .map(b=>({start:toMin(b.startTime),end:toMin(b.endTime)}))
    .filter(b=>b.start<b.end);

  const rawBusy=[{start:ls,end:le},...eventBusy,...fixedBusy];
  const busy=clusterBusy(rawBusy);
  const freeRanges=subtractBusy([{start:ws,end:we}],busy);
  let freeSlots=splitIntoSlots(freeRanges,slotMin);
  const totalFreeMin=freeRanges.reduce((s,r)=>s+(r.end-r.start),0);

  const eligible=(tasks||[]).filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&t.durationMin>0)
    .filter(t=>(t.dueDate?t.dueDate<=date:true));

  const sortBySc=(arr)=>arr.slice().map(t=>({t,s:scoreTask(t,date)})).sort((a,b)=>b.s-a.s).map(x=>x.t);
  const deepTasks=sortBySc(eligible.filter(t=>t.type==='deepwork'));
  const otherTasks=sortBySc(eligible.filter(t=>t.type!=='deepwork'));

  const proposed=[];
  const skipped=[];

  function tryPlace(t,preferDeep){
    const dur=t.durationMin||30;
    const run=findBestRun(freeSlots,dur,deepWin,preferDeep);
    if(!run){skipped.push(t);return;}
    const actualEnd=Math.min(run.start+dur,run.end);
    proposed.push({
      id:uid(),date,
      startTime:toHHMM(run.start),
      endTime:toHHMM(actualEnd),
      title:t.title,domain:'work',
      linkedTaskId:t.id,
      createdAt:Date.now(),updatedAt:Date.now()
    });
    freeSlots=consumeRun(freeSlots,{start:run.start,end:actualEnd});
  }

  for(const t of deepTasks)tryPlace(t,true);
  for(const t of otherTasks)tryPlace(t,false);

  const deepWorkMin=proposed.filter(b=>{
    const t=eligible.find(t=>t.id===b.linkedTaskId);
    return t&&t.type==='deepwork';
  }).reduce((s,b)=>s+(toMin(b.endTime)-toMin(b.startTime)),0);

  const insights=[];
  if(deepWorkMin>=90)insights.push({type:'success',msg:`딥워크 ${deepWorkMin}분 확보됨`});
  else if(deepWorkMin>0)insights.push({type:'warn',msg:`딥워크 ${deepWorkMin}분 (90분 미달)`});
  else insights.push({type:'warn',msg:'딥워크 블록 없음 — 내일 재시도 권장'});
  if(skipped.length)insights.push({type:'info',msg:`${skipped.length}개 미배치 (시간 부족)`});
  if(proposed.length===0)insights.push({type:'info',msg:'배치할 태스크가 없거나 시간이 부족합니다'});

  return{
    proposedBlocks:proposed,
    movedBlocks:[],
    skippedTasks:skipped,
    insights,
    diagnostics:{freeMinutes:totalFreeMin,deepWorkMin,placedCount:proposed.length,skippedCount:skipped.length}
  };
}

/* ═══════════════════════════════════════════
   DDAY META UTILITY (BoardPage에서 사용)
═══════════════════════════════════════════ */
function ddayMeta(today, targetDate){
  if(!targetDate) return null;
  const diff = daysBetween(today, targetDate);
  if(diff < 0) return { label: `D+${Math.abs(diff)} 지연`, tone: 'danger' };
  if(diff === 0) return { label: 'D-Day', tone: 'danger' };
  if(diff === 1) return { label: 'D-1', tone: 'warn' };
  if(diff <= 3) return { label: `D-${diff}`, tone: 'warn' };
  return { label: `D-${diff}`, tone: 'normal' };
}
/* ═══════════════════════════════════════════
   BUDGET AI INSIGHTS (heuristic)
═══════════════════════════════════════════ */
function computeBudgetInsights(expenses,budget,month){
  const monthExp=expenses.filter(e=>e.date&&e.date.startsWith(month)&&!e.deletedAt);
  const total=monthExp.reduce((s,e)=>s+e.amount,0);
  const pct=budget>0?Math.round((total/budget)*100):0;
  const today=todayStr();
  const [y,m]=month.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const dayOfMonth=parseInt(today.split('-')[2]);
  const remaining=budget-total;
  const daysLeft=daysInMonth-dayOfMonth;
  const dailyBudget=daysLeft>0?Math.round(remaining/daysLeft):0;

  // Category breakdown
  const catMap={};
  for(const e of monthExp){
    catMap[e.category]=(catMap[e.category]||0)+e.amount;
  }
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Anomalies (expenses > 2x average)
  const avg=monthExp.length>0?total/monthExp.length:0;
  const anomalies=monthExp.filter(e=>e.amount>avg*2.5&&e.amount>50000).slice(0,2);

  // Burn rate
  const burnRate=dayOfMonth>0?Math.round(total/dayOfMonth):0;
  const projectedTotal=burnRate*daysInMonth;
  const overBudget=projectedTotal>budget;

  return{total,pct,remaining,daysLeft,dailyBudget,topCats,anomalies,burnRate,projectedTotal,overBudget};
}

const STORE_KEY='flow_v11_bugfix'; // v10: 목업 데이터 제거 - 기존 캐시 무효화
const SESSION_KEY='flow_session_user';
function getSessionUserId(){
  try{
    return sessionStorage.getItem(SESSION_KEY) || null;
  }catch(e){return null;}
}
function setSessionUserId(uid){
  try{
    if(uid) sessionStorage.setItem(SESSION_KEY, uid);
    else sessionStorage.removeItem(SESSION_KEY);
  }catch(e){}
}

function loadData(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      // Merge with seed to ensure all fields exist
      return{
        ...SEED,...parsed,
        settings:{...SEED.settings,...(parsed.settings||{})},
        familyMembers:parsed.familyMembers||SEED.familyMembers,
        lessons:(parsed.lessons||SEED.lessons).map(L=>({...L, active: L.active!==false})),
        announcements:parsed.announcements||SEED.announcements,
        homeworks:parsed.homeworks||SEED.homeworks,
        expenses:parsed.expenses||SEED.expenses,
        budget:parsed.budget||SEED.budget,
        notes:parsed.notes||SEED.notes,
      };
    }
  }catch(e){}
  return {...SEED, lessons:(SEED.lessons||[]).map(L=>({...L, active: L.active!==false}))};
}
function sanitizeForPersist(d){
  const s={...(d.settings||{})};
  delete s.currentUserId;
  delete s.sessionUserId;
  return{...d,settings:s};
}
function saveData(data){
  const toSave=sanitizeForPersist(data);
  // localStorage (로컬 캐시)
  try{localStorage.setItem(STORE_KEY,JSON.stringify(toSave));}catch(e){}
  // Firebase Realtime Database (실시간 동기화)
  if(window._fbReady && window._fbDb){
    try{
      window._fbDb.ref('flowdata').set(toSave);
    }catch(e){console.warn('Firebase save error',e);}
  }
}

function AppProvider({children}){

    const d=loadData();
    const sess=getSessionUserId();
    const remember=d.settings?.rememberLogin && d.settings?.sessionUserId;
    d.settings.currentUserId = sess || (remember? d.settings.sessionUserId : null);
    return d;
  });
  const [toasts,setToasts]=useState([]);
  const lastSavedRef=useRef(null);

  useEffect(()=>{
    const persistObj=sanitizeForPersist(data);
    const persistJson=JSON.stringify(persistObj);
    if(lastSavedRef.current===persistJson) return; // 변경없으면 저장 안 함
    lastSavedRef.current=persistJson;
    saveData(data);
    // 다른 탭/창에 실시간 동기화 신호
    try{localStorage.setItem(STORE_KEY+'_ts', Date.now().toString());}catch(e){}
  },[data]);

  // Firebase 초기 데이터 로드: Firebase에 데이터가 있으면 가져와서 localStorage 덮어쓰기
  useEffect(()=>{
    if(!window._fbReady || !window._fbDb) return;
    window._fbDb.ref('flowdata').once('value').then(snap=>{
      const remote=snap.val();
      if(remote){
        // Firebase에 데이터가 있으면 로컬 데이터를 Firebase 데이터로 교체
        const merged={
          ...SEED,...remote,
          settings:{...SEED.settings,...(remote.settings||{})},
          familyMembers:remote.familyMembers||SEED.familyMembers,
          authUsers:remote.authUsers||SEED.authUsers,
        };
        try{localStorage.setItem(STORE_KEY,JSON.stringify(merged));}catch(e){}
        setData(d=>({...merged,settings:{...merged.settings,currentUserId:d.settings.currentUserId,sessionUserId:d.settings.sessionUserId,rememberLogin:d.settings.rememberLogin}}));
      }
      // Firebase가 비어있으면 아무것도 올리지 않음 (빈 상태 유지)
    });
  },[]);

  // 실시간 업데이트: Firebase onValue + storage 이벤트 (같은 기기 다른 탭)
  useEffect(()=>{
    let fbUnsub=null;
    // Firebase 실시간 리스너
    if(window._fbReady && window._fbDb){
      const fbRef=window._fbDb.ref('flowdata');
      fbUnsub=fbRef.on('value',(snapshot)=>{
        const remote=snapshot.val();
        if(!remote) return;
        const remoteJson=JSON.stringify(remote);
        if(remoteJson===lastSavedRef.current) return;
        // 원격 데이터와 SEED 병합
        const merged={
          ...SEED,...remote,
          settings:{...SEED.settings,...(remote.settings||{})},
          familyMembers:remote.familyMembers||SEED.familyMembers,

          expenses:remote.expenses||SEED.expenses,
          budget:remote.budget||SEED.budget,
          notes:remote.notes||SEED.notes,
        };
        const mergedJson=JSON.stringify(merged);
        if(mergedJson===lastSavedRef.current) return;
        lastSavedRef.current=mergedJson;
        // localStorage도 업데이트
        try{localStorage.setItem(STORE_KEY,JSON.stringify(merged));}catch(e){}
        setData(d=>({...merged,settings:{...merged.settings,currentUserId:d.settings.currentUserId,sessionUserId:d.settings.sessionUserId,rememberLogin:d.settings.rememberLogin}}));
      });
    }
    // 같은 기기 다른 탭 동기화 (storage 이벤트)
    let lastTs=localStorage.getItem(STORE_KEY+'_ts')||'0';
    function checkLocalUpdate(){
      const ts=localStorage.getItem(STORE_KEY+'_ts')||'0';
      if(ts!==lastTs){
        lastTs=ts;
        const fresh=loadData();
        const freshJson=JSON.stringify(fresh);

          setData(d=>({...fresh,settings:{...fresh.settings,currentUserId:d.settings.currentUserId,sessionUserId:d.settings.sessionUserId,rememberLogin:d.settings.rememberLogin}}));
        }
      }
    }
    window.addEventListener('storage',checkLocalUpdate);
    return ()=>{
      if(fbUnsub && window._fbDb) window._fbDb.ref('flowdata').off('value',fbUnsub);
      window.removeEventListener('storage',checkLocalUpdate);
    };

      const due = p.dueDate || addDays(todayStr(), 3);

      const created = students.map(sid=>({
        id:uid(),
        sourcePostId:p.id,
        lessonId:p.lessonId,
        assigneeId:sid,
        title:p.title,
        notes:p.body,
        status:'todo',
        progress:0,
        dueDate:due,
        createdAt:now
      }));

      nextHomeworks=[...nextHomeworks, ...created];
      showToast(`숙제 자동 생성: ${students.length}명`,'success');
    }

    return {...d,posts:nextPosts,homeworks:nextHomeworks};
  });

  return p;
}

function addExpense(exp){
    const e={id:uid(),createdAt:Date.now(),...exp};
    setData(d=>({...d,expenses:[e,...d.expenses]}));
    showToast('지출 기록됨','success');
  }
  function deleteExpense(id){
    setData(d=>({...d,expenses:d.expenses.map(e=>e.id===id?{...e,deletedAt:Date.now()}:e)}));
  }
  function updateBudget(patch){
    setData(d=>({...d,budget:{...d.budget,...patch}}));
  }

  // Notes
  function addNote(note){
    const n={id:uid(),type:'note',tags:[],createdAt:Date.now(),...note};
    setData(d=>({...d,notes:[n,...d.notes]}));
    showToast('노트 저장됨','success');
  }
  function deleteNote(id){
    setData(d=>({...d,notes:d.notes.filter(n=>n.id!==id)}));
  }

  // Reset
  function resetData(){
    setData(SEED);
    showToast('데이터 초기화됨');
  }

  // Lessons (Admin)
  function addLesson(lesson){
    const now=Date.now();
    const l={id:('l'+(Math.random().toString(16).slice(2,6))+now.toString(16).slice(-2)), title:'레슨', teacherId:null, studentIds:[], createdAt:now, ...lesson};
    setData(d=>{
      const lessons=[...(d.lessons||[]), l];
      let familyMembers=[...(d.familyMembers||[])];
      if(l.teacherId){
        familyMembers=familyMembers.map(m=>{
          if(m.id!==l.teacherId) return m;
          const ids=new Set(m.lessonIds||[]); ids.add(l.id);
          return {...m, lessonIds:[...ids]};
        });
      }
      return {...d, lessons, familyMembers};
    });
    showToast('레슨 생성됨','success');
    return l;
  }
  function updateLesson(id, patch){
    setData(d=>{
      const lessons=(d.lessons||[]).map(L=>L.id===id?{...L,...patch,updatedAt:Date.now()}:L);
      return {...d, lessons};
    });
  }
  function deleteLesson(id, opts={cascade:false}){
    setData(d=>{
      const lessons=(d.lessons||[]).filter(L=>L.id!==id);
      const familyMembers=(d.familyMembers||[]).map(m=>{
        if(!m.lessonIds) return m;
        return {...m, lessonIds:(m.lessonIds||[]).filter(x=>x!==id)};
      });

      if(!opts?.cascade){
        return {...d, lessons, familyMembers};
      }

      // cascade delete: lesson-scoped resources
      const postsToDelete = new Set((d.posts||[]).filter(p=>p.lessonId===id).map(p=>p.id));
      const posts = (d.posts||[]).filter(p=>p.lessonId!==id);
      const comments = (d.comments||[]).filter(c=>!postsToDelete.has(c.postId));
      const materials = (d.materials||[]).filter(m=>m.lessonId!==id);

      // homework arrays may be named homeworks or tasks w/ lessonId
      const homeworks = (d.homeworks||[]).filter(hw=>hw.lessonId!==id);
      const tasks = (d.tasks||[]).filter(t=>t.lessonId!==id);

      return {...d, lessons, familyMembers, posts, comments, materials, homeworks, tasks};
    });
    showToast(opts?.cascade ? '레슨+관련 데이터 삭제됨' : '레슨 삭제됨', 'info');
  }
  function getLessonCascadeCounts(d, lessonId){
    const posts = (d.posts||[]).filter(p=>p.lessonId===lessonId);
    const postIds = new Set(posts.map(p=>p.id));
    const comments = (d.comments||[]).filter(c=>postIds.has(c.postId));
    const materials = (d.materials||[]).filter(m=>m.lessonId===lessonId);
    const homeworks = (d.homeworks||[]).filter(hw=>hw.lessonId===lessonId);
    const tasks = (d.tasks||[]).filter(t=>t.lessonId===lessonId);
    return { posts:posts.length, comments:comments.length, materials:materials.length, homeworks:homeworks.length, tasks:tasks.length };
  }
  function setLessonActive(lessonId, active){
    updateLesson(lessonId, { active: !!active });
    showToast(active ? '레슨 복원됨' : '레슨 아카이브됨', 'info');
  }
  function setLessonTeacher(lessonId, teacherId){
    setData(d=>{
      const prev = (d.lessons||[]).find(L=>L.id===lessonId);
      const lessons=(d.lessons||[]).map(L=>L.id===lessonId?{...L,teacherId,updatedAt:Date.now()}:L);
      let familyMembers=[...(d.familyMembers||[])];
      if(prev?.teacherId){
        familyMembers=familyMembers.map(m=>m.id===prev.teacherId?{...m, lessonIds:(m.lessonIds||[]).filter(x=>x!==lessonId)}:m);
      }
      if(teacherId){
        familyMembers=familyMembers.map(m=>{
          if(m.id!==teacherId) return m;
          const ids=new Set(m.lessonIds||[]); ids.add(lessonId);
          return {...m, lessonIds:[...ids]};
        });
      }
      return {...d, lessons, familyMembers};
    });
  }
  function setLessonStudents(lessonId, studentIds){
    updateLesson(lessonId, {studentIds:[...new Set(studentIds)]});
  }

  const currentUser=data.familyMembers.find(m=>m.id===data.settings.currentUserId)||data.familyMembers[0];

  return(
    <AppCtx.Provider value={{
      data,currentUser,
      showToast,
      addTask,updateTask,deleteTask,toggleDone,moveTomorrow,
      upsertBlocks,deleteBlock,
      addEvent,deleteEvent,
      addProject,deleteProject,
      addHabit,deleteHabit,toggleHabitLog,
      updateSettings,
      login,logout,isAdmin,addFamilyMember,updateFamilyMember,deleteFamilyMember,upsertAuthUser,
      addAnnouncement,markAnnouncementSeen,
      updateHomework,addHomework,
      addPost,updatePost,addComment,addMaterial,markPostSeen,
      togglePinPost,togglePinMaterial,
      addExpense,deleteExpense,updateBudget,
      addNote,deleteNote,
      resetData,
      addLesson,updateLesson,deleteLesson,setLessonTeacher,setLessonStudents,setLessonActive,
    }}>
      {children}
      <ToastStack toasts={toasts}/>
    </AppCtx.Provider>
  );
}

/* ═══════════════════════════════════════════
   SWIPE ROW (iOS Mail style, 2-stage snap)
═══════════════════════════════════════════ */
function SwipeRow({children,onLeft1,onLeft2,onRight1,onRight2,left1Label='완료',left2Label='삭제',right1Label='내일로',right2Label='스케줄',left1Color='var(--success)',left2Color='var(--danger)',right1Color='var(--work)',right2Color='var(--purple)',disabled=false}){
  const frontRef=useRef(null);
  const stateRef=useRef({startX:0,startY:0,dx:0,stage:0,active:false,locked:false,dir:null});
  const SNAP1=72,SNAP2=140,THRESH=0.55;
  const [dx,setDx]=useState(0);
  const [stage,setStage]=useState(0);

  function getDir(dx){return dx>0?'right':'left';}

  function onPD(e){
    if(disabled)return;
    const t=e.touches?e.touches[0]:e;
    stateRef.current={startX:t.clientX,startY:t.clientY,dx:0,stage:0,active:true,locked:false,dir:null};
  }
  function onPM(e){
    const s=stateRef.current;
    if(!s.active||s.locked)return;
    const t=e.touches?e.touches[0]:e;
    const rawDx=t.clientX-s.startX;
    const rawDy=t.clientY-s.startY;
    if(!s.dir){
      if(Math.abs(rawDx)<4&&Math.abs(rawDy)<4)return;
      if(Math.abs(rawDy)>Math.abs(rawDx)*1.5){s.locked=true;return;}
      s.dir=rawDx>0?'right':'left';
    }
    if(s.dir==='right'&&rawDx<0)return;
    if(s.dir==='left'&&rawDx>0)return;
    e.preventDefault&&e.preventDefault();
    const clamped=clamp(rawDx,-SNAP2*1.1,SNAP2*1.1);
    s.dx=clamped;
    setDx(clamped);
  }
  function onPU(){
    const s=stateRef.current;
    if(!s.active)return;
    s.active=false;
    const abs=Math.abs(s.dx);
    const dir=s.dir;
    if(!dir||abs<4){setDx(0);setStage(0);return;}
    const w=frontRef.current?.offsetWidth||320;
    if(abs>w*THRESH){
      // Full action
      if(dir==='left'){setDx(0);setStage(0);s.dx=0;if(abs>SNAP1*1.5)onLeft2&&onLeft2();else onLeft1&&onLeft1();}
      else{setDx(0);setStage(0);s.dx=0;if(abs>SNAP1*1.5)onRight2&&onRight2();else onRight1&&onRight1();}
    } else if(abs>SNAP1*0.6){
      // Snap to stage 1
      const snap=dir==='left'?-SNAP1:SNAP1;
      setDx(snap);setStage(1);s.dx=snap;
    } else {
      setDx(0);setStage(0);s.dx=0;
    }
  }

  const absD=Math.abs(dx);
  const btnOpacity=clamp((absD-20)/40,0,1);
  function resetSwipe(){setDx(0);setStage(0);stateRef.current.dx=0;}

  return(
    <div className="swipe-wrap" style={{touchAction:'pan-y',position:'relative'}}>
      {/* 왼쪽 스와이프 시 오른쪽에 버튼 표시 (삭제/완료) */}
      <div className="swipe-bg swipe-bg-right" style={{opacity:dx<0?btnOpacity:0,pointerEvents:dx<0&&stage>0?'auto':'none'}}>
        {onLeft2&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.stopPropagation();resetSwipe();onLeft2&&onLeft2();}} onClick={e=>{e.stopPropagation();resetSwipe();onLeft2&&onLeft2();}} style={{background:left2Color,border:'none',color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer',minWidth:56}}>{left2Label}</button>}
        {onLeft1&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.stopPropagation();resetSwipe();onLeft1&&onLeft1();}} onClick={e=>{e.stopPropagation();resetSwipe();onLeft1&&onLeft1();}} style={{background:left1Color,border:'none',color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer',minWidth:56}}>{left1Label}</button>}
      </div>
      {/* 오른쪽 스와이프 시 왼쪽에 버튼 표시 */}
      <div className="swipe-bg swipe-bg-left" style={{opacity:dx>0?btnOpacity:0,pointerEvents:dx>0&&stage>0?'auto':'none'}}>
        {onRight1&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.stopPropagation();resetSwipe();onRight1&&onRight1();}} onClick={e=>{e.stopPropagation();resetSwipe();onRight1&&onRight1();}} style={{background:right1Color,border:'none',color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer',minWidth:56}}>{right1Label}</button>}
        {onRight2&&<button onPointerDown={e=>e.stopPropagation()} onTouchEnd={e=>{e.stopPropagation();resetSwipe();onRight2&&onRight2();}} onClick={e=>{e.stopPropagation();resetSwipe();onRight2&&onRight2();}} style={{background:right2Color,border:'none',color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer',minWidth:56}}>{right2Label}</button>}
      </div>
      <div
        ref={frontRef}
        className={`swipe-front${stateRef.current.active?' dragging':''}${stage>0?' snapped':''}`}
        style={{transform:`translateX(${dx}px)`,position:'relative',zIndex:2}}
        onMouseDown={onPD} onMouseMove={onPM} onMouseUp={onPU} onMouseLeave={onPU}
        onTouchStart={onPD} onTouchMove={onPM} onTouchEnd={onPU}
        onClick={dx!==0?(e=>{e.stopPropagation();resetSwipe();}):undefined}
      >
        {children}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════

function TaskRow({task,onTap,showDate=false,showProject=false,compact=false}){
  const {toggleDone,moveTomorrow,deleteTask,data}=useApp();
  const done=task.status==='done';
  const proj=showProject&&task.projectId?data.projects.find(p=>p.id===task.projectId):null;
  const domColor=task.domain==='work'?'var(--work)':task.domain==='personal'?'var(--personal)':task.domain==='school'?'var(--school)':task.domain==='lesson'?'var(--lesson)':'var(--t3)';
  const prioLabel=['','A1','B1','C1'][task.priority]||'';

  return(
    <SwipeRow
      onLeft1={()=>toggleDone(task.id)}
      onLeft2={()=>deleteTask(task.id)}
      onRight1={()=>moveTomorrow(task.id)}
      left1Label={done?'미완료':'완료'}
      left1Color={done?'var(--t3)':'var(--success)'}
      left2Label='삭제'
      left2Color='var(--danger)'
      right1Label='내일로'
      right1Color='var(--work)'
    >
      <div
        className="row-in task-row"
        onClick={()=>onTap&&onTap(task)}
        style={{padding:compact?'10px 14px':'14px 16px',opacity:done?0.5:1}}
      >
        {/* Checkbox */}
        <button
          onClick={e=>{e.stopPropagation();toggleDone(task.id);}}
          className="task-row-check"
          style={{borderColor:done?'var(--success)':domColor,background:done?'var(--success)':'transparent'}}
        >
          {done&&<span style={{color:'#fff',fontSize:13,fontWeight:900}}>✓</span>}
        </button>

        {/* Content */}
        <div style={{flex:1,minWidth:0}}>
          <span className={`task-row-title${done?' done':''}`} style={{fontSize:compact?13:15,display:'block'}}>{task.title}</span>
          <div className="task-row-meta">
            {task.energy&&<EnergyDot level={task.energy}/>}
            {task.durationMin>0&&<span className="meta-chip" style={{background:'var(--s2)',color:'var(--t2)'}}>{task.durationMin}분</span>}
            {showDate&&task.dueDate&&<span className="meta-chip" style={{background:task.dueDate<todayStr()&&!done?'var(--dlow)':'var(--s2)',color:task.dueDate<todayStr()&&!done?'var(--danger)':'var(--t3)'}}>{relativeDay(task.dueDate)}</span>}
            {proj&&<span className="meta-chip" style={{background:proj.color+'22',color:proj.color}}>{proj.name}</span>}
            {task.type==='deepwork'&&<span className="meta-chip" style={{background:'var(--purplow)',color:'var(--purple)'}}>🧠 딥워크</span>}
            {task.type==='call'&&<span className="meta-chip" style={{background:'var(--warnlow)',color:'var(--warn)'}}>📞 통화</span>}
            {task.type==='meeting'&&<span className="meta-chip" style={{background:'var(--wlow)',color:'var(--work)'}}>🤝 회의</span>}
          </div>
        </div>
        {/* Priority badge */}
        {task.priority<=2&&<span className="prio-badge" style={{background:task.priority===1?'var(--a1low)':'var(--warnlow)',color:task.priority===1?'var(--a1c)':'var(--warn)'}}>{prioLabel}</span>}
      </div>
    </SwipeRow>
  );
}

function AddTaskSheet({open,onClose,defaultDomain='work',defaultDueDate=null}){
  const {addTask,data,showToast}=useApp();
  const [title,setTitle]=useState('');
  const [domain,setDomain]=useState(defaultDomain);
  const [priority,setPriority]=useState(3);
  const [dueDate,setDueDate]=useState(defaultDueDate||todayStr());
  const [type,setType]=useState('todo');
  const [durationMin,setDurationMin]=useState(30);
  const [energy,setEnergy]=useState('med');
  const [projectId,setProjectId]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const inputRef=useRef(null);

  useEffect(()=>{
    if(open){
      setTitle('');setDomain(defaultDomain);setPriority(3);setDueDate(defaultDueDate||todayStr());
      setType('todo');setProjectId('');setDurationMin(30);setEnergy('med');
      setTimeout(()=>inputRef.current?.focus(),200);
    }
  },[open]);



  async function aiClassify(){
    if(!title.trim()||aiLoading) return;
    setAiLoading(true);
    try{
      const res=await callAI(`태스크를 분류해주세요: "${title}"\n\n다음 JSON 형식으로만 답변하세요:\n{"type":"todo|deepwork|call|meeting|review|admin","durationMin":30,"priority":1|2|3,"domain":"work|personal","energy":"low|med|high"}\n\n규칙: deepwork=집중필요, call=전화/통화, meeting=회의, review=검토/확인, admin=행정/서류, todo=일반`);
      const parsed=JSON.parse(res.trim().replace(/```json|```/g,'').trim());
      if(parsed.type) setType(parsed.type);
      if(parsed.durationMin) setDurationMin(parsed.durationMin);
      if(parsed.priority) setPriority(parsed.priority);
      if(parsed.domain) setDomain(parsed.domain);
      if(parsed.energy) setEnergy(parsed.energy);
      showToast('🤖 AI 분류 완료','success');
    }catch(e){showToast('AI 분류 실패','error');}
    setAiLoading(false);
  }
  function submit(){
    if(!title.trim())return;
    addTask({title:title.trim(),domain,priority,dueDate,type,durationMin,energy,projectId:projectId||null});
    showToast('태스크 추가됨','success');
    onClose();
  }

  return(
    <Sheet open={open} onClose={onClose} title="새 태스크" height="85vh">
      <div style={{paddingTop:12}}>
        <div style={{position:'relative'}}>
          <input ref={inputRef} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={{...fieldStyle,fontSize:16,fontWeight:600,paddingRight:80}} placeholder="무엇을 해야 하나요?"/>
          <button onClick={aiClassify} disabled={!title.trim()||aiLoading} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:aiLoading?'var(--s3)':'linear-gradient(135deg,#7C3AED,#4F8EF7)',color:'#fff',border:'none',borderRadius:8,padding:'5px 10px',fontSize:11,fontWeight:700,cursor:'pointer',opacity:(!title.trim()||aiLoading)?0.5:1}}>
            {aiLoading?'..':'🤖 AI'}
          </button>
        </div>


        <label style={labelStyle}>도메인</label>
        <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
          {[['work','업무','var(--work)'],['personal','개인','var(--personal)'],['school','학교','var(--school)'],['lesson','레슨','var(--lesson)']].map(([v,l,c])=>(
            <button key={v} onClick={()=>setDomain(v)} style={{...btnStyle,flex:'none',padding:'8px 14px',background:domain===v?c+'33':'var(--s2)',color:domain===v?c:'var(--t2)',border:`1.5px solid ${domain===v?c:'var(--b2)'}`}}>{l}</button>
          ))}
        </div>

        <label style={labelStyle}>우선순위</label>
        <div style={{display:'flex',gap:8,marginTop:6}}>
          {[['1','긴급','var(--a1c)'],['2','중요','var(--warn)'],['3','일반','var(--t3)']].map(([v,l,c])=>(
            <button key={v} onClick={()=>setPriority(Number(v))} style={{...btnStyle,background:priority===Number(v)?c+'33':'var(--s2)',color:priority===Number(v)?c:'var(--t2)',border:`1.5px solid ${priority===Number(v)?c:'var(--b2)'}`}}>{l}</button>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:14}}>
          <div>
            <label style={labelStyle}>실행일</label>
            <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} style={fieldStyle}/>

/* ═══════════════════════════════════════════
   SCHEDULE SHEET (Scheduler v3)
═══════════════════════════════════════════ */
function ScheduleSheet({open,onClose,date}){
  const {data,upsertBlocks,showToast}=useApp();
  const [result,setResult]=useState(null);
  const [applied,setApplied]=useState(false);

  useEffect(()=>{
    if(open){
      setApplied(false);
      const r=scheduleDayV3({
        date:date||todayStr(),
        tasks:data.tasks,
        events:data.events,
        existingBlocks:data.timeBlocks,
        settings:data.settings,
      });
      setResult(r);
    }
  },[open,date]);

  function apply(){
    if(!result?.proposedBlocks?.length)return;
    upsertBlocks(result.proposedBlocks);
    setApplied(true);
    showToast(`${result.proposedBlocks.length}개 블록 배치됨`,'success');
  }

  return(
    <Sheet open={open} onClose={onClose} title={`자동 배치 — ${relativeDay(date||todayStr())}`} height="85vh">
      {result&&(
        <div style={{paddingTop:12}}>
          {/* Insights */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--t2)',marginBottom:8}}>인사이트</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
              {result.insights.map((ins,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:10,background:ins.type==='success'?'var(--slow)':ins.type==='warn'?'var(--warnlow)':'var(--b1)'}}>
                  <span style={{fontSize:14}}>{ins.type==='success'?'✅':ins.type==='warn'?'⚠️':'ℹ️'}</span>
                  <span style={{fontSize:13,color:'var(--t1)'}}>{ins.msg}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Diagnostics */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--t2)',marginBottom:8}}>진단(고급)</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[
                ['여유시간',`${result.diagnostics.freeMinutes}분`],
                ['딥워크',`${result.diagnostics.deepWorkMin}분`],
                ['배치',`${result.diagnostics.placedCount}개`],
              ].map(([l,v])=>(
                <div key={l} style={{background:'var(--s2)',borderRadius:10,padding:'10px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--t3)'}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:700,color:'var(--t1)',marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Proposed blocks */}
          {result.proposedBlocks.length>0&&(
            <>
              <div style={{fontSize:13,fontWeight:700,color:'var(--t2)',marginBottom:8}}>배치 제안 ({result.proposedBlocks.length}개)</div>
              {result.proposedBlocks.map(b=>(
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,background:'var(--wlow)',border:'1px solid var(--wmid)',marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--work)',minWidth:90,fontFamily:'DM Mono,monospace'}}>{b.startTime}–{b.endTime}</span>
                  <span style={{fontSize:13,color:'var(--t1)',flex:1}}>{b.title}</span>
                </div>
              ))}
            </>
          )}

          {/* Skipped */}
          {result.skippedTasks.length>0&&(
            <>
              <div style={{fontSize:13,fontWeight:700,color:'var(--t2)',marginTop:12,marginBottom:8}}>미배치 ({result.skippedTasks.length}개)</div>
              {result.skippedTasks.map(t=>(
                <div key={t.id} style={{padding:'8px 14px',borderRadius:10,background:'var(--s2)',marginBottom:6,fontSize:13,color:'var(--t3)'}}>{t.title}</div>
              ))}
            </>
          )}

          {!applied?(
            <button onClick={apply} disabled={!result.proposedBlocks.length} style={{width:'100%',marginTop:20,padding:'14px 0',borderRadius:12,border:'none',background:result.proposedBlocks.length?'var(--work)':'var(--s3)',color:result.proposedBlocks.length?'#fff':'var(--t3)',fontWeight:700,fontSize:15,cursor:result.proposedBlocks.length?'pointer':'default'}}>
              적용하기 ({result.proposedBlocks.length}개)
            </button>
          ):(
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--success)',fontWeight:700,fontSize:15}}>✅ 타임라인에 적용됨</div>
          )}
        </div>
      )}
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   TRIAGE SUGGEST SHEET
═══════════════════════════════════════════ */
function TriageSuggestSheet({open,onClose}){
  const {data,updateTask,showToast}=useApp();
  const today=todayStr();

  const b1Tasks=useMemo(()=>{
    return data.tasks
      .filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,today)==='B1')
      .map(t=>({t,r:computePromotionReason(t,data.tasks,today)}))
      .sort((a,b)=>b.r.score-a.r.score)
      .slice(0,3);
  },[data.tasks,today]);

  function promote(taskId){
    updateTask(taskId,{priority:1,dueDate:today});
    showToast('A1으로 승격됨','success');
  }

  return(
    <Sheet open={open} onClose={onClose} title="B1 → A1 승격 제안" height="85vh">
      <div style={{paddingTop:12}}>
        <div style={{fontSize:13,color:'var(--t2)',marginBottom:16}}>마감 임박도·리스크·의존성 기반 상위 3개를 오늘 A1으로 승격 제안합니다.</div>
        {b1Tasks.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:'40px 0'}}>B1 태스크가 없습니다</div>}
        {b1Tasks.map(({t,r})=>(
          <div key={t.id} style={{background:'var(--s2)',borderRadius:14,padding:'14px',marginBottom:12,border:'1px solid var(--b2)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:'var(--t1)',marginBottom:4}}>{t.title}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--warn)'}}>점수 {r.score}</span>
                  {t.dueDate&&<span style={{fontSize:11,color:'var(--t3)'}}>{relativeDay(t.dueDate)}</span>}
                  {t.durationMin&&<span style={{fontSize:11,color:'var(--t3)'}}>{t.durationMin}분</span>}
                </div>
                {r.bullets.map((b,i)=>(
                  <div key={i} style={{fontSize:11,color:'var(--t2)',marginBottom:2}}>• {b}</div>
                ))}
              </div>
              <button onClick={()=>promote(t.id)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--a1c)',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer',flexShrink:0}}>↑A1</button>
            </div>
          </div>
        ))}
      </div>
    </Sheet>
  );
}

          <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
            {[['work','업무','var(--work)'],['personal','개인','var(--personal)'],['school','학교','var(--school)'],['lesson','레슨','var(--lesson)']].map(([v,l,c])=>(
              <button key={v} onClick={()=>setDomain(v)} style={{...btnStyle,flex:'none',padding:'8px 14px',background:domain===v?c+'33':'var(--s2)',color:domain===v?c:'var(--t2)',border:`1.5px solid ${domain===v?c:'var(--b2)'}`}}>{l}</button>
            ))}
          </div>

          <label style={labelStyle}>우선순위</label>
          <div style={{display:'flex',gap:8,marginTop:6}}>
            {[['1','긴급','var(--a1c)'],['2','중요','var(--warn)'],['3','일반','var(--t3)']].map(([v,l,c])=>(
              <button key={v} onClick={()=>setPriority(Number(v))} style={{...btnStyle,background:priority===Number(v)?c+'33':'var(--s2)',color:priority===Number(v)?c:'var(--t2)',border:`1.5px solid ${priority===Number(v)?c:'var(--b2)'}`}}>{l}</button>
            ))}
          </div>

          <label style={labelStyle}>실행일</label>
          <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} style={fieldStyle}/>

          <label style={labelStyle}>작업 유형</label>
          <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
            {TASK_TYPES.map(({value:v,label:l,icon:ic})=>(
              <button key={v} onClick={()=>setType(v)} style={{...btnStyle,flex:'none',padding:'8px 12px',fontSize:12,background:type===v?'var(--wlow)':'var(--s2)',color:type===v?'var(--work)':'var(--t2)',border:`1.5px solid ${type===v?'var(--work)':'var(--b1)'}`}}>{ic} {l}</button>
            ))}
          </div>

          <label style={labelStyle}>소요시간(분)</label>
          <input type="number" value={durationMin} onChange={e=>setDurationMin(Number(e.target.value))} style={fieldStyle} min={5} max={480} step={5}/>

          {domain==='work'&&(
            <>
              <label style={labelStyle}>프로젝트</label>
              <select value={projectId} onChange={e=>setProjectId(e.target.value)} style={fieldStyle}>
                <option value="">없음</option>
                {data.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </>
          )}

          <button onClick={save} style={{width:'100%',marginTop:20,padding:'14px 0',borderRadius:12,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>정리 완료</button>
        </div>
      )}
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   TIMELINE COMPONENT
═══════════════════════════════════════════ */
function Timeline({date,blocks,events,onAddEvent}){
  const START=8,END=21;
  const totalMin=(END-START)*60;
  const nowMin=useMemo(()=>{
    const d=new Date();
    const m=d.getHours()*60+d.getMinutes();
    return m;
  },[]);
  const isToday=date===todayStr();
  const nowPct=isToday?clamp(((nowMin-START*60)/totalMin)*100,0,100):null;

  const allBlocks=[
    ...blocks.filter(b=>!b.deletedAt&&b.date===date).map(b=>({...b,isBlock:true})),
    ...events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===date).map(e=>({
      id:e.id,title:e.title,
      startTime:(e.startDateTime||'').slice(11,16),
      endTime:(e.endDateTime||'').slice(11,16),
      domain:'event',isEvent:true,
    })),
  ].sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));

  const HOURS=Array.from({length:END-START},(_,i)=>START+i);

  return(
    <div style={{position:'relative',marginTop:8}}>
      {/* Hour lines */}
      {HOURS.map(h=>{
        const pct=((h-START)/((END-START)))*100;
        return(
          <div key={h} style={{position:'absolute',left:0,right:0,top:`${pct}%`,borderTop:'1px solid var(--b1)',display:'flex',alignItems:'center',zIndex:1}}>
            <span style={{fontSize:10,color:'var(--t3)',minWidth:36,fontFamily:'DM Mono,monospace',paddingRight:4}}>{p2(h)}:00</span>
          </div>
        );
      })}

      {/* Now line */}
      {nowPct!==null&&(
        <div className="tl-now-line" style={{top:`${nowPct}%`}}/>
      )}

      {/* Blocks */}
      <div style={{marginLeft:40,position:'relative',height:`${(END-START)*48}px`}}>
        {allBlocks.map(b=>{
          const sm=toMin(b.startTime);const em=toMin(b.endTime);
          const top=((sm-START*60)/totalMin)*100;
          const height=((em-sm)/totalMin)*100;
          const isNow=isToday&&nowMin>=sm&&nowMin<em;
          const bgColor=b.isEvent?'var(--orange)':b.domain==='personal'?'var(--personal)':'var(--work)';
          return(
            <div key={b.id} style={{
              position:'absolute',left:0,right:0,
              top:`${top}%`,height:`${Math.max(height,2.5)}%`,
              background:bgColor+'22',border:`1.5px solid ${bgColor}`,
              borderRadius:8,padding:'3px 8px',overflow:'hidden',
              display:'flex',alignItems:'center',gap:6,
            }}>
              {isNow&&<span className="pulse" style={{width:6,height:6,borderRadius:3,background:bgColor,flexShrink:0}}/>}
              <span style={{fontSize:11,fontWeight:700,color:bgColor,fontFamily:'DM Mono,monospace',flexShrink:0}}>{b.startTime}</span>
              <span style={{fontSize:11,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.title}</span>
              {isNow&&<span style={{fontSize:9,fontWeight:700,color:bgColor,marginLeft:'auto',flexShrink:0}}>진행중</span>}
            </div>
          );
        })}
      </div>

      <button onClick={onAddEvent} style={{display:'flex',alignItems:'center',gap:6,marginTop:8,padding:'8px 14px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:13,cursor:'pointer',width:'100%',justifyContent:'center'}}>
        + 일정 추가
      </button>
    </div>
  );
}

function LogoMark({login=false}){
  const [isDark,setIsDark]=useState(()=>document.documentElement.getAttribute('data-theme')==='dark');
  useEffect(()=>{
    const obs=new MutationObserver(()=>setIsDark(document.documentElement.getAttribute('data-theme')==='dark'));
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    return()=>obs.disconnect();
  },[]);
  const src=isDark?LOGO_DARK:LOGO_LIGHT;
  if(login) return <img src={src} alt="JF OS" style={{height:62,width:'auto',maxWidth:260,objectFit:'contain'}}/>;
  return <img src={src} alt="JF OS" style={{height:26,width:'auto',objectFit:'contain'}}/>;
}
function ThemeToggle(){
  const {data,updateSettings}=useApp();
  const s=data.settings;
  return(
    <button
      className="press no-dim"
      role="switch"
      aria-checked={s.theme==='dark'}
      onClick={()=>updateSettings({theme: s.theme==='dark'?'light':'dark'})}
      style={{
        width:44,height:26,borderRadius:999,border:'1px solid var(--b1)',
        background: s.theme==='dark' ? 'var(--work)' : 'var(--s2)',
        position:'relative',padding:0,cursor:'pointer',flexShrink:0
      }}
    >
      <span style={{
        position:'absolute',top:3,
        left: s.theme==='dark'?'calc(100% - 22px)':'3px',
        width:20,height:20,borderRadius:'50%',
        background: s.theme==='dark'?'#fff':'var(--t2)',
        transition:'left 0.2s',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11
      }}>{s.theme==='dark'?'🌙':'☀️'}</span>
    </button>
  );
}
function LoginPage(){
  const {data,login}=useApp();
  const [username,setUsername]=useState('');
  const [pw,setPw]=useState('');
  const [remember,setRemember]=useState(false);

  useEffect(()=>{
    // convenience: if rememberLogin true, checkbox on
    setRemember(!!data.settings.rememberLogin);
  },[]);

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:'var(--bg)',color:'var(--t1)'}}>
      <div style={{height:'env(safe-area-inset-top,0px)'}}/>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{width:'100%',maxWidth:360}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,marginBottom:18}}>
            <LogoMark login={true}/>

          </div>

          <div style={{border:'1px solid var(--b1)',borderRadius:16,padding:16,background:'var(--s1)'}}>
            <div style={{fontSize:13,fontWeight:900,marginBottom:6}}>로그인</div>

            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="아이디(본인 이름)"
              style={{width:'100%',padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)',marginTop:8,background:'transparent',color:'var(--t1)'}}/>
            <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호(전화번호)" type="password"
              style={{width:'100%',padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)',marginTop:8,background:'transparent',color:'var(--t1)'}}/>

            <label style={{display:'flex',alignItems:'center',gap:10,marginTop:10,fontSize:13,color:'var(--t2)'}}>
              <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)}/>
              자동 로그인
            </label>

             <button className="press no-dim"
              onClick={()=>login(username.trim(),pw.trim(),remember)}
              style={{marginTop:12,width:'100%',padding:'12px 14px',borderRadius:14,border:'none',background:'#2563eb',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>

            </button>
          </div>

            © JF OS
          </div>
        </div>
      </div>
      <div style={{height:'env(safe-area-inset-bottom,0px)'}}/>
    </div>
  );
}

function AdminPage(){
  const {data,addFamilyMember,updateFamilyMember,deleteFamilyMember,
         upsertAuthUser,isAdmin,showToast,
         addLesson,updateLesson,deleteLesson,setLessonTeacher,setLessonStudents,setLessonActive}=useApp();
  const me0=me(data);
  const [adminTab,setAdminTab]=useState('members');

  // ── Member form state ──────────────────────────────────────────
  const [mName,setMName]=useState('');
  const [mPhone,setMPhone]=useState('');
  const [mRole,setMRole]=useState('child');
  const [mIsMom,setMIsMom]=useState(false);
  const [mAvatar,setMAvatar]=useState('🙂');
  const [mColor,setMColor]=useState('#4F8EF7');
  const [editMemberId,setEditMemberId]=useState(null);

  // ── Lesson form state ──────────────────────────────────────────
  const [lName,setLName]=useState('');
  const [lSlug,setLSlug]=useState('');
  const [lColor,setLColor]=useState('#A78BFA');
  const [lSchedule,setLSchedule]=useState('');
  const [lTeacher,setLTeacher]=useState('');
  const [lStudents,setLStudents]=useState([]);
  const [editLessonId,setEditLessonId]=useState(null);
  const [showArchived,setShowArchived]=useState(false);

  if(!isAdmin()) return(
    <div style={{padding:24,textAlign:'center',color:'var(--t2)',fontSize:14}}>
      관리자 권한이 없습니다.
    </div>
  );

  const users=data.familyMembers||[];
  const lessons=data.lessons||[];
  const teachers=users.filter(u=>u.role==='teacher');
  const children=users.filter(u=>u.role==='child');
  const visibleLessons=lessons.filter(l=>showArchived?true:(l.active!==false));
  const archivedCount=lessons.filter(l=>l.active===false).length;
  const AVATARS=['👨','👩','👧','👦','🧒','👶','🎹','📖','🎸','⚽','🎨','🔬','👩‍🏫','👨‍🏫','🧑'];
  const inp={padding:'12px',borderRadius:12,border:'1px solid var(--b1)',
             background:'transparent',color:'var(--t1)',width:'100%',fontSize:14,boxSizing:'border-box'};

  // ── Member helpers ────────────────────────────────────────────
  function openEditMember(u){
    setEditMemberId(u.id); setMName(u.name); setMRole(u.role);
    setMAvatar(u.avatar||'🙂'); setMColor(u.color||'#4F8EF7');
    setMIsMom(!!u.isMom); setMPhone('');
  }
  function clearMemberForm(){
    setEditMemberId(null); setMName(''); setMPhone('');
    setMRole('child'); setMAvatar('🙂'); setMColor('#4F8EF7'); setMIsMom(false);
  }
  function saveMember(){
    if(!mName.trim()) return;
    if(editMemberId){
      const patch={name:mName.trim(),role:mRole,avatar:mAvatar,color:mColor};
      if(mRole==='parent') patch.isMom=mIsMom;
      updateFamilyMember(editMemberId,patch);
      if(mPhone.trim()){
        const au=(data.authUsers||[]).find(a=>a.userId===editMemberId);
        upsertAuthUser({userId:editMemberId,username:mName.trim(),password:mPhone.trim(),isAdmin:!!au?.isAdmin});
      }
    } else {
      if(!mPhone.trim()) return;
      const id=uid();
      const member={id,name:mName.trim(),role:mRole,avatar:mAvatar,color:mColor};
      if(mRole==='parent'&&mIsMom) member.isMom=true;
      addFamilyMember(member,mPhone.trim());
    }
    clearMemberForm();
  }

  // ── Lesson helpers ────────────────────────────────────────────
  function suggestSlug(name){
    const map={피아노:'piano',영어:'english',수학:'math',음악:'music',미술:'art',체육:'pe',과학:'science',국어:'korean',코딩:'coding',줄넘기:'jump',태권도:'taekwondo',발레:'ballet',수영:'swim'};
    for(const [k,v] of Object.entries(map)) if(name.includes(k)) return v;
    return name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,8)||'lesson';
  }
  function makeSlugId(base){
    const existing=new Set(lessons.map(l=>l.id));
    const slug=base||suggestSlug(lName);
    if(!existing.has(slug)) return slug;
    for(let i=2;i<99;i++){ const s=`${slug}-${i}`; if(!existing.has(s)) return s; }
    return slug+'-'+Date.now().toString(36).slice(-4);
  }
  function openEditLesson(l){
    setEditLessonId(l.id); setLName(l.name||''); setLColor(l.color||'#A78BFA');
    setLSchedule(l.schedule||''); setLTeacher(l.teacherId||'');
    setLStudents(l.studentIds||[]); setLSlug('');
  }
  function clearLessonForm(){
    setEditLessonId(null); setLName(''); setLColor('#A78BFA');
    setLSchedule(''); setLTeacher(''); setLStudents([]); setLSlug('');

  function saveLesson(){
    if(!lName.trim()) return;
    if(editLessonId){
      updateLesson(editLessonId,{name:lName.trim(),color:lColor,schedule:lSchedule});

      setLessonStudents(editLessonId, lStudents);
    } else {
      const id=makeSlugId(lSlug.trim());
      addLesson({id,name:lName.trim(),color:lColor,schedule:lSchedule,
                 teacherId:lTeacher||null,studentIds:lStudents});
    }
    clearLessonForm();
  }
  function handleDeleteLesson(l){
    const posts=(data.posts||[]).filter(p=>p.lessonId===l.id).length;
    const materials=(data.materials||[]).filter(m=>m.lessonId===l.id).length;
    const homeworks=(data.homeworks||[]).filter(h=>h.lessonId===l.id).length;
    const hasCascade=posts+materials+homeworks>0;
    const preview=hasCascade?`\n\n관련 데이터: 게시글 ${posts}개, 자료 ${materials}개, 숙제 ${homeworks}개`:'';
    if(!window.confirm(`"${l.name}" 레슨 삭제할까요?${preview}`)) return;
    const cascade=hasCascade&&window.confirm(`관련 데이터(게시글/자료/숙제)도 함께 삭제할까요?\n취소 = 레슨만 삭제`);
    deleteLesson(l.id, {cascade});

          <button key={k} onClick={()=>setAdminTab(k)} className="press no-dim"
            style={{flex:1,padding:'10px 6px',borderRadius:12,border:'1px solid var(--b1)',

              fontWeight:adminTab===k?900:500,fontSize:13,color:'var(--t1)'}}>
            {l}

            {/* Avatar picker */}
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>

            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>

              <input value={mPhone} onChange={e=>setMPhone(e.target.value)}
