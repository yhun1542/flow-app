/* ═══════════════════════════════════════════
   FOCUS 3 CARD
═══════════════════════════════════════════ */
function Focus3Card({date,onOpenDetail}){
  const {data,syncFocus3,setFocus3,toggleDone}=useApp();
  const [dragId,setDragId]=useState(null);
  const tasks=data.tasks;
  const focus3=data.focus3;

  useEffect(()=>{syncFocus3(date);},[date]);

  const items=useMemo(()=>{
    const byId=new Map(tasks.map(t=>[t.id,t]));
    return focus3.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt);
  },[tasks,focus3]);

  const a1Count=useMemo(()=>tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,date)==='A1').length,[tasks,date]);

  function reorder(fromId,toId){
    const cur=[...focus3];
    const from=cur.indexOf(fromId),to=cur.indexOf(toId);
    if(from<0||to<0||from===to)return;
    cur.splice(from,1);cur.splice(to,0,fromId);
    setFocus3(cur);
  }

  const doneCount=items.filter(t=>t.status==='done').
length;
  const totalFocus=items.length;

  return(
    <div style={{marginBottom:20}}>
      <SecLabel right={
        <button onClick={()=>syncFocus3(date)} className="press" style={{display:'flex',alignItems:'center',gap:5,fontSize:11,padding:'4px 10px',borderRadius:8,background:'var(--wmid)',border:'1px solid rgba(79,142,247,0.3)',color:'var(--work)',cursor:'pointer',fontWeight:700}}>
          <Ic n="sparkle" s={12} c="var(--work)"/> Auto A1
        </button>
      }>⚡ Focus</SecLabel>

      {items.length===0?(
        <Card>
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{fontSize:13,color:'var(--t2)',fontWeight:600,marginBottom:6}}>Focus가 비어있음</div>
            <div style={{fontSize:12,color:'var(--t3)',marginBottom:12}}>A1이 {a1Count}개 있어. 자동으로 Focus 3를 만들 수 있어.</div>
            <button onClick={()=>syncFocus3(date)} className="press" style={{padding:'9px 20px',borderRadius:10,background:'var(--work)',border:'none',color:'#fff',fontSize:13,fontWeight:700}}>
              A1에서 Focus 3 만들기
            </button>
          </div>
        </Card>
      ):(
        <Card>
          {items.map((t,i)=>{
            const b=bucketOf(t,date);
            const done=t.status==='done';
            const energyColor=t.energy==='high'?'var(--danger)':t.energy==='med'?'var(--warn)':'var(--success)';
            return(
              <div key={t.id} className="focus-item"
                draggable onDragStart={()=>setDragId(t.id)} onDragOver={e=>e.preventDefault()}
                onDrop={()=>{if(dragId&&dragId!==t.id){reorder(dragId,t.id);setDragId(null);}}}
              >
                <button onClick={()=>toggleDone(t.id)} style={{
                  width:26,height:26,borderRadius:13,flexShrink:0,
                  border:`1.8px solid ${done?'var(--success)':'var(--b2)'}`,
                  background:done?'var(--success)':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s ease'
                }}>
                  {done?<Ic n="check" s={12} c="#052e16"/>:<span className="mono" style={{fontSize:10,color:'var(--t3)',fontWeight:700}}>{i+1}</span>}
                </button>
                <div style={{flex:1,minWidth:0,cursor:'grab'}}>
                  <div style={{fontSize:15,color:done?'var(--t3)':'var(--t1)',textDecoration:done?'line-through':'none',fontWeight:440,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                  <div style={{display:'flex',gap:6,marginTop:2,alignItems:'center'}}>
                    {t.durationMin&&<span className="mono" style={{fontSize:10,color:'var(--t3)'}}>{t.durationMin}m</span>}
                    {t.energy&&<span className="energy-dot" style={{background:energyColor}}/>}
                    {t.projectId&&<span style={{fontSize:10,color:'var(--t3)'}}>{data.projects.find(p=>p.id===t.projectId)?.name}</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                  <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:b==='A1'?'var(--a1low)':'var(--wlow)',color:b==='A1'?'var(--a1c)':'var(--work)',fontWeight:700}}>{b}</span>
                  <button onClick={()=>onOpenDetail?.(t.id)} className="press" style={{width:24,height:24,borderRadius:12,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Ic n="edit" s={11} c="var(--t3)"/>
                  </button>
                </div>
              </div>
            );
          })}
          {totalFocus>0&&(
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--b1)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:11,color:'var(--t3)'}}>드래그로 순서 변경 · Auto A1 누르면 자동 갱신</div>
              <div className="mono" style={{fontSize:11,color:doneCount===totalFocus?'var(--success)':'var(--t3)'}}>{doneCount}/{totalFocus}</div>
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   TRIAGE SUGGEST SHEET (B1→A1 승격)
═══════════════════════════════════════════ */
function TriageSuggestSheet({open,onClose,today}){
  const {data,syncFocus3,upsertBlocks,updateTask,showToast}=useApp();
  const [selected,setSelected]=useState({});
  const [autoPlace,setAutoPlace]=useState(true);
  const [planTomorrow,setPlanTomorrow]=useState(true);

  const tomorrow=addDays(today,1);

  const candidates=useMemo(()=>{
    const b1=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,today)==='B1');
    const reasons=b1.map(t=>({t,r:computePromotionReason(t,data.tasks,today)}));
    return reasons.sort((a,b)=>b.r.score-a.r.score).slice(0,3);
  },[data.tasks,today]);

  useEffect(()=>{
    if(open){
      const def={};
      for(const {t} of candidates)def[t.id]=true;
      setSelected(def);setAutoPlace(true);setPlanTomorrow(true);
    }
  },[open,candidates.length]);

  const picked=candidates.filter(({t})=>selected[t.id]).map(({t})=>t);
  const todayOne=picked[0]||null;
  const todayExisting=useMemo(()=>data.timeBlocks.filter(b=>!b.deletedAt&&b.date===today),[data.timeBlocks,today]);
  const tomorrowExisting=useMemo(()=>data.timeBlocks.filter(b=>!b.deletedAt&&b.date===tomorrow),[data.timeBlocks,tomorrow]);

  const todayPreview=useMemo(()=>{
    if(!autoPlace||!todayOne)return null;
    const promoted={...todayOne,priority:1,dueDate:today,status:'todo',type:todayOne.type||'admin'};
    const res=scheduleDayV2({date:today,tasks:[promoted],events:data.events,existingBlocks:todayExisting,settings:data.settings});
    const pb=res.proposedBlocks[0];
    return pb?{title:pb.title,startTime:pb.startTime,endTime:pb.endTime}:null;
  },[autoPlace,todayOne,today,data.events,todayExisting,data.settings]);

  function apply(){
    if(!picked.length){onClose();return;}
    const now=Date.now();
    for(const t of picked){updateTask(t.id,{priority:1,dueDate:today,status:'todo'});}
    setTimeout(()=>syncFocus3(today),50);
    if(autoPlace&&todayOne){
      const promoted={...todayOne,priority:1,dueDate:today,status:'todo'};
      const res=scheduleDayV2({date:today,tasks:[promoted],events:data.events,existingBlocks:todayExisting,settings:data.settings});
      const pb=res.proposedBlocks[0];
      if(pb)upsertBlocks([{date:today,startTime:pb.startTime,endTime:pb.endTime,title:pb.title,domain:'work',linkedTaskId:todayOne.id,createdAt:now,updatedAt:now}]);
    }
    if(planTomorrow&&picked.length>1){
      const remaining=picked.slice(1,3);
      const res2=scheduleDayV2({date:tomorrow,tasks:remaining.map(t=>({...t,priority:1,dueDate:today,status:'todo'})),events:data.events,existingBlocks:tomorrowExisting,settings:data.settings});
      if(res2.proposedBlocks.length)upsertBlocks(res2.proposedBlocks.map(b=>({date:tomorrow,startTime:b.startTime,endTime:b.endTime,title:b.title,domain:'work',linkedTaskId:b.taskId,createdAt:now,updatedAt:now})));
    }
    showToast(`${picked.length}개 A1 승격 · 일정 배치 완료`,'success');
    onClose();
  }

  return(
    <Sheet open={open} onClose={onClose} title="B1 → A1 승격 제안"
      footer={<div style={{display:'flex',gap:10}}><GhostBtn onClick={onClose}>취소</GhostBtn><PrimaryBtn onClick={apply}>Apply</PrimaryBtn></div>}
    >
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{padding:'12px 14px',background:'var(--s2)',borderRadius:12,fontSize:13,color:'var(--t2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <Ic n="arrowup" s={16} c="var(--a1c)"/>
            <span style={{fontWeight:700,color:'var(--t1)'}}>오늘 A1이 비어있음</span>
          </div>
          B1 중 "병목·마감·리스크"가 큰 항목을 A1로 올려서 실행 리듬을 만들어요. Apply 시 <strong>P1 + due today</strong>로 바뀌고 Focus3도 갱신됩니다.
        </div>

        <div style={{padding:'12px 14px',background:'var(--s2)',borderRadius:12}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Rhythm 옵션</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Ic n="calendar" s={14} c="var(--work)"/>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>오늘 1개 자동 배치</div>
                  {todayPreview&&<div className="mono" style={{fontSize:11,color:'var(--t3)'}}>{todayPreview.startTime}–{todayPreview.endTime}</div>}
                </div>
              </div>
              <button onClick={()=>setAutoPlace(!autoPlace)} className="press" style={{height:26,padding:'0 10px',borderRadius:13,background:autoPlace?'var(--wlow)':'var(--s3)',border:`1px solid ${autoPlace?'var(--work)':'var(--b1)'}`,color:autoPlace?'var(--work)':'var(--t3)',fontSize:11,fontWeight:700}}>
                {autoPlace?'ON':'OFF'}
              </button>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Ic n="sunrise" s={14} c="var(--personal)"/>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>내일 오전 나머지 배치</div>
                  <div style={{fontSize:11,color:'var(--t3)'}}>딥워크 윈도우 기준 자동 배치</div>
                </div>
              </div>
              <button onClick={()=>setPlanTomorrow(!planTomorrow)} className="press" style={{height:26,padding:'0 10px',borderRadius:13,background:planTomorrow?'var(--plow)':'var(--s3)',border:`1px solid ${planTomorrow?'var(--personal)':'var(--b1)'}`,color:planTomorrow?'var(--personal)':'var(--t3)',fontSize:11,fontWeight:700}}>
                {planTomorrow?'ON':'OFF'}
              </button>
            </div>
          </div>
        </div>

        <div>
          <SecLabel>승격 후보 (클릭으로 선택/해제)</SecLabel>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {candidates.length===0&&<div style={{fontSize:13,color:'var(--t3)',padding:'12px',textAlign:'center'}}>B1 후보가 없음</div>}
            {candidates.map(({t})=>{
              const checked=!!selected[t.id];
              const r=computePromotionReason(t,data.tasks,today);
              return(
                <button key={t.id} onClick={()=>setSelected(s=>({...s,[t.id]:!s[t.id]}))} className="press"
                  style={{textAlign:'left',padding:'12px 14px',borderRadius:12,background:'var(--s2)',border:`1px solid ${checked?'var(--a1c)':'var(--b1)'}`,transition:'border-color 0.15s'}}
                >
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <div style={{width:18,height:18,borderRadius:9,border:`2px solid ${checked?'var(--a1c)':'var(--b2)'}`,background:checked?'var(--a1c)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}>
                      {checked&&<Ic n="check" s={10} c="#fff"/>}
                    </div>
                    <div style={{flex:1,fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                    <div className="mono" style={{fontSize:12,fontWeight:700,color:'var(--a1c)',flexShrink:0}}>{r.score}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:3,paddingLeft:28}}>
                    {r.bullets.slice(0,2).map((b,i)=>(
                      <div key={i} style={{fontSize:11,color:'var(--t3)'}}>• {b}</div>
                    ))}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   TODAY PAGE
═══════════════════════════════════════════ */
function TodayPage({onSignalTab}){
  const {data,toggleDone,deleteTask,moveTomorrow,deleteBlock}=useApp();
  const [showSched,setShowSched]=useState(false);
  const [schedTaskId,setSchedTaskId]=useState(null);
  const [detailId,setDetailId]=useState(null);
  const [showTriage,setShowTriage]=useState(false);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const today=todayStr();

  const todayTasks=data.tasks.filter(t=>t.dueDate===today&&t.status!=='inbox'&&!t.deletedAt);
  const workTasks=todayTasks.filter(t=>t.domain==='work');
  const persTask=todayTasks.filter(t=>t.domain==='personal');

  const todayBlocks=data.timeBlocks.filter(b=>!b.deletedAt&&b.date===today).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const todayEvents=data.events.filter(e=>!e.deletedAt&&e.startDateTime?.slice(0,10)===today);

  const groups=new Map();
  workTasks.forEach(t=>{const k=t.projectId||'__none__';if(!groups.has(k))groups.set(k,[]);groups.get(k).push(t);});

  const d=new Date();
  const DN=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const done=todayTasks.filter(t=>t.status==='done').length;
  const total=todayTasks.length;
  const pct=total>0?Math.round((done/total)*100):0;

  const a1Count=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,today)==='A1').length;
  const b1Count=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,today)==='B1').length;

  const timelineItems=[
    ...todayBlocks.map(b=>({...b,_t:'block'})),
    ...todayEvents.map(e=>({...e,_t:'event',startTime:e.startDateTime?.slice(11,16),endTime:e.endDateTime?.slice(11,16)}))
  ].sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));

  const nowMin=toMin(nowHHMM());

  function handleSched(id){setSchedTaskId(id);setShowSched(true);}
  function openDetail(id){setDetailId(id);}

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      {/* Header */}
      <div style={{padding:'22px 0 14px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:34,fontWeight:800,letterSpacing:'-0.03em',lineHeight:1}}>TODAY</div>
            <div style={{fontSize:14,color:'var(--t2)',marginTop:5}}>{DN[d.getDay()]}, {MN[d.getMonth()]} {d.getDate()}일</div>
          </div>
          {total>0&&(
            <div style={{textAlign:'right',paddingTop:4}}>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:pct===100?'var(--success)':'var(--t1)',lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{done}/{total} 완료</div>
            </div>
          )}
        </div>
        {total>0&&<div style={{marginTop:10}}><div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div></div>}
      </div>

      {/* Signal Badge */}
      {a1Count>0&&<SignalBadgeCard a1Count={a1Count} onOpenSignal={onSignalTab}/>}
      {a1Count===0&&b1Count>0&&(
        <button onClick={()=>setShowTriage(true)} className="press" style={{
          width:'100%',display:'flex',alignItems:'center',gap:10,padding:'12px 16px',
          borderRadius:14,background:'var(--s1)',border:'1px solid var(--b1)',marginBottom:16,textAlign:'left'
        }}>
          <Ic n="arrowup" s={18} c="var(--a1c)"/>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>A1이 비어있음</div>
            <div style={{fontSize:12,color:'var(--t2)'}}>B1 상위 {Math.min(b1Count,3)}개를 A1로 승격 제안</div>
          </div>
          <Ic n="chevRight" s={16} c="var(--t3)" style={{marginLeft:'auto'}}/>
        </button>
      )}

      {/* Focus 3 */}
      <Focus3Card date={today} onOpenDetail={openDetail}/>

      {/* Work Tasks */}
      {workTasks.length>0&&(
        <div style={{marginBottom:20}}>
          <SecLabel right={<span style={{fontSize:11,padding:'2px 8px',borderRadius:5,background:'var(--wlow)',color:'var(--work)',fontWeight:700}}>WORK · {workTasks.filter(t=>t.status!=='done').length}개</span>}>💼 Work</SecLabel>
          {Array.from(groups.entries()).map(([k,tasks])=>{
            const proj=data.projects.find(p=>p.id===k);
            if(proj)return(<ProjectGroup key={k} proj={proj} tasks={tasks} onToggle={toggleDone} onDelete={deleteTask} onTomorrow={moveTomorrow} onSchedule={handleSched} onOpenDetail={openDetail}/>);
            return(<div key={k} style={{marginBottom:8,display:'flex',flexDirection:'column',gap:6}}>{tasks.map(t=>(<TaskRow key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} onTomorrow={moveTomorrow} onSchedule={handleSched} projects={data.projects} onOpenDetail={openDetail}/>))}</div>);
          })}
        </div>
      )}

      {/* Timeline */}
      <div style={{marginBottom:20}}>
        <SecLabel right={
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowAddEvent(true)} className="press" style={{display:'flex',alignItems:'center',gap:5,fontSize:11,padding:'4px 10px',borderRadius:8,background:'var(--s2)',border:'1px solid var(--b2)',color:'var(--t2)',cursor:'pointer',fontWeight:600}}>
              <Ic n="plus" s={12} c="var(--t2)"/> 일정
            </button>
            <button onClick={()=>{setSchedTaskId(null);setShowSched(true);}} className="press" style={{display:'flex',alignItems:'center',gap:5,fontSize:11,padding:'4px 10px',borderRadius:8,background:'var(--wmid)',border:'1px solid rgba(79,142,247,0.3)',color:'var(--work)',cursor:'pointer',fontWeight:700}}>
              <Ic n="sparkle" s={12} c="var(--work)"/> 자동 배치
            </button>
          </div>
        }>⏱ Timeline</SecLabel>
        <Card pad={false}>
          {timelineItems.length===0?(
            <div style={{textAlign:'center',padding:'28px 20px'}}>
              <div style={{fontSize:28,marginBottom:8}}>🗓</div>
              <div style={{fontSize:13,color:'var(--t3)'}}>타임블록이 없어요<br/>'자동 배치'를 눌러보세요!</div>
            </div>
          ):(
            <div style={{position:'relative'}}>
              {timelineItems.map((item,i)=>{
                const isEvent=item._t==='event';
                const isPersonal=item.domain==='personal';
                const color=isEvent||isPersonal?'var(--personal)':'var(--work)';
                const bg=isEvent||isPersonal?'var(--plow)':'var(--wlow)';
                const dur=item.startTime&&item.endTime?toMin(item.endTime)-toMin(item.startTime):0;
                const isNow=item.startTime&&item.endTime&&toMin(item.startTime)<=nowMin&&nowMin<toMin(item.endTime);
                return(
                  <div key={item.id} style={{display:'flex',gap:12,padding:'12px 16px',borderBottom:i<timelineItems.length-1?'1px solid var(--b1)':'none',background:isNow?'rgba(79,142,247,0.04)':'transparent'}}>
                    <div style={{width:50,flexShrink:0,textAlign:'right',paddingTop:1}}>
                      <div className="mono" style={{fontSize:11,color:isNow?'var(--work)':'var(--t3)',fontWeight:isNow?700:400}}>{item.startTime}</div>
                      <div className="mono" style={{fontSize:10,color:'var(--t3)',opacity:0.5}}>{item.endTime}</div>
                    </div>
                    <div style={{flex:1,padding:'8px 12px',borderRadius:10,borderLeft:`3px solid ${isNow?'var(--work)':color}`,background:bg,position:'relative'}}>
                      {isNow&&<div style={{position:'absolute',top:4,right:8,width:6,height:6,borderRadius:3,background:'var(--work)'}} className="pulse"/>}
                      <div style={{fontSize:14,fontWeight:isNow?600:500}}>{item.title}</div>
                      <div style={{display:'flex',gap:8,marginTop:3,alignItems:'center'}}>
                        {isEvent&&<span style={{fontSize:10,color:'var(--personal)',fontWeight:700}}>📅 일정</span>}
                        {isNow&&<span style={{fontSize:10,color:'var(--work)',fontWeight:700}}>진행중</span>}
                        {dur>0&&<span className="mono" style={{fontSize:10,color:'var(--t3)'}}>{dur}m</span>}
                        {item.linkedTaskId&&<span style={{fontSize:10,color:'var(--t3)'}}>linked</span>}
                      </div>
                    </div>
                    {!isEvent&&(
                      <button onClick={()=>deleteBlock(item.id)} className="press" style={{width:28,height:28,borderRadius:14,background:'transparent',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,alignSelf:'center'}}>
                        <Ic n="x" s={13} c="var(--t3)"/>
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {/* Personal */}
      {persTask.length>0&&(
        <div style={{marginBottom:20}}>
          <SecLabel right={<span style={{fontSize:11,padding:'2px 8px',borderRadius:5,background:'var(--plow)',color:'var(--personal)',fontWeight:700}}>PERSONAL · {persTask.filter(t=>t.status!=='done').length}개</span>}>👤 Personal</SecLabel>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {persTask.map(t=>(<TaskRow key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} onTomorrow={moveTomorrow} onSchedule={handleSched} projects={data.projects} onOpenDetail={openDetail}/>))}
          </div>
        </div>
      )}

      {todayTasks.length===0&&(
        <div style={{textAlign:'center',padding:'50px 20px'}}>
          <div style={{fontSize:52,marginBottom:12}}>🎯</div>
          <div style={{fontSize:17,color:'var(--t2)',marginBottom:6,fontWeight:600}}>오늘 할 일이 없어요!</div>
          <div style={{fontSize:13,color:'var(--t3)'}}>FAB(+)으로 추가하거나 인박스를 정리해보세요</div>
        </div>
      )}

      <ScheduleSheet open={showSched} onClose={()=>setShowSched(false)} taskId={schedTaskId}/>
      <TaskDetailSheet taskId={detailId} open={!!detailId} onClose={()=>setDetailId(null)}/>
      <TriageSuggestSheet open={showTriage} onClose={()=>setShowTriage(false)} today={today}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={today}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PLAN PAGE — 14일 + 이벤트 추가
═══════════════════════════════════════════ */
function PlanPage(){
  const {data,toggleDone,deleteTask,moveTomorrow,deleteBlock,addTask}=useApp();
  const [expanded,setExpanded]=useState(null);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [addEventDate,setAddEventDate]=useState(null);
  const [detailId,setDetailId]=useState(null);
  const today=todayStr();

  const days=useMemo(()=>Array.from({length:14},(_,i)=>addDays(today,i)),[today]);

  function toggle(d){setExpanded(e=>e===d?null:d);}
  function openAddEvent(d){setAddEventDate(d);setShowAddEvent(true);}

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      <div style={{padding:'22px 0 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>PLAN</div>
        <div style={{fontSize:12,color:'var(--t3)'}}>14일 뷰</div>
      </div>

      {days.map(d=>{
        const f=fmt(d);
        const isToday=d===today;
        const tasks=data.tasks.filter(t=>!t.deletedAt&&t.dueDate===d&&t.status!=='inbox');
        const events=data.events.filter(e=>!e.deletedAt&&e.startDateTime?.slice(0,10)===d);
        const blocks=data.timeBlocks.filter(b=>!b.deletedAt&&b.date===d);
        const done=tasks.filter(t=>t.status==='done').length;
        const total=tasks.length;
        const pct=total>0?Math.round((done/total)*100):0;
        const isOpen=expanded===d;
        const workCount=tasks.filter(t=>t.domain==='work'&&t.status!=='done').length;
        const persCount=tasks.filter(t=>t.domain==='personal'&&t.status!=='done').length;
        const a1s=tasks.filter(t=>t.domain==='work'&&bucketOf(t,d)==='A1');

        return(
          <div key={d} style={{marginBottom:8}}>
            <button onClick={()=>toggle(d)} className="press" style={{
              width:'100%',display:'flex',alignItems:'center',gap:12,padding:'13px 16px',
              borderRadius:isOpen?'14px 14px 0 0':14,
              background:isToday?'var(--s2)':'var(--s1)',
              border:`1px solid ${isToday?'var(--work)':'var(--b1)'}`,
              borderBottom:isOpen?'1px solid var(--b1)':undefined,
              textAlign:'left',cursor:'pointer',transition:'border-radius 0.15s'
            }}>
              <div style={{width:44,flexShrink:0,textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:isToday?'var(--work)':'var(--t1)',lineHeight:1}}>{f.d}</div>
                <div style={{fontSize:10,color:isToday?'var(--work)':'var(--t3)',fontWeight:isToday?700:400,marginTop:1}}>{f.day}</div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:3}}>
                  {isToday&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--work)',color:'#fff',fontWeight:700}}>TODAY</span>}
                  {workCount>0&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--wlow)',color:'var(--work)',fontWeight:600}}>Work {workCount}</span>}
                  {persCount>0&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--plow)',color:'var(--personal)',fontWeight:600}}>Personal {persCount}</span>}
                  {events.length>0&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--purplow)',color:'var(--purple)',fontWeight:600}}>📅 {events.length}</span>}
                  {a1s.length>0&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--a1low)',color:'var(--a1c)',fontWeight:700}}>A1 {a1s.length}</span>}
                </div>
                {total>0&&<div className="prog-track" style={{height:2}}><div className="prog-fill" style={{width:`${pct}%`}}/></div>}
                {total===0&&events.length===0&&<div style={{fontSize:12,color:'var(--t3)'}}>할 일 없음</div>}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                {total>0&&<span className="mono" style={{fontSize:11,color:'var(--t3)'}}>{done}/{total}</span>}
                <Ic n={isOpen?'chevDown':'chevRight'} s={15} c="var(--t3)"/>
              </div>
            </button>

            {isOpen&&(
              <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderTop:'none',borderRadius:'0 0 14px 14px',padding:'12px 12px 14px'}}>
                {events.length>0&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>일정</div>
                    {events.map(e=>(
                      <div key={e.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',borderRadius:9,background:'var(--s2)',marginBottom:4,border:'1px solid var(--b1)'}}>
                        <Ic n="calendar" s={13} c="var(--personal)"/>
                        <div style={{flex:1,fontSize:13}}>{e.title}</div>
                        <div className="mono" style={{fontSize:11,color:'var(--t3)'}}>{e.startDateTime?.slice(11,16)}</div>
                      </div>
                    ))}
                  </div>
                )}
                {blocks.length>0&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>타임블록</div>
                    {blocks.map(b=>(
                      <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',borderRadius:9,background:'var(--s2)',marginBottom:4,border:'1px solid var(--b1)',borderLeft:`3px solid ${b.domain==='personal'?'var(--personal)':'var(--work)'}`}}>
                        <div style={{flex:1,fontSize:13}}>{b.title}</div>
                        <div className="mono" style={{fontSize:11,color:'var(--t3)'}}>{b.startTime}–{b.endTime}</div>
                        <button onClick={()=>deleteBlock(b.id)} className="press" style={{width:22,height:22,borderRadius:11,background:'transparent',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
                          <Ic n="x" s={11} c="var(--t3)"/>
                        </button>
                      </div>
                    ))}
                  </div>
                )}
                {tasks.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>
                    {tasks.map(t=>(
                      <TaskRow key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} onTomorrow={moveTomorrow} projects={data.projects} compact onOpenDetail={(id)=>setDetailId(id)}/>
                    ))}
                  </div>
                )}
                <button onClick={()=>openAddEvent(d)} className="press" style={{width:'100%',height:36,borderRadius:9,background:'transparent',border:'1px dashed var(--b2)',color:'var(--t3)',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Ic n="plus" s={13} c="var(--t3)"/> 일정 추가
                </button>
              </div>
            )}
          </div>
        );
      })}
      <TaskDetailSheet taskId={detailId} open={!!detailId} onClose={()=>setDetailId(null)}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={addEventDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SIGNAL PAGE — 9-Bucket Board (완성)
═══════════════════════════════════════════ */
function SignalPage(){
  const {data,toggleDone,deleteTask,moveTomorrow,showToast,updateTask}=useApp();
  const [view,setView]=useState('board');
  const [detailId,setDetailId]=useState(null);
  const today=todayStr();

  const active=useMemo(()=>data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.status!=='inbox'),[data.tasks]);

  const byBucket=useMemo(()=>{
    const m=new Map();
    for(const b of ALL_BUCKETS)m.set(b,[]);
    for(const t of active){const b=bucketOf(t,today);if(m.has(b))m.get(b).push(t);}
    return m;
  },[active,today]);

  const stats=useMemo(()=>{
    const a1=byBucket.get('A1')||[];
    const b1=byBucket.get('B1')||[];
    const c1=byBucket.get('C1')||[];
    const deepWork=active.filter(t=>t.type==='deepwork').length;
    const totalMin=active.reduce((s,t)=>s+(t.durationMin||0),0);
    return{a1:a1.length,b1:b1.length,c1:c1.length,deepWork,totalMin,total:active.length};
  },[active,byBucket]);

  const BUCKET_LABELS={
    A1:'긴급+중요',A2:'중요',A3:'중요(여유)',
    B1:'긴급',B2:'보통',B3:'낮음',
    C1:'긴급(낮음)',C2:'낮음',C3:'나중에'
  };
  const BUCKET_COLORS={
    A1:'var(--a1c)',A2:'var(--danger)',A3:'var(--warn)',
    B1:'var(--orange)',B2:'var(--work)',B3:'var(--t2)',
    C1:'var(--warn)',C2:'var(--t3)',C3:'var(--t3)'
  };
  const BUCKET_BG={
    A1:'var(--a1low)',A2:'var(--dlow)',A3:'var(--warnlow)',
    B1:'var(--orangelow)',B2:'var(--wlow)',B3:'var(--s2)',
    C1:'var(--warnlow)',C2:'var(--s2)',C3:'var(--s2)'
  };

  function promoteToA1(taskId){
    updateTask(taskId,{priority:1,dueDate:today});
    showToast('A1으로 승격됨','success');
  }

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      <div style={{padding:'22px 0 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>SIGNAL</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setView('board')} className="press" style={{height:30,padding:'0 12px',borderRadius:8,border:`1px solid ${view==='board'?'var(--work)':'var(--b1)'}`,background:view==='board'?'var(--wlow)':'transparent',color:view==='board'?'var(--work)':'var(--t3)',fontSize:12,fontWeight:600}}>보드</button>
            <button onClick={()=>setView('list')} className="press" style={{height:30,padding:'0 12px',borderRadius:8,border:`1px solid ${view==='list'?'var(--work)':'var(--b1)'}`,background:view==='list'?'var(--wlow)':'transparent',color:view==='list'?'var(--work)':'var(--t3)',fontSize:12,fontWeight:600}}>목록</button>
          </div>
        </div>

        {/* Stats bar */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
          {[
            [stats.a1,'A1','var(--a1c)','var(--a1low)'],
            [stats.b1,'B1','var(--orange)','var(--orangelow)'],
            [stats.deepWork,'딥워크','var(--purple)','var(--purplow)'],
            [Math.round(stats.totalMin/60)+'h','총 시간','var(--t2)','var(--s2)'],
          ].map(([v,l,c,bg])=>(
            <div key={l} style={{textAlign:'center',padding:'10px 6px',borderRadius:12,background:bg,border:`1px solid ${c}30`}}>
              <div className="mono" style={{fontSize:18,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
              <div style={{fontSize:10,color:'var(--t3)',marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {view==='board'?(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
          {ALL_BUCKETS.map(b=>{
            const tasks=byBucket.get(b)||[];
            const c=BUCKET_COLORS[b];
            const bg=BUCKET_BG[b];
            return(
              <div key={b} style={{background:'var(--s1)',border:`1px solid ${c}30`,borderRadius:12,overflow:'hidden'}}>
                <div style={{padding:'8px 10px',background:bg,borderBottom:`1px solid ${c}25`}}>
                  <div style={{fontSize:13,fontWeight:800,color:c}}>{b}</div>
                  <div style={{fontSize:9,color:'var(--t3)',marginTop:1,fontWeight:500}}>{BUCKET_LABELS[b]}</div>
                  <div className="mono" style={{fontSize:10,color:c,marginTop:2,fontWeight:700}}>{tasks.length}</div>
                </div>
                <div style={{padding:'6px',display:'flex',flexDirection:'column',gap:4,minHeight:60}}>
                  {tasks.slice(0,4).map(t=>(
                    <button key={t.id} onClick={()=>setDetailId(t.id)} className="press" style={{
                      textAlign:'left',padding:'6px 8px',borderRadius:8,background:'var(--s2)',border:'1px solid var(--b1)',
                      fontSize:11,color:'var(--t1)',lineHeight:1.3,width:'100%'
                    }}>
                      <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{t.title}</div>
                      <div style={{display:'flex',gap:4,alignItems:'center'}}>
                        {t.durationMin&&<span className="mono" style={{fontSize:9,color:'var(--t3)'}}>{t.durationMin}m</span>}
                        {(b==='B1'||b==='C1')&&<button onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();promoteToA1(t.id);}} style={{fontSize:8,padding:'1px 4px',borderRadius:3,background:'var(--a1low)',border:'none',color:'var(--a1c)',fontWeight:700,cursor:'pointer'}}>↑A1</button>}
                      </div>
                    </button>
                  ))}
                  {tasks.length>4&&<div style={{fontSize:10,color:'var(--t3)',textAlign:'center',padding:'4px 0'}}>+{tasks.length-4}개</div>}
                  {tasks.length===0&&<div style={{fontSize:10,color:'var(--t3)',textAlign:'center',padding:'8px 0'}}>없음</div>}
                </div>
              </div>
            );
          })}
        </div>
      ):(
        <div>
          {ALL_BUCKETS.map(b=>{
            const tasks=byBucket.get(b)||[];
            if(tasks.length===0)return null;
            const c=BUCKET_COLORS[b];
            return(
              <div key={b} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:800,color:c}}>{b}</span>
                  <span style={{fontSize:11,color:'var(--t3)'}}>{BUCKET_LABELS[b]}</span>
                  <span className="mono" style={{fontSize:11,color:c,marginLeft:'auto'}}>{tasks.length}</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  {tasks.map(t=>(
                    <TaskRow key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} onTomorrow={moveTomorrow} projects={data.projects} onOpenDetail={(id)=>setDetailId(id)}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      <TaskDetailSheet taskId={detailId} open={!!detailId} onClose={()=>setDetailId(null)}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MONTH PAGE
═══════════════════════════════════════════ */
function MonthPage(){
  const {data,deleteEvent}=useApp();
  const [cur,setCur]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [sel,setSel]=useState(null);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [addEventDate,setAddEventDate]=useState(null);
  const today=todayStr();

  const {y,m}=cur;
  const firstDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DN=['일','월','화','수','목','금','토'];

  function dateStr(d){return d?`${y}-${p2(m+1)}-${p2(d)}`:null;}
  function dotsFor(d){
    if(!d)return{work:0,personal:0,event:0};
    const ds=dateStr(d);
    const work=data.tasks.filter(t=>!t.deletedAt&&t.dueDate===ds&&t.domain==='work'&&t.status!=='done').length;
    const personal=data.tasks.filter(t=>!t.deletedAt&&t.dueDate===ds&&t.domain==='personal'&&t.status!=='done').length;
    const event=data.events.filter(e=>!e.deletedAt&&e.startDateTime?.slice(0,10)===ds).length;
    return{work,personal,event};
  }

  const selStr=sel?dateStr(sel):null;
  const selTasks=selStr?data.tasks.filter(t=>!t.deletedAt&&t.dueDate===selStr&&t.status!=='inbox'):[];
  const selEvents=selStr?data.events.filter(e=>!e.deletedAt&&e.startDateTime?.slice(0,10)===selStr):[];
  const selBlocks=selStr?data.timeBlocks.filter(b=>!b.deletedAt&&b.date===selStr):[];

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      <div style={{padding:'22px 0 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <button onClick={()=>setCur(c=>{const nm=c.m-1;return nm<0?{y:c.y-1,m:11}:{y:c.y,m:nm};})} className="press" style={{width:36,height:36,borderRadius:18,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="chevLeft" s={18} c="var(--t2)"/>
          </button>
          <div style={{fontSize:20,fontWeight:700}}>{y}년 {MN[m]}</div>
          <button onClick={()=>setCur(c=>{const nm=c.m+1;return nm>11?{y:c.y+1,m:0}:{y:c.y,m:nm};})} className="press" style={{width:36,height:36,borderRadius:18,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="chevRight" s={18} c="var(--t2)"/>
          </button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:8}}>
          {DN.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:i===0?'var(--danger)':i===6?'var(--work)':'var(--t3)',padding:'4px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const ds=dateStr(d);
            const isToday=ds===today;
            const isSel=sel===d&&cur.y===new Date().getFullYear()&&cur.m===new Date().getMonth()||sel===d;
            const dots=dotsFor(d);
            const dow=i%7;
            const isWeekend=dow===0||dow===6;
            return(
              <button key={i} onClick={()=>setSel(s=>s===d?null:d)} className="press" style={{
                aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                borderRadius:10,border:`1px solid ${isSel?'var(--work)':isToday?'rgba(79,142,247,0.4)':'transparent'}`,
                background:isSel?'var(--wlow)':isToday?'var(--s2)':'transparent',
                cursor:'pointer',gap:2,padding:2
              }}>
                <div style={{fontSize:13,fontWeight:isToday?700:400,color:isToday?'var(--work)':isWeekend?'var(--t2)':'var(--t1)',lineHeight:1}}>{d}</div>
                <div style={{display:'flex',gap:2,justifyContent:'center'}}>
                  {dots.work>0&&<span className="dot" style={{background:'var(--work)',width:4,height:4}}/>}
                  {dots.personal>0&&<span className="dot" style={{background:'var(--personal)',width:4,height:4}}/>}
                  {dots.event>0&&<span className="dot" style={{background:'var(--purple)',width:4,height:4}}/>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {sel&&selStr&&(
        <div style={{marginTop:4}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700}}>{fmt(selStr).full}</div>
            <button onClick={()=>{setAddEventDate(selStr);setShowAddEvent(true);}} className="press" style={{display:'flex',alignItems:'center',gap:6,height:32,padding:'0 12px',borderRadius:10,background:'var(--wlow)',border:'1px solid rgba(79,142,247,0.3)',color:'var(--work)',fontSize:12,fontWeight:600}}>
              <Ic n="plus" s={13} c="var(--work)"/> 일정 추가
            </button>
          </div>
          {selEvents.length>0&&(
            <div style={{marginBottom:12}}>
              <SecLabel>📅 일정</SecLabel>
              {selEvents.map(e=>(
                <div key={e.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 13px',borderRadius:11,background:'var(--s1)',border:'1px solid var(--b1)',marginBottom:6}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500}}>{e.title}</div>
                    <div className="mono" style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{e.startDateTime?.slice(11,16)} – {e.endDateTime?.slice(11,16)}</div>
                  </div>
                  <button onClick={()=>deleteEvent(e.id)} className="press" style={{width:28,height:28,borderRadius:14,background:'transparent',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Ic n="trash" s={13} c="var(--t3)"/>
                  </button>
                </div>
              ))}
            </div>
          )}
          {selBlocks.length>0&&(
            <div style={{marginBottom:12}}>
              <SecLabel>⏱ 타임블록</SecLabel>
              {selBlocks.map(b=>(
                <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 13px',borderRadius:11,background:'var(--s1)',border:'1px solid var(--b1)',borderLeft:`3px solid ${b.domain==='personal'?'var(--personal)':'var(--work)'}`,marginBottom:5}}>
                  <div style={{flex:1,fontSize:13}}>{b.title}</div>
                  <div className="mono" style={{fontSize:11,color:'var(--t3)'}}>{b.startTime}–{b.endTime}</div>
                </div>
              ))}
            </div>
          )}
          {selTasks.length>0&&(
            <div>
              <SecLabel>할 일 ({selTasks.length})</SecLabel>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {selTasks.map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 13px',borderRadius:11,background:'var(--s1)',border:'1px solid var(--b1)'}}>
                    <div style={{width:8,height:8,borderRadius:4,background:t.domain==='work'?'var(--work)':'var(--personal)',flexShrink:0}}/>
                    <div style={{flex:1,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:t.status==='done'?'var(--t3)':'var(--t1)',textDecoration:t.status==='done'?'line-through':'none'}}>{t.title}</div>
                    <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'var(--s2)',color:'var(--t3)',fontWeight:600}}>{bucketOf(t,selStr)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {selTasks.length===0&&selEvents.length===0&&selBlocks.length===0&&(
            <div style={{textAlign:'center',padding:'24px 0',color:'var(--t3)',fontSize:13}}>이 날은 아무것도 없어요</div>
          )}
        </div>
      )}
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={addEventDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   INBOX PAGE — AI 분류 + 일괄 정리
═══════════════════════════════════════════ */
function InboxPage(){
  const {data,addTask,organizeTask,deleteTask,showToast}=useApp();
  const [text,setText]=useState('');
  const [showOrg,setShowOrg]=useState(false);
  const [orgTask,setOrgTask]=useState(null);
  const [showBulk,setShowBulk]=useState(false);
  const [bulkSel,setBulkSel]=useState({});
  const ref=useRef();

  const inbox=data.tasks.filter(t=>t.status==='inbox'&&!t.deletedAt);

  function add(){
    if(!text.trim())return;
    const tri=heuristicTriage(text.trim(),todayStr());
    addTask({title:text.trim(),status:'inbox',domain:null,priority:tri.priority,durationMin:tri.durationMin,type:tri.type});
    setText('');
    ref.current?.focus();
  }

  function openOrg(t){setOrgTask(t);setShowOrg(true);}

  function autoOrganize(t){
    const tri=heuristicTriage(t.title,todayStr());
    organizeTask(t.id,{
      domain:tri.type==='errand'?'personal':'work',
      dueDate:tri.dueDate||addDays(todayStr(),1),
      priority:tri.priority,
      durationMin:tri.durationMin,
      type:tri.type,
    });
    showToast('자동 정리됨','success');
  }

  function bulkAutoOrganize(){
    const ids=Object.keys(bulkSel).filter(id=>bulkSel[id]);
    if(!ids.length){showToast('선택된 항목 없음');return;}
    for(const id of ids){
      const t=data.tasks.find(x=>x.id===id);
      if(t)autoOrganize(t);
    }
    setBulkSel({});setShowBulk(false);
    showToast(`${ids.length}개 자동 정리됨`,'success');
  }

  function bulkDelete(){
    const ids=Object.keys(bulkSel).filter(id=>bulkSel[id]);
    if(!ids.length){showToast('선택된 항목 없음');return;}
    for(const id of ids)deleteTask(id);
    setBulkSel({});setShowBulk(false);
  }

  const typeColors={deepwork:'var(--purple)',admin:'var(--t3)',call:'var(--personal)',errand:'var(--warn)'};
  const typeLabels={deepwork:'🧠 딥워크',admin:'📋 어드민',call:'📞 콜',errand:'🚗 심부름'};

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      <div style={{padding:'22px 0 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div>
            <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em'}}>INBOX</div>
            <div style={{fontSize:13,color:'var(--t3)',marginTop:3}}>{inbox.length}개 대기중</div>
          </div>
          {inbox.length>0&&(
            <button onClick={()=>{setShowBulk(!showBulk);if(!showBulk)setBulkSel({});}} className="press" style={{height:34,padding:'0 14px',borderRadius:10,background:showBulk?'var(--wlow)':'var(--s2)',border:`1px solid ${showBulk?'var(--work)':'var(--b1)'}`,color:showBulk?'var(--work)':'var(--t2)',fontSize:12,fontWeight:600}}>
              {showBulk?'선택 취소':'일괄 정리'}
            </button>
          )}
        </div>

        {/* Input */}
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <input ref={ref} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
            placeholder="무엇이든 입력 → Enter (자동 분류)..."
            style={{flex:1,padding:'13px 15px',borderRadius:12,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:15,color:'var(--t1)'}}
          />
          <button onClick={add} className="press" style={{width:48,height:48,borderRadius:12,background:'var(--work)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Ic n="plus" s={22} c="#fff"/>
          </button>
        </div>

        {/* Bulk actions */}
        {showBulk&&inbox.length>0&&(
          <div style={{display:'flex',gap:8,marginBottom:14,padding:'10px 14px',background:'var(--s2)',borderRadius:12,border:'1px solid var(--b1)'}}>
            <button onClick={()=>{const all={};inbox.forEach(t=>all[t.id]=true);setBulkSel(all);}} className="press" style={{fontSize:12,color:'var(--work)',background:'none',border:'none',padding:'4px 8px',cursor:'pointer',fontWeight:600}}>전체 선택</button>
            <button onClick={()=>setBulkSel({})} className="press" style={{fontSize:12,color:'var(--t3)',background:'none',border:'none',padding:'4px 8px',cursor:'pointer'}}>해제</button>
            <div style={{flex:1}}/>
            <button onClick={bulkAutoOrganize} className="press" style={{height:32,padding:'0 12px',borderRadius:8,background:'var(--wlow)',border:'1px solid rgba(79,142,247,0.3)',color:'var(--work)',fontSize:12,fontWeight:700}}>
              <Ic n="sparkle" s={12} c="var(--work)"/> AI 정리
            </button>
            <button onClick={bulkDelete} className="press" style={{height:32,padding:'0 12px',borderRadius:8,background:'var(--dlow)',border:'1px solid rgba(245,101,101,0.3)',color:'var(--danger)',fontSize:12,fontWeight:700}}>
              삭제
            </button>
          </div>
        )}
      </div>

      {inbox.length===0?(
        <div style={{textAlign:'center',padding:'50px 20px'}}>
          <div style={{fontSize:52,marginBottom:12}}>📥</div>
          <div style={{fontSize:17,color:'var(--t2)',marginBottom:6,fontWeight:600}}>인박스가 비었어요!</div>
          <div style={{fontSize:13,color:'var(--t3)'}}>위에 입력하거나 FAB(+)으로 추가하세요</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {inbox.map(t=>{
            const tri=heuristicTriage(t.title,todayStr());
            const tc=typeColors[t.type||tri.type]||'var(--t3)';
            const tl=typeLabels[t.type||tri.type]||'📋 어드민';
            const isSel=!!bulkSel[t.id];
            return(
              <div key={t.id} style={{
                display:'flex',alignItems:'center',gap:10,padding:'12px 14px',
                borderRadius:13,background:'var(--s1)',border:`1px solid ${isSel?'var(--work)':'var(--b1)'}`,
                transition:'border-color 0.15s'
              }}>
                {showBulk&&(
                  <button onClick={()=>setBulkSel(s=>({...s,[t.id]:!s[t.id]}))} style={{width:20,height:20,borderRadius:10,border:`2px solid ${isSel?'var(--work)':'var(--b2)'}`,background:isSel?'var(--work)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
                    {isSel&&<Ic n="check" s={10} c="#fff"/>}
                  </button>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                  <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--s2)',color:tc,fontWeight:600}}>{tl}</span>
                    <span className="mono" style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--s2)',color:'var(--t3)'}}>{t.durationMin||tri.durationMin}m</span>
                    <span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:'var(--s2)',color:t.priority===1?'var(--danger)':t.priority===2?'var(--warn)':'var(--t3)',fontWeight:600}}>P{t.priority||tri.priority}</span>
                  </div>
                </div>
                {!showBulk&&(
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>autoOrganize(t)} className="press" style={{height:30,padding:'0 10px',borderRadius:8,background:'var(--s2)',border:'1px solid var(--b1)',color:'var(--t2)',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                      <Ic n="sparkle" s={11} c="var(--work)"/> AI
                    </button>
                    <button onClick={()=>openOrg(t)} className="press" style={{height:30,padding:'0 10px',borderRadius:8,background:'var(--wlow)',border:'1px solid rgba(79,142,247,0.3)',color:'var(--work)',fontSize:11,fontWeight:700}}>
                      정리
                    </button>
                    <button onClick={()=>deleteTask(t.id)} className="press" style={{width:30,height:30,borderRadius:8,background:'transparent',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Ic n="x" s={13} c="var(--t3)"/>
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <OrganizeSheet task={orgTask} open={showOrg} onClose={()=>setShowOrg(false)}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SETTINGS PAGE (신규)
═══════════════════════════════════════════ */
function SettingsPage(){
  const {data,updateSettings,addProject,deleteProject,addHabit,deleteHabit,toggleHabitLog,resetData,showToast}=useApp();
  const s=data.settings;
  const today=todayStr();
  const [newProj,setNewProj]=useState('');
  const [newProjColor,setNewProjColor]=useState('#4F8EF7');
  const [newHabit,setNewHabit]=useState('');
  const [newHabitIcon,setNewHabitIcon]=useState('🏃');
  const [showReset,setShowReset]=useState(false);

  const COLORS=['#4F8EF7','#A78BFA','#34D399','#F59E0B','#F56565','#2DD4BF','#FB923C','#EC4899'];
  const HABIT_ICONS=['🏃','💧','📚','🧘','💊','🥗','😴','✍️','🎯','🏋️'];

  function addProj(){
    if(!newProj.trim())return;
    addProject({name:newProj.trim(),color:newProjColor});
    setNewProj('');
    showToast('프로젝트 추가됨','success');
  }
  function addHabitFn(){
    if(!newHabit.trim())return;
    addHabit({name:newHabit.trim(),icon:newHabitIcon,frequency:'daily'});
    setNewHabit('');
    showToast('습관 추가됨','success');
  }

  // Habit streak calculation
  function getStreak(habitId){
    let streak=0;
    let d=today;
    while(true){
      const key=`${habitId}::${d}`;
      if(data.habitLogs.find(l=>l.key===key)){streak++;d=addDays(d,-1);}
      else break;
    }
    return streak;
  }

  return(
    <div className="scroll" style={{flex:1,padding:'0 16px 110px'}}>
      <div style={{padding:'22px 0 14px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:4}}>SETTINGS</div>
        <div style={{fontSize:13,color:'var(--t3)'}}>워크플로우 & 환경 설정</div>
      </div>

      {/* Workday */}
      <div style={{marginBottom:24}}>
        <SecLabel>⏰ 업무 시간</SecLabel>
        <Card>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['workdayStart','시작'],['workdayEnd','종료'],['lunchStart','점심 시작'],['lunchEnd','점심 종료']].map(([k,l])=>(
              <div key={k}>
                <div style={{fontSize:11,color:'var(--t3)',marginBottom:5,fontWeight:600}}>{l}</div>
                <input type="time" value={s[k]||''} onChange={e=>updateSettings({[k]:e.target.value})}
                  style={{width:'100%',padding:'9px 12px',borderRadius:10,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:14,color:'var(--t1)',cursor:'pointer'}}/>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* Deep Work Windows */}
      <div style={{marginBottom:24}}>
        <SecLabel>🧠 딥워크 윈도우</SecLabel>
        <Card>
          {(s.deepWorkWindows||[]).map((w,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:i<(s.deepWorkWindows||[]).length-1?10:0}}>
              <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <input type="time" value={w.start} onChange={e=>{const nw=[...s.deepWorkWindows];nw[i]={...nw[i],start:e.target.value};updateSettings({deepWorkWindows:nw});}}
                  style={{padding:'8px 10px',borderRadius:9,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:13,color:'var(--t1)',cursor:'pointer'}}/>
                <input type="time" value={w.end} onChange={e=>{const nw=[...s.deepWorkWindows];nw[i]={...nw[i],end:e.target.value};updateSettings({deepWorkWindows:nw});}}
                  style={{padding:'8px 10px',borderRadius:9,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:13,color:'var(--t1)',cursor:'pointer'}}/>
              </div>
              <button onClick={()=>{const nw=s.deepWorkWindows.filter((_,j)=>j!==i);updateSettings({deepWorkWindows:nw});}} className="press" style={{width:28,height:28,borderRadius:14,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Ic n="x" s={13} c="var(--t3)"/>
              </button>
            </div>
          ))}
          <button onClick={()=>updateSettings({deepWorkWindows:[...(s.deepWorkWindows||[]),{start:'16:00',end:'18:00'}]})} className="press" style={{width:'100%',height:36,borderRadius:9,background:'transparent',border:'1px dashed var(--b2)',color:'var(--t3)',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginTop:10}}>
            <Ic n="plus" s={13} c="var(--t3)"/> 윈도우 추가
          </button>
        </Card>
      </div>

      {/* Projects */}
      <div style={{marginBottom:24}}>
        <SecLabel>📁 프로젝트</SecLabel>
        <Card>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
            {data.projects.map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:10,height:10,borderRadius:5,background:p.color,flexShrink:0}}/>
                <div style={{flex:1,fontSize:14}}>{p.name}</div>
                <button onClick={()=>deleteProject(p.id)} className="press" style={{width:28,height:28,borderRadius:14,background:'transparent',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ic n="trash" s={13} c="var(--t3)"/>
                </button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input value={newProj} onChange={e=>setNewProj(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addProj()}
              placeholder="새 프로젝트 이름..."
              style={{flex:1,padding:'9px 12px',borderRadius:9,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:13,color:'var(--t1)'}}/>
            <div style={{display:'flex',gap:4}}>
              {COLORS.map(c=>(
                <button key={c} onClick={()=>setNewProjColor(c)} style={{width:18,height:18,borderRadius:9,background:c,border:`2px solid ${newProjColor===c?'#fff':'transparent'}`,cursor:'pointer'}}/>
              ))}
            </div>
            <button onClick={addProj} className="press" style={{width:36,height:36,borderRadius:9,background:'var(--work)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ic n="plus" s={18} c="#fff"/>
            </button>
          </div>
        </Card>
      </div>

      {/* Habits */}
      <div style={{marginBottom:24}}>
        <SecLabel>🔁 습관 트래커</SecLabel>
        <Card>
          {data.habits.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
              {data.habits.map(h=>{
                const key=`${h.id}::${today}`;
                const done=!!data.habitLogs.find(l=>l.key===key);
                const streak=getStreak(h.id);
                return(
                  <div key={h.id} style={{display:'flex',alignItems:'center',gap:12}}>
                    <button onClick={()=>toggleHabitLog(h.id,today)} style={{
                      width:32,height:32,borderRadius:16,
                      border:`2px solid ${done?'var(--success)':'var(--b2)'}`,
                      background:done?'var(--success)':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',
                      transition:'all 0.15s'
                    }}>
                      {done?<Ic n="check" s={14} c="#052e16"/>:<span style={{fontSize:16}}>{h.icon}</span>}
                    </button>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:done?500:400,color:done?'var(--success)':'var(--t1)'}}>{h.name}</div>
                      {streak>0&&<div style={{fontSize:11,color:'var(--warn)'}}>🔥 {streak}일 연속</div>}
                    </div>
                    <button onClick={()=>deleteHabit(h.id)} className="press" style={{width:28,height:28,borderRadius:14,background:'transparent',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Ic n="x" s={13} c="var(--t3)"/>
                    </button>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
              {HABIT_ICONS.map(ic=>(
                <button key={ic} onClick={()=>setNewHabitIcon(ic)} style={{width:30,height:30,borderRadius:8,background:newHabitIcon===ic?'var(--wlow)':'var(--s2)',border:`1px solid ${newHabitIcon===ic?'var(--work)':'var(--b1)'}`,fontSize:16,cursor:'pointer'}}>{ic}</button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <input value={newHabit} onChange={e=>setNewHabit(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addHabitFn()}
              placeholder="새 습관 이름..."
              style={{flex:1,padding:'9px 12px',borderRadius:9,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:13,color:'var(--t1)'}}/>
            <button onClick={addHabitFn} className="press" style={{width:36,height:36,borderRadius:9,background:'var(--personal)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ic n="plus" s={18} c="#fff"/>
            </button>
          </div>
        </Card>
      </div>

      {/* Stats */}
      <div style={{marginBottom:24}}>
        <SecLabel>📊 통계</SecLabel>
        <Card>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {[
              [data.tasks.filter(t=>t.status==='done').length,'완료된 태스크','var(--success)'],
              [data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.status!=='inbox').length,'진행중','var(--work)'],
              [data.tasks.filter(t=>t.status==='inbox').length,'인박스','var(--warn)'],
            ].map(([v,l,c])=>(
              <div key={l} style={{textAlign:'center',padding:'12px 8px',background:'var(--s2)',borderRadius:10}}>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:10,color:'var(--t3)',marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,padding:'10px 12px',background:'var(--s2)',borderRadius:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div style={{fontSize:12,color:'var(--t2)'}}>전체 완료율</div>
              <div className="mono" style={{fontSize:12,fontWeight:700,color:'var(--success)'}}>
                {data.tasks.length>0?Math.round((data.tasks.filter(t=>t.status==='done').length/data.tasks.filter(t=>!t.deletedAt).length)*100):0}%
              </div>
            </div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${data.tasks.length>0?Math.round((data.tasks.filter(t=>t.status==='done').length/data.tasks.filter(t=>!t.deletedAt).length)*100):0}%`}}/></div>
          </div>
        </Card>
      </div>

      {/* Danger zone */}
      <div style={{marginBottom:24}}>
        <SecLabel>⚠️ 데이터</SecLabel>
        <Card>
          {!showReset?(
            <button onClick={()=>setShowReset(true)} className="press" style={{width:'100%',height:44,borderRadius:10,background:'transparent',border:'1px solid var(--danger)',color:'var(--danger)',fontSize:14,fontWeight:600}}>
              데이터 초기화
            </button>
          ):(
            <div>
              <div style={{fontSize:13,color:'var(--t2)',marginBottom:12,textAlign:'center'}}>정말 모든 데이터를 초기화할까요? 되돌릴 수 없습니다.</div>
              <div style={{display:'flex',gap:10}}>
                <GhostBtn onClick={()=>setShowReset(false)}>취소</GhostBtn>
                <PrimaryBtn danger onClick={()=>{resetData();setShowReset(false);}}>초기화</PrimaryBtn>
              </div>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TAB BAR
═══════════════════════════════════════════ */
function TabBar({tab,setTab,inboxCount}){
  const {data}=useApp();
  const today=todayStr();
  const a1Count=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,today)==='A1').length;

  const tabs=[
    {id:'today',icon:'today',label:'Today'},
    {id:'plan',icon:'plan',label:'Plan'},
    {id:'signal',icon:'signal',label:'Signal'},
    {id:'inbox',icon:'inbox',label:'Inbox'},
    {id:'settings',icon:'settings',label:'Settings'},
  ];
  return(
    <div className="tab-bar">
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',height:56}}>
        {tabs.map(t=>{
          const active=tab===t.id;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              gap:2,background:'none',border:'none',cursor:'pointer',
              color:active?'var(--work)':'var(--t3)',transition:'color 0.15s ease',position:'relative'
            }}>
              {active&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:28,height:2,borderRadius:1,background:'var(--work)'}}/>}
              <div style={{position:'relative'}}>
                <Ic n={t.icon} s={18} c={active?'var(--work)':'var(--t3)'}/>
                {t.id==='inbox'&&inboxCount>0&&(
                  <div style={{position:'absolute',top:-3,right:-4,width:14,height:14,borderRadius:7,background:'var(--danger)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:'#fff'}}>{inboxCount>9?'9+':inboxCount}</div>
                )}
                {t.id==='signal'&&a1Count>0&&(
                  <div style={{position:'absolute',top:-3,right:-4,width:14,height:14,borderRadius:7,background:'var(--a1c)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:'#fff'}}>{a1Count>9?'9+':a1Count}</div>
                )}
              </div>
              <span style={{fontSize:9,fontWeight:active?700:400,letterSpacing:'0.02em'}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('today');
  const [showQuick,setShowQuick]=useState(false);
  const [quickTarget,setQuickTarget]=useState('inbox');
  const {data}=useApp();
  const inboxCount=data.tasks.filter(t=>t.status==='inbox'&&!t.deletedAt).length;
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)',position:'relative',overflow:'hidden'}}>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='today'&&<TodayPage onSignalTab={()=>setTab('signal')}/>}
        {tab==='plan'&&<PlanPage/>}
        {tab==='signal'&&<SignalPage/>}
        {tab==='inbox'&&<InboxPage/>}
        {tab==='settings'&&<SettingsPage/>}
      </div>
      <FAB onShort={()=>{setQuickTarget('inbox');setShowQuick(true);}} onLong={()=>{setQuickTarget('today');setShowQuick(true);}}/>
      <TabBar tab={tab} setTab={setTab} inboxCount={inboxCount}/>
      <QuickAddSheet open={showQuick} onClose={()=>setShowQuick(false)} defTarget={quickTarget}/>
    </div>
  );
}

/* Boot */
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppProvider><App/></AppProvider>);
</script>
</body>
</html>
