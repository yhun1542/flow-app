                type="password" style={inp}/>
              <select value={mRole} onChange={e=>setMRole(e.target.value)} style={{...inp}}>
                <option value="parent">부모</option>
                <option value="child">아이</option>
                <option value="teacher">선생님</option>

              <input value={mColor} onChange={e=>setMColor(e.target.value)} type="color"

              {editMemberId&&(

          </div>

          {['parent','child','teacher'].map(r=>{

                    {studentList.length>0&&(

                    <button onClick={()=>setLessonActive(l.id, isArchived)} className="press no-dim"
                      style={{padding:'6px 10px',borderRadius:10,border:'1px solid var(--b1)',fontSize:11,fontWeight:700}}>
                      {isArchived?'복원':'아카이브'}
                    </button>
                    <button onClick={()=>handleDeleteLesson(l)} className="press no-dim"
                      style={{padding:'6px 10px',borderRadius:10,border:'1px solid var(--b1)',fontSize:11,fontWeight:700,color:'var(--danger)'}}>삭제</button>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.7,paddingBottom:12,marginTop:4}}>
            💡 선생님 지정 시 해당 계정에 접근 권한 자동 부여<br/>
            💡 아카이브: 운영 화면에서 숨김 (데이터 보존)
          </div>
        </div>
      )}

      <div style={{height:'env(safe-area-inset-bottom,0px)'}}/>
    </div>
  );
}

  const [tempFocus,setTempFocus]=useState([]);
  // AI 브리핑
  const [aiBriefing,setAiBriefing]=useState('');
  const [aiBriefingLoading,setAiBriefingLoading]=useState(false);
  async function generateAIBriefing(){
    if(aiBriefingLoading) return;
    setAiBriefingLoading(true);
    try{
      const taskList=todayTasks.slice(0,10).map(t=>`- ${t.title} (${t.domain}, ${t.type||'todo'})`).join('\n');
      const overdueList=overdue.slice(0,5).map(t=>`- ${t.title} (${relativeDay(t.dueDate)})`).join('\n');
      const prompt=`오늘 날짜: ${today}\n\n오늘 할 일 ${todayTasks.length}개:\n${taskList||'없음'}\n\n지연 ${overdue.length}개:\n${overdueList||'없음'}\n\n위 정보를 바탕으로 오늘의 업무 브리핑을 2-3문장으로 작성해주세요. 핵심 우선순위와 주의사항을 포함하세요.`;
      const result=await callAI(prompt,'openai','당신은 생산성 코치입니다. 간결하고 실용적인 조언을 한국어로 제공하세요.');
      setAiBriefing(result);
    }catch(e){setAiBriefing('AI 브리핑을 불러올 수 없습니다.');}
    setAiBriefingLoading(false);
  }
  // 모듈 접기 상태
  const [collapseWork,setCollapseWork]=useState(false);
  const [collapsePersonal,setCollapsePersonal]=useState(false);
  const [collapseTimeline,setCollapseTimeline]=useState(true); // 기본 접기
  const [collapseDone,setCollapseDone]=useState(true);

  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const todayTasks=tasks.filter(t=>t.dueDate===today&&t.status!=='done');
  const doneTodayTasks=tasks.filter(t=>t.dueDate===today&&t.status==='done');
  const totalToday=todayTasks.length+doneTodayTasks.length;
  const doneCount=doneTodayTasks.length;
  const pct=totalToday>0?Math.round((doneCount/totalToday)*100):0;
  const isToday=viewDate===todayReal;

  // Focus 3: 자동 선택 (점수 기반 상위 3개)
  const allCandidates=tasks
    .filter(t=>t.status!=='done'&&(t.dueDate===today||t.priority===1))
    .sort((a,b)=>scoreTask(b,today)-scoreTask(a,today));
  const focus3=selectedFocus&&selectedFocus.length>0
    ? selectedFocus.map(id=>tasks.find(t=>t.id===id)).filter(Boolean)
    : allCandidates.slice(0,3);

  // Work tasks grouped by project
  const workTasks=todayTasks.filter(t=>t.domain==='work');
  const projMap={};
  for(const t of workTasks){
    const key=t.projectId||'__none__';
    if(!projMap[key])projMap[key]=[];
    projMap[key].push(t);
  }
  // Personal tasks
  const personalTasks=todayTasks.filter(t=>t.domain==='personal');
  // Overdue
  const overdue=tasks.filter(t=>t.status!=='done'&&t.dueDate&&t.dueDate<today);
  // Today's blocks and events
  const todayBlocks=data.timeBlocks.filter(b=>!b.deletedAt&&b.date===today);
  const todayEvents=data.events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===today);
  // Family summary (for parent)
  const isParent=currentUser.role==='parent';
  const familyProgress=isParent?data.familyMembers.filter(m=>m.role==='child').map(child=>{
    const childTasks=tasks.filter(t=>t.assigneeId===child.id||t.ownerUserId===child.id);
    const done=childTasks.filter(t=>t.status==='done').length;
    return{child,done,total:childTasks.length};
  }):[];

  // Focus3 전체 목록 토글 열기
  function openFocusAll(){
    setTempFocus(selectedFocus||focus3.map(t=>t.id));
    setShowFocusAll(true);
  }
  function saveFocus(){
    setSelectedFocus(tempFocus.slice(0,3));
    setShowFocusAll(false);
    showToast('Focus 3 저장됨');
  }
  function toggleTempFocus(id){
    setTempFocus(prev=>{
      if(prev.includes(id)) return prev.filter(x=>x!==id);
      if(prev.length>=3) return [...prev.slice(1),id];
      return [...prev,id];
    });
  }

  // ── v19 카드형 섹션 헤더 헬퍼 ──
  const modHdr=(icon,iconBg,title,sub,count,collapsed,onToggle,onAdd)=>(
    <div className="mod-card-header" onClick={onToggle} style={{cursor:'pointer'}}>
      <div className="mod-card-header-left">
        <div className="mod-card-icon" style={{background:iconBg}}>{icon}</div>
        <div>
          <div className="mod-card-title">{title}</div>
          {sub&&<div className="mod-card-subtitle">{sub}</div>}
        </div>
        {count>0&&<span className="mod-card-badge">{count}</span>}
        <span style={{fontSize:10,color:'var(--t3)'}}>{collapsed?'▶':'▼'}</span>
      </div>
      {onAdd&&<button onClick={e=>{e.stopPropagation();onAdd();}} className="mod-card-action">+ 추가</button>}
    </div>
  );

  return(
    <div className="scroll" style={{flex:1,padding:'0 0 80px',background:'var(--bg)'}}>
      {/* ── 헤더 영역 ── */}
      <div style={{padding:'12px 16px 0',background:'var(--bg)'}}>
        {/* 로고 + 날짜 네비게이터 한 줄 */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,borderBottom:'1px solid var(--b1)',paddingBottom:12}}>
          <LogoMark size={26}/>
          <button onClick={()=>setViewDate(addDays(today,-1))} style={{width:30,height:30,borderRadius:8,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t1)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>‹</button>
          <div style={{flex:1,textAlign:'center'}}>
            <div style={{fontSize:15,fontWeight:800,color:'var(--t1)',letterSpacing:-0.3}}>{fmt(today).full}</div>
          </div>
          <button onClick={()=>setViewDate(addDays(today,1))} style={{width:30,height:30,borderRadius:8,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t1)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>›</button>
           {!isToday&&<button onClick={()=>setViewDate(todayReal)} style={{fontSize:11,padding:'4px 8px',borderRadius:7,border:'none',background:'var(--work)',color:'#fff',cursor:'pointer',fontWeight:700,flexShrink:0}}>오늘</button>}
          <ThemeToggle/>
        </div>
        {/* 액션 버튼 */}
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          <button onClick={()=>setShowTriage(true)} style={{padding:'7px 10px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>⚡ 우선순위</button>
          <button onClick={()=>setShowSchedule(true)} style={{padding:'7px 10px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>🗓 자동배치</button>
        </div>
        {/* ── v19 진행률 모듈 카드 ── */}
        <div className="mod-card" style={{marginBottom:14}}>
          <div style={{padding:'14px 16px 10px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:'var(--t1)',letterSpacing:-0.2}}>오늘 진행률</div>
                <div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>
                  {pct===100?'🎉 모두 완료!':pct>=50?`잘 하고 있어요 · ${totalToday-doneCount}개 남음`:`${totalToday-doneCount}개 남음`}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <span style={{fontSize:28,fontWeight:900,color:pct===100?'var(--success)':pct>=50?'var(--work)':'var(--warn)',letterSpacing:-1.5}}>{pct}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--t2)'}}>%</span>
              </div>
            </div>
            <div className="progress-bar-wrap">
              <div className="progress-bar-fill" style={{width:`${pct}%`,background:pct===100?'var(--success)':pct>=50?'var(--work)':'var(--warn)'}}/>
            </div>
          </div>
          <div className="stat-grid" style={{borderTop:'1px solid var(--b1)'}}>
            <div className="stat-cell">
              <span className="stat-cell-value" style={{color:'var(--success)',fontSize:18}}>{doneCount}</span>
              <span className="stat-cell-label">완료</span>
            </div>
            <div className="stat-cell">
              <span className="stat-cell-value" style={{color:'var(--work)',fontSize:18}}>{totalToday-doneCount}</span>
              <span className="stat-cell-label">남은 일</span>
            </div>
            <div className="stat-cell">
              <span className="stat-cell-value" style={{color:'var(--danger)',fontSize:18}}>{overdue.length}</span>
              <span className="stat-cell-label">지연</span>
            </div>
          </div>
          {doneCount>0&&(
            <div className="mod-card-footer">
              <button onClick={()=>setCollapseDone(v=>!v)} className="mod-card-footer-btn">
                {collapseDone?'✓ 완료 항목 보기 ▼':'완료 항목 숨기기 ▲'}
              </button>
            </div>
          )}
        </div>
      </div>

      <div style={{padding:'0 16px'}}>
        {/* ── v19 AI 브리핑 모듈 카드 ── */}
        {(aiBriefing||aiBriefingLoading)&&(
          <div className="mod-card" style={{marginBottom:14,background:'linear-gradient(135deg,var(--wlow),var(--purplow))'}}>
            <div className="mod-card-header" style={{borderBottom:'1px solid var(--wmid)'}}>
              <div className="mod-card-header-left">
                <div className="mod-card-icon" style={{background:'var(--wmid)'}}>🤖</div>
                <div>
                  <div className="mod-card-title" style={{color:'var(--work)'}}>AI 오늘의 브리핑</div>
                  <div className="mod-card-subtitle">AI가 분석한 오늘의 우선순위</div>
                </div>
              </div>
              <button onClick={()=>setAiBriefing('')} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:18,padding:'4px'}}>×</button>
            </div>
            <div className="mod-card-body padded">
              <div style={{fontSize:14,color:'var(--t1)',lineHeight:1.7}}>
                {aiBriefingLoading?<span className="pulse">🤖 분석 중...</span>:aiBriefing}
              </div>
            </div>
          </div>
        )}
        {!aiBriefing&&!aiBriefingLoading&&(
          <button onClick={generateAIBriefing} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'14px',marginBottom:14,border:'1.5px dashed var(--b2)',background:'transparent',cursor:'pointer',color:'var(--t2)',fontSize:13,fontWeight:700,borderRadius:20}}>
            🤖 AI 오늘의 브리핑 생성
          </button>
        )}
        {/* ── v19 지연 모듈 카드 ── */}
        {overdue.length>0&&(
          <div className="mod-card" style={{marginBottom:14,borderColor:'rgba(220,38,38,0.25)'}}>
            <div className="mod-card-header" style={{background:'var(--dlow)',borderBottom:'1px solid rgba(220,38,38,0.15)'}}>
              <div className="mod-card-header-left">
                <div className="mod-card-icon" style={{background:'rgba(220,38,38,0.2)'}}>⚠️</div>
                <div>
                  <div className="mod-card-title" style={{color:'var(--danger)'}}>지연 항목</div>
                  <div className="mod-card-subtitle">즉시 처리가 필요합니다</div>
                </div>
                <span className="mod-card-badge" style={{background:'var(--dlow)',color:'var(--danger)'}}>{overdue.length}</span>
              </div>
            </div>
            <div className="mod-card-body">
              {overdue.slice(0,3).map(t=>(
                <div key={t.id} className="list-item" onClick={()=>setDetailTask(t)}>
                  <span className="badge-dot" style={{background:'var(--danger)'}}/>
                  <div className="list-item-content">
                    <div className="list-item-title">{t.title}</div>
                    <div className="list-item-meta">{t.projectId||t.domain}</div>
                  </div>
                  <span style={{fontSize:11,color:'var(--danger)',fontWeight:700,flexShrink:0}}>{relativeDay(t.dueDate)}</span>
                </div>
              ))}
              {overdue.length>3&&(
                <div style={{padding:'10px 16px',textAlign:'center',fontSize:11,color:'var(--danger)',opacity:0.7}}>+{overdue.length-3}개 더</div>
              )}
            </div>
          </div>
        )}

        {/* ── v19 Focus 3 모듈 카드 ── */}
        <div style={{marginBottom:14}}>
          <div className="mod-card">
            <div className="mod-card-header">
              <div className="mod-card-header-left">
                <div className="mod-card-icon" style={{background:'rgba(255,107,107,0.15)'}}>🎯</div>
                <div>
                  <div className="mod-card-title">Focus 3</div>
                  <div className="mod-card-subtitle">오늘 최우선 집중 과제</div>
                </div>
                {selectedFocus&&<span style={{fontSize:10,background:'var(--work)',color:'#fff',borderRadius:6,padding:'2px 7px',fontWeight:700}}>수동</span>}
              </div>
              <button onClick={openFocusAll} className="mod-card-action">수정</button>
            </div>
            <div className="mod-card-body">
            {focus3.length===0&&<div style={{padding:'20px',textAlign:'center',color:'var(--t3)',fontSize:13}}>오늘 할 일이 없습니다</div>}
            {focus3.map((t,i)=>(
              <div key={t.id} className="focus-card-item press" onClick={()=>setDetailTask(t)}>
                <div className="focus-num" style={{background:i===0?'var(--a1c)':i===1?'var(--warn)':'var(--s3)',color:i<2?'#fff':'var(--t2)'}}>
                  {i+1}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                  <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center',flexWrap:'wrap'}}>
                    <span className="meta-chip" style={{background:'var(--s2)',color:'var(--t3)'}}>{t.type==='deepwork'?'🧠 딥워크':t.type==='call'?'📞 통화':t.type==='meeting'?'🤝 회의':t.type||'할일'}</span>
                    {t.durationMin>0&&<span className="meta-chip" style={{background:'var(--s2)',color:'var(--t3)'}}>{t.durationMin}분</span>}
                    {t.projectId&&data.projects.find(p=>p.id===t.projectId)&&<span className="meta-chip" style={{background:'var(--wlow)',color:'var(--work)'}}>{data.projects.find(p=>p.id===t.projectId).name}</span>}
                  </div>
                </div>
                <span className="prio-badge" style={{background:t.priority===1?'var(--a1low)':t.priority===2?'var(--warnlow)':'var(--s2)',color:t.priority===1?'var(--a1c)':t.priority===2?'var(--warn)':'var(--t3)'}}>
                  {t.priority===1?'A1':t.priority===2?'B1':'C1'}
                </span>
              </div>
            ))}
          </div>
        </div>

        {/* ── v19 업무 모듈 카드 ── */}
        <div className="mod-card" style={{marginBottom:14}}>
            {modHdr('💼','var(--wlow)','업무','오늘 업무 할 일',workTasks.length,collapseWork,()=>setCollapseWork(v=>!v),()=>setShowAddTask(true))}
            {!collapseWork&&(
              <div className="mod-card-body">
                {Object.entries(projMap).map(([projId,ptasks],gi)=>{
                  const proj=projId!=='__none__'?data.projects.find(p=>p.id===projId):null;
                  return(
                    <div key={projId}>
                      {proj&&<div style={{fontSize:11,fontWeight:700,color:proj.color,padding:'8px 16px 4px',display:'flex',alignItems:'center',gap:6,borderTop:gi>0?'1px solid var(--b1)':'none'}}>
                        <span style={{width:7,height:7,borderRadius:3.5,background:proj.color,display:'inline-block'}}/>
                        {proj.name}
                      </div>}
                      {ptasks.map((t,i)=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject={false}/>)}
                    </div>
                  );
                })}
                {workTasks.length===0&&(
                  <div className="empty-state">
                    <span className="empty-state-icon">💼</span>
                    <span>오늘 업무 할 일이 없습니다</span>
                    <button onClick={()=>setShowAddTask(true)} style={{fontSize:12,color:'var(--work)',background:'var(--wlow)',border:'none',borderRadius:8,padding:'6px 14px',fontWeight:700,cursor:'pointer',marginTop:4}}>+ 업무 추가</button>
                  </div>
                )}
              </div>
            )}
        </div>

        {/* ── v19 개인 모듈 카드 ── */}
        {(personalTasks.length>0||true)&&(
          <div className="mod-card" style={{marginBottom:14}}>
            {modHdr('🌿','var(--plow)','개인','오늘 개인 할 일',personalTasks.length,collapsePersonal,()=>setCollapsePersonal(v=>!v),()=>setShowAddTask(true))}
            {!collapsePersonal&&(
              <div className="mod-card-body">
                {personalTasks.length===0&&(
                  <div className="empty-state">
                    <span className="empty-state-icon">🌿</span>
                    <span>오늘 개인 할 일이 없습니다</span>
                    <button onClick={()=>setShowAddTask(true)} style={{fontSize:12,color:'var(--personal)',background:'var(--plow)',border:'none',borderRadius:8,padding:'6px 14px',fontWeight:700,cursor:'pointer',marginTop:4}}>+ 개인 추가</button>
                  </div>
                )}
                {personalTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask}/>)}
              </div>
            )}
          </div>
        )}

        {/* ── v19 타임라인 모듈 카드 ── */}
        <div className="mod-card" style={{marginBottom:14}}>
          {modHdr('📅','var(--orangelow)','타임라인','일정 및 시간 블록',todayBlocks.length+todayEvents.length,collapseTimeline,()=>setCollapseTimeline(v=>!v),()=>setShowAddEvent(true))}
          {!collapseTimeline&&(
            <div className="mod-card-body" style={{padding:'8px 0'}}>
              <Timeline date={today} blocks={todayBlocks} events={todayEvents} onAddEvent={()=>setShowAddEvent(true)}/>
            </div>
          )}
        </div>

        {/* ── v19 완료 모듈 카드 ── */}
        {doneTodayTasks.length>0&&!collapseDone&&(
          <div className="mod-card" style={{marginBottom:14,opacity:0.85}}>
            {modHdr('✅','var(--slow)','완료','오늘 완료한 항목',doneTodayTasks.length,false,()=>setCollapseDone(true),null)}
            <div className="mod-card-body">
              {doneTodayTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} compact/>)}
            </div>
          </div>
        )}

        {/* ── v19 가족 현황 모듈 카드 (부모만) ── */}
        {isParent&&familyProgress.length>0&&(
          <div className="mod-card" style={{marginBottom:14}}>
            <div className="mod-card-header">
              <div className="mod-card-header-left">
                <div className="mod-card-icon" style={{background:'var(--purplow)'}}>👨‍👩‍👧</div>
                <div>
                  <div className="mod-card-title">가족 현황</div>
                  <div className="mod-card-subtitle">오늘 가족 진행률</div>
                </div>
                <span className="mod-card-badge">{familyProgress.length}명</span>
              </div>
            </div>
            <div className="mod-card-body">
              {familyProgress.map(({child,done,total},i)=>(
                <div key={child.id} className="list-item" style={{borderBottom:i<familyProgress.length-1?'1px solid var(--b1)':'none'}}>
                  <span style={{fontSize:24}}>{child.avatar||'👤'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{child.name}</div>
                    <div style={{height:5,background:'var(--s3)',borderRadius:3,marginTop:6,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${total>0?Math.round(done/total*100):0}%`,background:'var(--success)',borderRadius:3,transition:'width 0.5s ease'}}/>
                    </div>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--t2)',flexShrink:0}}>{done}/{total}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Focus3 전체 보기 모달 ── */}
      {showFocusAll&&(
        <div style={{position:'fixed',inset:0,background:'var(--overlay)',zIndex:200,display:'flex',alignItems:'flex-end'}} onClick={()=>setShowFocusAll(false)}>
          <div style={{width:'100%',background:'var(--s1)',borderRadius:'20px 20px 0 0',padding:'20px 16px 40px',maxHeight:'80vh',overflow:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:800,color:'var(--t1)'}}>전체 할 일</div>
                <div style={{fontSize:12,color:'var(--t3)',marginTop:2}}>최대 3개 선택 → Focus 3으로 저장</div>
              </div>
              <button onClick={saveFocus} style={{padding:'8px 16px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>저장</button>
            </div>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:8}}>선택됨: {tempFocus.length}/3</div>
            {allCandidates.map((t,i)=>{
              const sel=tempFocus.includes(t.id);
              const selIdx=tempFocus.indexOf(t.id);
              return(
                <div key={t.id} onClick={()=>toggleTempFocus(t.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:12,marginBottom:6,background:sel?'var(--wlow)':'var(--s2)',border:`1.5px solid ${sel?'var(--work)':'var(--b1)'}`,cursor:'pointer',transition:'all 0.15s'}}>
                  <div style={{width:26,height:26,borderRadius:8,background:sel?'var(--work)':'var(--s3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}>
                    <span style={{fontSize:12,fontWeight:900,color:sel?'#fff':'var(--t3)'}}>{sel?selIdx+1:'○'}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                    <div style={{display:'flex',gap:6,marginTop:3}}>
                      <span style={{fontSize:11,color:'var(--t3)',background:'var(--s3)',borderRadius:5,padding:'1px 6px'}}>{t.type||'할일'}</span>
                      {t.dueDate&&<span style={{fontSize:11,color:t.dueDate<today?'var(--danger)':'var(--t3)'}}>{relativeDay(t.dueDate)}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:11,fontWeight:800,color:t.priority===1?'var(--a1c)':t.priority===2?'var(--warn)':'var(--t3)',flexShrink:0,background:t.priority===1?'var(--a1low)':t.priority===2?'var(--warnlow)':'var(--s2)',borderRadius:6,padding:'3px 7px'}}>
                    {t.priority===1?'A1':t.priority===2?'B1':'C1'}
                  </span>
                </div>
              );
            })}
            {allCandidates.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:'30px 0',fontSize:14}}>할 일이 없습니다</div>}
            <button onClick={()=>{setSelectedFocus(null);setShowFocusAll(false);showToast('자동 선택으로 초기화');}} style={{width:'100%',marginTop:12,padding:'12px',borderRadius:12,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>자동 선택으로 초기화</button>
          </div>
        </div>
      )}

      {/* Sheets */}
      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <ScheduleSheet open={showSchedule} onClose={()=>setShowSchedule(false)} date={today}/>
      <TriageSuggestSheet open={showTriage} onClose={()=>setShowTriage(false)}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={today}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={today}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PLAN PAGE (14-day)
═══════════════════════════════════════════ */
function PlanPage(){
  const {data}=useApp();
  const today=todayStr();
  const [expandedDate,setExpandedDate]=useState(today);
  const [detailTask,setDetailTask]=useState(null);
  // v19 모듈 헤더 헬퍼
  const modHdr=(icon,iconBg,title,sub,count,collapsed,onToggle,onAdd)=>(
    <div className="mod-card-header" onClick={onToggle} style={{cursor:'pointer'}}>
      <div className="mod-card-header-left">
        <div className="mod-card-icon" style={{background:iconBg}}>{icon}</div>
        <div>
          <div className="mod-card-title">{title}</div>
          {sub&&<div className="mod-card-subtitle">{sub}</div>}
        </div>
        {count>0&&<span className="mod-card-badge">{count}</span>}
        <span style={{fontSize:10,color:'var(--t3)'}}>{collapsed?'▶':'▼'}</span>
      </div>
      {onAdd&&<button onClick={e=>{e.stopPropagation();onAdd();}} className="mod-card-action">+ 추가</button>}
    </div>
  );
  const [showAddTask,setShowAddTask]=useState(false);
  const [addTaskDate,setAddTaskDate]=useState(today);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [showSchedule,setShowSchedule]=useState(false);
  const [scheduleDate,setScheduleDate]=useState(today);

  const days=Array.from({length:14},(_,i)=>addDays(today,i));
  const tasks=data.tasks.filter(t=>!t.deletedAt);

  function tasksForDate(d){
    return tasks.filter(t=>t.dueDate===d&&t.status!=='done');
  }
  function eventsForDate(d){
    return data.events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===d);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{fontSize:22,fontWeight:900,color:'var(--t1)',marginBottom:20}}>14일 계획</div>
      {days.map(d=>{
        const f=fmt(d);
        const dayTasks=tasksForDate(d);
        const dayEvents=eventsForDate(d);
        const isToday=d===today;
        const isExpanded=expandedDate===d;
        const isWeekend=f.dow===0||f.dow===6;
        const hasDone=tasks.filter(t=>t.dueDate===d&&t.status==='done').length;

        return(
          <div key={d} style={{marginBottom:8}}>
            <div
              className="press"
              onClick={()=>setExpandedDate(isExpanded?null:d)}
              style={{
                display:'flex',alignItems:'center',gap:12,
                padding:'12px 16px',borderRadius:14,
                background:isToday?'var(--wlow)':isExpanded?'var(--s2)':'var(--s1)',
                border:`1.5px solid ${isToday?'var(--work)':isExpanded?'var(--b2)':'var(--b1)'}`,
                cursor:'pointer',
              }}
            >
              <div style={{textAlign:'center',minWidth:36}}>
                <div style={{fontSize:18,fontWeight:900,color:isToday?'var(--work)':isWeekend?'var(--danger)':'var(--t1)'}}>{f.d}</div>
                <div style={{fontSize:10,color:isToday?'var(--work)':'var(--t3)'}}>{f.day}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {dayEvents.slice(0,2).map(e=>(
                    <span key={e.id} style={{fontSize:11,background:'var(--orangelow)',color:'var(--orange)',borderRadius:6,padding:'2px 6px',fontWeight:600}}>{e.title}</span>
                  ))}
                  {dayTasks.slice(0,3).map(t=>(
                    <span key={t.id} style={{fontSize:11,background:t.priority===1?'var(--a1low)':'var(--s3)',color:t.priority===1?'var(--a1c)':'var(--t2)',borderRadius:6,padding:'2px 6px'}}>{t.title}</span>
                  ))}
                  {dayTasks.length===0&&dayEvents.length===0&&<span style={{fontSize:12,color:'var(--t3)'}}>비어있음</span>}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
                {dayTasks.length>0&&<span style={{fontSize:11,fontWeight:700,color:'var(--t2)'}}>{dayTasks.length}개</span>}
                {hasDone>0&&<span style={{fontSize:10,color:'var(--success)'}}>✓{hasDone}</span>}
                <span style={{fontSize:12,color:'var(--t3)'}}>{isExpanded?'▲':'▼'}</span>
              </div>
            </div>

            {isExpanded&&(
              <div style={{background:'var(--s2)',borderRadius:'0 0 14px 14px',padding:'12px 16px',border:'1px solid var(--b1)',borderTop:'none',marginTop:-4}}>
                {dayEvents.map(e=>(
                  <div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--b1)'}}>
                    <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'var(--orange)',minWidth:80}}>{(e.startDateTime||'').slice(11,16)} – {(e.endDateTime||'').slice(11,16)}</span>
                    <span style={{fontSize:13,color:'var(--t1)'}}>{e.title}</span>
                    <span style={{fontSize:10,background:'var(--orangelow)',color:'var(--orange)',borderRadius:4,padding:'1px 5px'}}>일정</span>
                  </div>
                ))}
                {dayTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject compact/>)}
                {tasks.filter(t=>t.dueDate===d&&t.status==='done').map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} compact/>)}
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  <button onClick={()=>{setAddTaskDate(d);setShowAddTask(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:12,cursor:'pointer'}}>+ 태스크</button>
                  <button onClick={()=>{setAddTaskDate(d);setShowAddEvent(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:12,cursor:'pointer'}}>+ 일정</button>
                  <button onClick={()=>{setScheduleDate(d);setShowSchedule(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>자동배치</button>
                </div>
              </div>
            )}
          </div>
        );
      })}

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={addTaskDate}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={addTaskDate}/>
      <ScheduleSheet open={showSchedule} onClose={()=>setShowSchedule(false)} date={scheduleDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MONTH PAGE
═══════════════════════════════════════════ */
function MonthPage(){
  const {data}=useApp();
  const today=todayStr();
  const [viewDate,setViewDate]=useState(()=>{const[y,m]=today.split('-').map(Number);return{y,m};});
  const [selectedDate,setSelectedDate]=useState(today);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [showAddTask,setShowAddTask]=useState(false);
  const [detailTask,setDetailTask]=useState(null);

  const {y,m}=viewDate;
  const firstDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const events=data.events.filter(e=>!e.deletedAt);

  function dotsForDate(d){
    const dateStr=`${y}-${p2(m)}-${p2(d)}`;
    const hasTasks=tasks.some(t=>t.dueDate===dateStr&&t.status!=='done');
    const hasEvents=events.some(e=>(e.startDateTime||'').slice(0,10)===dateStr);
    const hasPersonal=tasks.some(t=>t.dueDate===dateStr&&t.domain==='personal'&&t.status!=='done');
    return{hasTasks,hasEvents,hasPersonal};
  }

  const selDateStr=selectedDate;
  const selTasks=tasks.filter(t=>t.dueDate===selDateStr);
  const selEvents=events.filter(e=>(e.startDateTime||'').slice(0,10)===selDateStr);

  const DOW=['일','월','화','수','목','금','토'];

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <button onClick={()=>setViewDate(v=>v.m===1?{y:v.y-1,m:12}:{y:v.y,m:v.m-1})} style={{background:'var(--s2)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',color:'var(--t1)',fontSize:16}}>‹</button>
        <span style={{fontSize:20,fontWeight:900,color:'var(--t1)'}}>{y}년 {m}월</span>
        <button onClick={()=>setViewDate(v=>v.m===12?{y:v.y+1,m:1}:{y:v.y,m:v.m+1})} style={{background:'var(--s2)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',color:'var(--t1)',fontSize:16}}>›</button>
      </div>

      {/* DOW headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {DOW.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:i===0?'var(--danger)':i===6?'var(--work)':'var(--t3)',padding:'4px 0'}}>{d}</div>)}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {Array.from({length:firstDay},(_,i)=><div key={'e'+i}/>)}
        {Array.from({length:daysInMonth},(_,i)=>{
          const d=i+1;
          const dateStr=`${y}-${p2(m)}-${p2(d)}`;
          const isToday=dateStr===today;
          const isSel=dateStr===selectedDate;
          const isWeekend=new Date(y,m-1,d).getDay()===0||new Date(y,m-1,d).getDay()===6;
          const dots=dotsForDate(d);
          return(
            <div key={d} className="press" onClick={()=>setSelectedDate(dateStr)} style={{
              textAlign:'center',padding:'6px 2px',borderRadius:10,cursor:'pointer',
              background:isSel?'var(--work)':isToday?'var(--wlow)':'transparent',
              border:isToday&&!isSel?'1.5px solid var(--work)':'1.5px solid transparent',
            }}>
              <div style={{fontSize:14,fontWeight:isToday||isSel?700:400,color:isSel?'#fff':isWeekend?'var(--danger)':'var(--t1)'}}>{d}</div>
              <div style={{display:'flex',justifyContent:'center',gap:2,marginTop:2}}>
                {dots.hasTasks&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--work)'}}/>}
                {dots.hasPersonal&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--personal)'}}/>}
                {dots.hasEvents&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--orange)'}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      <div style={{marginTop:20,background:'var(--s1)',borderRadius:16,border:'1px solid var(--b1)',padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:16,color:'var(--t1)'}}>{fmt(selDateStr).full}</span>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowAddTask(true)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:12,cursor:'pointer'}}>+ 태스크</button>
            <button onClick={()=>setShowAddEvent(true)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--work)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>+ 일정</button>
          </div>
        </div>
        {selEvents.map(e=>(
          <div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--b1)'}}>
            <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'var(--orange)',minWidth:80}}>{(e.startDateTime||'').slice(11,16)} – {(e.endDateTime||'').slice(11,16)}</span>
            <span style={{fontSize:13,color:'var(--t1)',flex:1}}>{e.title}</span>
          </div>
        ))}
        {selTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject/>)}
        {selTasks.length===0&&selEvents.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:'20px 0',fontSize:13}}>이 날은 비어있어요</div>}
      </div>

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={selectedDate}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={selectedDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SIGNAL PAGE (9-Bucket Board)
═══════════════════════════════════════════ */
function SignalPage(){
  const {data,updateTask,showToast}=useApp();
  const today=todayStr();
  const [view,setView]=useState('board'); // 'board' | 'list'
  const [detailTask,setDetailTask]=useState(null);
  const [showTriage,setShowTriage]=useState(false);

  const tasks=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work');

  const buckets=useMemo(()=>{
    const map={};
    for(const b of ALL_BUCKETS)map[b]=[];
    for(const t of tasks){
      const b=bucketOf(t,today);
      if(map[b])map[b].push(t);
    }
    return map;
  },[tasks,today]);

  const a1Count=buckets['A1']?.length||0;
  const b1Count=buckets['B1']?.length||0;
  const deepMin=tasks.filter(t=>t.type==='deepwork').reduce((s,t)=>s+(t.durationMin||0),0);
  const totalMin=tasks.reduce((s,t)=>s+(t.durationMin||0),0);

  function promote(taskId){
    updateTask(taskId,{priority:1,dueDate:today});
    showToast('A1으로 승격됨','success');
  }

  const BUCKET_COLORS={
    A1:'var(--a1c)',A2:'var(--warn)',A3:'var(--t3)',
    B1:'var(--work)',B2:'var(--purple)',B3:'var(--t3)',
    C1:'var(--personal)',C2:'var(--t3)',C3:'var(--t3)',
  };

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>Signal</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setView(v=>v==='board'?'list':'board')} style={{padding:'8px 12px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:12,cursor:'pointer'}}>{view==='board'?'목록':'보드'}</button>
          <button onClick={()=>setShowTriage(true)} style={{padding:'8px 12px',borderRadius:10,border:'none',background:'var(--a1c)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>⚡ 승격</button>
        </div>
      </div>

      {/* Stats bar */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:20}}>
        {[
          ['A1',a1Count+'개','var(--a1c)'],
          ['B1',b1Count+'개','var(--work)'],
          ['딥워크',deepMin+'분','var(--purple)'],
          ['총',totalMin+'분','var(--t2)'],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:'var(--s2)',borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',fontWeight:600}}>{l}</div>
            <div style={{fontSize:16,fontWeight:800,color:c,marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>

      {view==='board'?(
        /* Board view: 3x3 grid */
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:2,marginBottom:4}}>
            {['긴급(1)','보통(2)','여유(3)'].map(l=><div key={l} style={{textAlign:'center',fontSize:10,color:'var(--t3)',fontWeight:700,padding:'4px'}}>{l}</div>)}
          </div>
          {['A','B','C'].map(imp=>(
            <div key={imp} style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4,marginBottom:4}}>
              {[1,2,3].map(urg=>{
                const b=imp+urg;
                const bTasks=buckets[b]||[];
                const col=BUCKET_COLORS[b];
                return(
                  <div key={b} style={{background:'var(--s2)',borderRadius:12,padding:'8px',minHeight:80,border:`1.5px solid ${b==='A1'?'var(--a1c)':b==='B1'?'var(--work)':'var(--b1)'}`}}>
                    <div style={{fontSize:10,fontWeight:800,color:col,marginBottom:6}}>{b}</div>
                    {bTasks.slice(0,3).map(t=>(
                      <div key={t.id} className="press" onClick={()=>setDetailTask(t)} style={{fontSize:10,color:'var(--t1)',padding:'3px 0',borderBottom:'1px solid var(--b1)',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {t.title}
                      </div>
                    ))}
                    {bTasks.length>3&&<div style={{fontSize:9,color:'var(--t3)',marginTop:4}}>+{bTasks.length-3}개</div>}
                    {bTasks.length===0&&<div style={{fontSize:10,color:'var(--t3)',textAlign:'center',marginTop:8}}>—</div>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      ):(
        /* List view */
        <div>
          {ALL_BUCKETS.filter(b=>(buckets[b]||[]).length>0).map(b=>{
            const bTasks=buckets[b]||[];
            const col=BUCKET_COLORS[b];
            return(
              <div key={b} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:800,color:col}}>{b}</span>
                  <span style={{fontSize:11,color:'var(--t3)'}}>{bTasks.length}개</span>
                  {b==='B1'&&<button onClick={()=>setShowTriage(true)} style={{fontSize:10,padding:'3px 8px',borderRadius:6,border:'none',background:'var(--a1c)',color:'#fff',cursor:'pointer',fontWeight:700}}>↑A1 승격</button>}
                </div>
                {bTasks.map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <div style={{flex:1}}><TaskRow task={t} onTap={setDetailTask} showProject compact/></div>
                    {b==='B1'&&<button onClick={()=>promote(t.id)} style={{padding:'6px 10px',borderRadius:8,border:'none',background:'var(--a1low)',color:'var(--a1c)',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>↑A1</button>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <TriageSuggestSheet open={showTriage} onClose={()=>setShowTriage(false)}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   INBOX PAGE
═══════════════════════════════════════════ */
function InboxPage(){
  const {data,addTask,deleteTask,showToast}=useApp();
  const [input,setInput]=useState('');
  const [organizeTask,setOrganizeTask]=useState(null);
  const [detailTask,setDetailTask]=useState(null);
  const inputRef=useRef(null);

  const inboxTasks=data.tasks.filter(t=>!t.deletedAt&&t.domain==='inbox').sort((a,b)=>b.createdAt-a.createdAt);

  function submit(){
    const title=input.trim();
    if(!title)return;
    addTask({title,domain:'inbox'});
    setInput('');
    showToast('Inbox에 추가됨');
  }

  function organizeAll(){
    if(inboxTasks.length===0)return;
    setOrganizeTask(inboxTasks[0]);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>

const EXPENSE_CATEGORIES=['식비','교육비','생활비','교통','취미','의료','쇼핑','기타'];

function BudgetPage(){
  const {data,addExpense,deleteExpense,updateBudget,showToast}=useApp();
  const today=todayStr();
  const month=today.slice(0,7);
  const [showAdd,setShowAdd]=useState(false);
  const [amount,setAmount]=useState('');
  const [category,setCategory]=useState('식비');
  const [note,setNote]=useState('');
  const [editBudget,setEditBudget]=useState(false);
  const [budgetInput,setBudgetInput]=useState(String(data.budget.total));

  const expenses=data.expenses.filter(e=>!e.deletedAt);
  const insights=useMemo(()=>computeBudgetInsights(expenses,data.budget.total,month),[expenses,data.budget.total,month]);

  function submitExpense(){
    if(!amount||isNaN(Number(amount)))return;
    addExpense({amount:Number(amount),category,note,date:today});
    setAmount('');setNote('');setShowAdd(false);
  }

  function saveBudget(){
    updateBudget({total:Number(budgetInput),month});
    setEditBudget(false);
    showToast('예산 저장됨','success');
  }

  const gaugeColor=insights.pct>=90?'var(--danger)':insights.pct>=70?'var(--warn)':'var(--success)';

          <div>
            <div style={{fontSize:12,color:'var(--t3)'}}>이번 달 예산</div>
            {editBudget?(
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
                <input type="number" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:8,padding:'6px 10px',color:'var(--t1)',fontSize:16,fontWeight:700,width:140}} onKeyDown={e=>e.key==='Enter'&&saveBudget()}/>

            <div style={{fontSize:12,color:'var(--t3)'}}>사용</div>
            <div style={{fontSize:20,fontWeight:800,color:gaugeColor}}>{insights.pct}%</div>
          </div>
        </div>
        <div className="budget-gauge">
          <div className="budget-fill" style={{width:`${Math.min(insights.pct,100)}%`,background:gaugeColor}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
          <span style={{fontSize:11,color:'var(--t3)'}}>사용 {fmtMoney(insights.total)}</span>
          <span style={{fontSize:11,color:insights.remaining<0?'var(--danger)':'var(--t3)'}}>잔여 {fmtMoney(Math.max(0,insights.remaining))}</span>
        </div>
        {insights.overBudget&&<div style={{fontSize:11,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠️ 현재 소비 속도로는 예산 초과 예상</div>}
        <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>일 평균 {fmtMoney(insights.burnRate)} · 남은 {insights.daysLeft}일 · 일 가용 {fmtMoney(Math.max(0,insights.dailyBudget))}</div>
      </div>

      {/* AI Insights cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {insights.topCats.slice(0,2).map(([cat,amt],i)=>(

          <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:'var(--t1)'}}>{e.note||e.category}</div>
              <div style={{fontSize:11,color:'var(--t3)'}}>{e.category} · {relativeDay(e.date)}</div>
            </div>
            <div style={{fontSize:16,fontWeight:800,color:'var(--t1)'}}>{fmtMoney(e.amount)}</div>
          </div>
        </SwipeRow>
      ))}

      {/* Add expense sheet */}
      <Sheet open={showAdd} onClose={()=>setShowAdd(false)} title="지출 입력">
        <div style={{paddingTop:12}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="금액" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:12,padding:'14px 16px',color:'var(--t1)',fontSize:22,fontWeight:700,width:'100%',marginBottom:14}} onKeyDown={e=>e.key==='Enter'&&submitExpense()}/>

        </div>

    </div>
  );
}

═══════════════════════════════════════════ */
function HabitsPage(){
  const {data,toggleHabitLog,addHabit,deleteHabit,showToast}=useApp();
  const today=todayStr();
  const [showAdd,setShowAdd]=useState(false);
  const [habitName,setHabitName]=useState('');
  const [habitIcon,setHabitIcon]=useState('⭐');
  const ICONS=['⭐','🏃','📚','💧','🧘','🎯','💪','🎵','✍️','🌱'];

  function computeStreak(habitId){
    let streak=0;let d=today;
    while(true){
      const key=`${habitId}::${d}`;
      if(data.habitLogs.find(l=>l.key===key)){streak++;d=addDays(d,-1);}
      else break;
      if(streak>365)break;
    }
    return streak;
  }

  function submitHabit(){
    if(!habitName.trim())return;
    addHabit({name:habitName,icon:habitIcon,frequency:'daily'});
    setHabitName('');setShowAdd(false);
    showToast('습관 추가됨','success');
  }

  const weekDays=Array.from({length:7},(_,i)=>addDays(today,-6+i));

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>습관</div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--success)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ 추가</button>
      </div>

      {/* Week header */}
      <div style={{display:'grid',gridTemplateColumns:`1fr repeat(7,32px)`,gap:4,marginBottom:8,alignItems:'center'}}>
        <div/>
        {weekDays.map(d=>{
          const f=fmt(d);
          const isToday=d===today;
          return <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:isToday?700:400,color:isToday?'var(--work)':'var(--t3)'}}>{f.d}<br/>{f.day}</div>;
        })}
      </div>

      {data.habits.map(h=>{
        const streak=computeStreak(h.id);
        const todayDone=!!data.habitLogs.find(l=>l.key===`${h.id}::${today}`);
        return(
          <div key={h.id} style={{background:'var(--s1)',borderRadius:20,padding:'12px 14px',marginBottom:8,border:'1px solid var(--b1)'}}>
            <div style={{display:'grid',gridTemplateColumns:`1fr repeat(7,32px)`,gap:4,alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:20}}>{h.icon}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{h.name}</div>
                  {streak>0&&<div style={{fontSize:11,color:'var(--warn)'}}>🔥 {streak}일 연속</div>}
                </div>
              </div>
              {weekDays.map(d=>{
                const done=!!data.habitLogs.find(l=>l.key===`${h.id}::${d}`);
                const isToday=d===today;
                return(
                  <button key={d} onClick={()=>toggleHabitLog(h.id,d)} style={{
                    width:32,height:32,borderRadius:16,border:`2px solid ${done?'var(--success)':'var(--s3)'}`,
                    background:done?'var(--success)':'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                    outline:isToday?`2px solid var(--work)`:'none',outlineOffset:1,
                  }}>
                    {done&&<span style={{color:'#fff',fontSize:12,fontWeight:800}}>✓</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {data.habits.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--t3)'}}>
          <div style={{fontSize:40,marginBottom:12}}>🌱</div>
          <div style={{fontSize:15,fontWeight:600}}>습관을 추가해보세요</div>
        </div>
      )}

      <Sheet open={showAdd} onClose={()=>setShowAdd(false)} title="습관 추가">
        <div style={{paddingTop:12}}>
          <input value={habitName} onChange={e=>setHabitName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitHabit()} placeholder="습관 이름" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:15,width:'100%',marginBottom:14}}/>
          <div style={{fontSize:12,fontWeight:600,color:'var(--t2)',marginBottom:8}}>아이콘</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setHabitIcon(ic)} style={{width:44,height:44,borderRadius:12,border:`2px solid ${habitIcon===ic?'var(--work)':'var(--b2)'}`,background:habitIcon===ic?'var(--wlow)':'var(--s2)',fontSize:22,cursor:'pointer'}}>{ic}</button>
            ))}
          </div>
          <button onClick={submitHabit} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'var(--success)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>추가하기</button>
        </div>
      </Sheet>
    </div>
  );
}

/* ═══════════════════════════════════════════
   NOTES PAGE (Brain Notes)
═══════════════════════════════════════════ */
function NotesPage(){
  const {data,addNote,deleteNote}=useApp();
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [noteTitle,setNoteTitle]=useState('');
  const [noteBody,setNoteBody]=useState('');
  const [noteTags,setNoteTags]=useState('');
  const [selectedNote,setSelectedNote]=useState(null);

  const filtered=data.notes.filter(n=>{
    if(!search)return true;
    const q=search.toLowerCase();
    return n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q));
  });

  function submitNote(){
    if(!noteTitle.trim())return;
    addNote({title:noteTitle,body:noteBody,tags:noteTags.split(',').map(t=>t.trim()).filter(Boolean),authorId:data.settings.currentUserId});
    setNoteTitle('');setNoteBody('');setNoteTags('');setShowAdd(false);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>노트</div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--purple)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ 노트</button>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="제목, 내용, 태그 검색..." style={{background:'var(--s1)',border:'1px solid var(--b2)',borderRadius:12,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:16}}/>
      {filtered.map(n=>(
        <div key={n.id} className="press" onClick={()=>setSelectedNote(n)} style={{background:'var(--s1)',borderRadius:20,padding:'14px',marginBottom:8,border:'1px solid var(--b1)',cursor:'pointer'}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--t1)',marginBottom:4}}>{n.title}</div>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.body}</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {(n.tags||[]).map(tag=>(
              <span key={tag} style={{fontSize:10,background:'var(--purplow)',color:'var(--purple)',borderRadius:4,padding:'2px 6px',fontWeight:600}}>#{tag}</span>
            ))}
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:'var(--t3)'}}>
        <div style={{fontSize:40,marginBottom:12}}>📝</div>
        <div style={{fontSize:15}}>노트가 없어요</div>
      </div>}

      <Sheet open={showAdd} onClose={()=>setShowAdd(false)} title="노트 작성" height="90vh">
        <div style={{paddingTop:12}}>
          <input value={noteTitle} onChange={e=>setNoteTitle(e.target.value)} placeholder="제목" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:16,fontWeight:700,width:'100%',marginBottom:10}}/>
          <textarea value={noteBody} onChange={e=>setNoteBody(e.target.value)} placeholder="내용을 입력하세요..." style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:14,width:'100%',minHeight:200,resize:'vertical',marginBottom:10}}/>
          <input value={noteTags} onChange={e=>setNoteTags(e.target.value)} placeholder="태그 (쉼표로 구분)" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:16}}/>
          <button onClick={submitNote} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'var(--purple)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>저장</button>
        </div>
      </Sheet>

      <Sheet open={!!selectedNote} onClose={()=>setSelectedNote(null)} title={selectedNote?.title||''} height="80vh">
        {selectedNote&&(
          <div style={{paddingTop:12}}>
            <div style={{fontSize:14,color:'var(--t1)',lineHeight:1.7,whiteSpace:'pre-wrap',marginBottom:16}}>{selectedNote.body}</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:16}}>
              {(selectedNote.tags||[]).map(tag=>(
                <span key={tag} style={{fontSize:11,background:'var(--purplow)',color:'var(--purple)',borderRadius:4,padding:'2px 8px',fontWeight:600}}>#{tag}</span>
              ))}
            </div>
            <button onClick={()=>{deleteNote(selectedNote.id);setSelectedNote(null);}} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--dlow)',color:'var(--danger)',fontWeight:700,fontSize:14,cursor:'pointer'}}>삭제</button>
          </div>
        )}
      </Sheet>
    </div>
  );
}

/* ═══════════════════════════════════════════
   FAB (Floating Action Button)
═══════════════════════════════════════════ */
function FAB({onShortPress,onLongPress}){
  const timerRef=useRef(null);
  const [pressing,setPressing]=useState(false);

  function handleStart(e){
    e.preventDefault();
    setPressing(true);
    timerRef.current=setTimeout(()=>{
      setPressing(false);
      onLongPress&&onLongPress();
    },500);
  }

  function handleEnd(e){
    e.preventDefault();
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    if(pressing){
      setPressing(false);
      onShortPress&&onShortPress();
    }
  }

  return(
    <button
      onPointerDown={handleStart}
      onPointerUp={handleEnd}
      onPointerCancel={()=>{clearTimeout(timerRef.current);setPressing(false);}}
      style={{
        position:'fixed',right:20,bottom:90,width:56,height:56,borderRadius:28,
        border:'none',background:'var(--work)',color:'#fff',fontSize:26,
        display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 4px 20px rgba(79,142,247,0.4)',cursor:'pointer',
        transform:pressing?'scale(0.92)':'scale(1)',transition:'transform 0.1s',
        zIndex:100,
      }}
    >+</button>
  );
}

return arr;

    </Sheet>
  );
}


function FilesPage(){

  const lids=myLessonIds(data);
  const lessons=data.lessons.filter(L=>lids.includes(L.id));
  const [lessonId,setLessonId]=useState(lessons[0]?.id||'');
  const [q,setQ]=useState('');
  const [typeFilter,setTypeFilter]=useState('all'); // all|link|file
  const [pinOnly,setPinOnly]=useState(false); // pinned only
  const [showAdd,setShowAdd]=useState(false);

  const mats=useMemo(()=>{
    let arr=visibleMaterials(data).filter(m=>m.scopeType==='lesson');
    if(lessonId) arr=arr.filter(m=>m.lessonId===lessonId);
    if(typeFilter!=='all') arr=arr.filter(m=>m.type===typeFilter);
    if(pinOnly) arr=arr.filter(m=>!!m.pinned);
    if(q.trim()){
      const qq=q.trim().toLowerCase();
      arr=arr.filter(m=>{const hay=[m.title,m.url,m.fileName,m.mime,(m.tags||[]).join(' '),m.type].filter(Boolean).join(' ').toLowerCase();return hay.includes(qq);});
    }
    return arr.sort((a,b)=>(!!b.pinned)-(!!a.pinned) || (b.createdAt-a.createdAt));
  },[data,lessonId,q,typeFilter,pinOnly]);

  return(
    <div className="scroll" style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <div style={{fontSize:24,fontWeight:900}}>자료</div>
        <button className="press no-dim" onClick={()=>setShowAdd(true)} style={{fontSize:13,fontWeight:900,padding:'8px 12px',borderRadius:12,border:'1px solid var(--b1)',background:'var(--purplow)'}}>추가</button>
      </div>

      <Panel style={{display:'flex',flexDirection:'column',gap:10}}>
        <select value={lessonId} onChange={e=>setLessonId(e.target.value)} style={{padding:'10px 12px',borderRadius:12,border:'1px solid var(--b1)'}}>
          {lessons.map(L=><option key={L.id} value={L.id}>{L.name}</option>)}

          <button className="press no-dim" onClick={()=>setTypeFilter('all')}
            style={{padding:'8px 10px',borderRadius:999,border:'1px solid var(--b1)',background:typeFilter==='all'?'var(--s2)':'transparent',fontWeight:900,fontSize:12}}>전체</button>
          <button className="press no-dim" onClick={()=>setTypeFilter('link')}
            style={{padding:'8px 10px',borderRadius:999,border:'1px solid var(--b1)',background:typeFilter==='link'?'var(--purplow)':'transparent',fontWeight:900,fontSize:12}}>링크</button>
          <button className="press no-dim" onClick={()=>setTypeFilter('file')}
            style={{padding:'8px 10px',borderRadius:999,border:'1px solid var(--b1)',background:typeFilter==='file'?'var(--wmid)':'transparent',fontWeight:900,fontSize:12}}>파일</button>
          <button className="press no-dim" onClick={()=>setPinOnly(v=>!v)}
            style={{padding:'8px 10px',borderRadius:999,border:'1px solid var(--b1)',background:pinOnly?'var(--purplow)':'transparent',fontWeight:900,fontSize:12}}>핀만</button>
        </div>

        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="검색 (제목/태그/URL/파일명/mime)" style={{padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)'}}/>
      </Panel>

      {mats.map(m=>(

) : (

    <div style={{fontSize:12,color:'var(--t2)'}}>
      파일: <b>{m.fileName||'file'}</b> ({m.size?`${Math.round(m.size/1024)}KB`:''})

      <img src={m.dataUrl} alt={m.title}
           style={{marginTop:8,width:'100%',borderRadius:12,border:'1px solid var(--b1)'}}/>

function AddMaterialSheet({open,onClose,lessonId,onSubmit}){
  const [title,setTitle]=useState('');
  const [url,setUrl]=useState('');
  const [tags,setTags]=useState('');
  const [fileInfo,setFileInfo]=useState(null); // {name,mime,size,dataUrl}
  const [mode,setMode]=useState('link'); // link | file

  useEffect(()=>{
    if(open){
      setTitle(''); setUrl(''); setTags('');
      setFileInfo(null);
      setMode('link');
    }
  },[open]);

  async function onPickFile(f){
    if(!f) { setFileInfo(null); return; }
    const MAX = 2 * 1024 * 1024; // 2MB
    if(f.size > MAX){
      showToast('파일이 너무 큽니다(2MB 이하 권장)','warn');
      setFileInfo(null);
      return;
    }
    const dataUrl = await readFileAsDataURL(f);
    setFileInfo({ name:f.name, mime:f.type||'application/octet-stream', size:f.size, dataUrl });
  }

  if(!open) return null;
  return(
    <Sheet open={open} onClose={onClose} title="자료 추가" height="75vh">
      <Panel style={{boxShadow:'none'}}>
        <div style={{fontSize:12,color:'var(--t2)'}}>lesson {lessonId}</div>

        <div style={{marginTop:10,display:'flex',gap:8}}>
          <button className="press no-dim" onClick={()=>setMode('link')}
            style={{flex:1,padding:'10px 12px',borderRadius:12,border:'1px solid var(--b1)',background:mode==='link'?'var(--purplow)':'transparent',fontWeight:900}}>
            링크
          </button>
          <button className="press no-dim" onClick={()=>setMode('file')}
            style={{flex:1,padding:'10px 12px',borderRadius:12,border:'1px solid var(--b1)',background:mode==='file'?'var(--purplow)':'transparent',fontWeight:900}}>
            파일
          </button>
        </div>

        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="제목"
          style={{marginTop:10,padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)',width:'100%'}}/>

        {mode==='link' ? (
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="URL"
            style={{marginTop:8,padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)',width:'100%'}}/>
        ) : (
          <div style={{marginTop:8}}>
            <input type="file" accept="image/*,application/pdf"
              onChange={e=>onPickFile(e.target.files?.[0]||null)}
              style={{width:'100%'}}/>
            {fileInfo ? (
              <div style={{marginTop:8,fontSize:12,color:'var(--t2)'}}>
                선택됨: <b>{fileInfo.name}</b> ({Math.round(fileInfo.size/1024)}KB)
              </div>
            ) : (
              <div style={{marginTop:8,fontSize:12,color:'var(--t2)'}}>
                이미지/PDF(2MB 이하 권장)
              </div>
            )}
          </div>
        )}

        <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="태그(,로 구분)"
          style={{marginTop:8,padding:'12px 12px',borderRadius:12,border:'1px solid var(--b1)',width:'100%'}}/>

        <div style={{marginTop:10,display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="press no-dim" onClick={onClose}
            style={{padding:'10px 14px',borderRadius:12,border:'1px solid var(--b1)',fontWeight:900}}>취소</button>

          <button className="press no-dim" onClick={()=>{
              if(!title.trim()) return;
              if(mode==='link'){
                if(!url.trim()) return;
                onSubmit({type:'link',title:title.trim(),url:url.trim(),tags:normTags(tags)});
              }else{
                if(!fileInfo?.dataUrl) return;
                onSubmit({type:'file',title:title.trim(),fileName:fileInfo.name,mime:fileInfo.mime,size:fileInfo.size,dataUrl:fileInfo.dataUrl,tags:normTags(tags)});
              }
            }}
            style={{padding:'10px 14px',borderRadius:12,border:'1px solid var(--b1)',background:'var(--purplow)',fontWeight:900}}>
            저장
          </button>
        </div>
      </Panel>
    </Sheet>
  );
}



function TeacherHomeworkPage(){
  const {data,updateHomework}=useApp();
  const lids=myLessonIds(data);
  const lessons=data.lessons.filter(L=>lids.includes(L.id));
  const [lessonId,setLessonId]=useState(lessons[0]?.id||'');
  const [urgentOnly,setUrgentOnly]=useState(false); // today/overdue only
  const hws=useMemo(()=>{
    let arr=visibleHomeworks(data).filter(hw=>hw.lessonId===lessonId);
    if(urgentOnly){
      const td=todayStr();
      arr=arr.filter(hw=>hw.dueDate && daysBetween(td, hw.dueDate) <= 0);
    }
    return arr;
  },[data,lessonId,urgentOnly]);
  const lesson=lessons.find(L=>L.id===lessonId);
  const students=(lesson?.studentIds||[]).map(id=>data.familyMembers.find(m=>m.id===id)).filter(Boolean);
  function avgProgress(uid){
    const arr=hws.filter(h=>h.assigneeId===uid);
    if(!arr.length) return 0;
    return Math.round(arr.reduce((s,x)=>s+(x.progress||0),0)/arr.length);
  }
  return(
    <div className="scroll" style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{fontSize:24,fontWeight:900}}>숙제</div>
      <Panel style={{display:'flex',flexDirection:'column',gap:10}}>
        <select value={lessonId} onChange={e=>setLessonId(e.target.value)} style={{padding:'10px 12px',borderRadius:12,border:'1px solid var(--b1)'}}>
          {lessons.map(L=><option key={L.id} value={L.id}>{L.name}</option>)}
        </select>
        <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
          <button className="press no-dim" onClick={()=>setUrgentOnly(v=>!v)}
            style={{padding:'8px 10px',borderRadius:999,border:'1px solid var(--b1)',background:urgentOnly?'var(--warnlow)':'transparent',fontWeight:900,fontSize:12}}>
            오늘/지연만
          </button>
          <div style={{fontSize:12,color:'var(--t2)',alignSelf:'center'}}>마감 임박 과제만 표시</div>
        </div>
      </Panel>

      <Panel>
        <HRow left="학생 진행률" right={<MiniChip text={`${students.length}명`} color="var(--lessonlow)"/>}/>
        <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
          {students.map(s=>(
            <div key={s.id} style={{padding:'10px 12px',border:'1px solid var(--b1)',borderRadius:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontWeight:900}}>{s.avatar} {s.name}</div>
                <div style={{fontSize:12,color:'var(--t2)'}}>{avgProgress(s.id)}%</div>
              </div>
              <div style={{height:8,borderRadius:999,background:'var(--s2)',marginTop:8,overflow:'hidden'}}>
                <div style={{width:`${avgProgress(s.id)}%`,height:'100%',background:'var(--lesson)'}}/>
              </div>
            </div>
          ))}
          {!students.length && <div style={{fontSize:13,color:'var(--t2)'}}>학생이 없습니다.</div>}
        </div>
      </Panel>

      <Panel>
        <HRow left="숙제 목록" right={<MiniChip text={`${hws.length}개`} color="var(--warnlow)"/>}/>
        <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
          {hws.map(hw=>(
            <div key={hw.id} style={{padding:'10px 12px',border:'1px solid var(--b1)',borderRadius:14}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:10}}>
                <div style={{fontWeight:900}}>{hw.title}</div>
                <div style={{fontSize:12,color:'var(--t2)'}}>{hw.progress||0}%</div>
              </div>
              <div style={{fontSize:12,color:'var(--t2)'}}>학생 {(data.familyMembers.find(m=>m.id===hw.assigneeId)?.name)||hw.assigneeId} · due {hw.dueDate}</div>
              <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
                {[0,25,50,75,100].map(p=>(
                  <button key={p} className="press no-dim" onClick={()=>updateHomework(hw.id,{progress:p,status:p>=100?'done':(p>0?'doing':'todo')})}
                    style={{padding:'8px 10px',borderRadius:12,border:'1px solid var(--b1)',background:(hw.progress===p)?'var(--wmid)':'transparent',fontWeight:900,fontSize:12}}>
                    {p}%
                  </button>
                ))}
              </div>
            </div>
          ))}
          {!hws.length && <div style={{fontSize:13,color:'var(--t2)'}}>숙제가 없습니다.</div>}
        </div>
      </Panel>
    </div>
  );
}

function getTabConfig(data){
  const u=me(data);
  const role=u?.role||'parent';
  const isMom=!!u?.isMom;
  const au=(data.authUsers||[]).find(x=>x.userId===u?.id);
  const isAdminUser=!!au?.isAdmin;
  if(role==='teacher'){
    return [
      {id:'tdash',icon:'🎛️',label:'대시보드'},
      {id:'lessons',icon:'🎼',label:'레슨'},
      {id:'board',icon:'🧵',label:'게시판'},
      {id:'thw',icon:'✅',label:'숙제'},
      {id:'files',icon:'📎',label:'자료'},
       ...(isAdminUser?[{id:'admin',icon:'🛡️',label:'관리자'}]:[]),
    {id:'settings',icon:'⚙️',label:'설정'},
    ];
  }
  if(role==='child'){
    return [
      {id:'today',icon:'☀️',label:'Today'},
      {id:'checklist',icon:'✅',label:'체크'},
      {id:'month',icon:'🗓',label:'캘린더'},
      {id:'habits',icon:'🌱',label:'습관'},
      {id:'lboard',icon:'📌',label:'레슨'},
      {id:'settings',icon:'⚙️',label:'설정'},
    ];
  }
  // parent
  const base=[
    {id:'today',icon:'☀️',label:'Today'},
    {id:'family',icon:'👨‍👩‍👧',label:'Family'},
    {id:'month',icon:'🗓',label:'Month'},
    {id:'signal',icon:'⚡',label:'Signal'},
    {id:'inbox',icon:'📥',label:'Inbox'},
  ];
  const tail=[
    ...(isMom?[{id:'budget',icon:'💰',label:'가계부'}]:[]),
    {id:'habits',icon:'🌱',label:'습관'},
    {id:'notes',icon:'📝',label:'노트'},
    ...(isAdminUser?[{id:'admin',icon:'🛡️',label:'관리자'}]:[]),
    {id:'settings',icon:'⚙️',label:'설정'},
  ];
  return [...base,...tail];
}

      scrollbarWidth:'none',WebkitOverflowScrolling:'touch',
      position:'fixed',bottom:0,left:0,right:0,zIndex:50,
      backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
      paddingBottom:'calc(8px + env(safe-area-inset-bottom,0px))',
    }}>
      {tabs.map(t=>{
        const isActive=active===t.id;
        return(
          <button key={t.id} onClick={()=>onChange(t.id)} style={{
            display:'flex',flexDirection:'column',alignItems:'center',gap:3,
            padding:'6px 12px 4px',borderRadius:12,border:'none',
            background:isActive?'var(--wlow)':'transparent',
            color:isActive?'var(--work)':'var(--t3)',
            cursor:'pointer',flexShrink:0,minWidth:52,
            transition:'all 0.15s',position:'relative',
          }}>
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:isActive?800:500,whiteSpace:'nowrap',letterSpacing:0.2}}>{t.label}</span>
            {isActive&&<span style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:2,background:'var(--work)'}}/>}
          </button>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('today');
  const [showAddTask,setShowAddTask]=useState(false);

  function fabShort(){setTab('inbox');}
  function fabLong(){
    const title=prompt('오늘 할 일 추가:');
    if(title&&title.trim()){
      // Will be handled by AppProvider context
    }
  }

  return(
    <AppProvider>
      <AppInner tab={tab} setTab={setTab} showAddTask={showAddTask} setShowAddTask={setShowAddTask} fabShort={fabShort} fabLong={fabLong}/>
    </AppProvider>
  );
}

function AppInner({tab,setTab,showAddTask,setShowAddTask,fabShort,fabLong}){
  const {data,addTask,showToast}=useApp();
  const tabs=getTabConfig(data);
  if(!data.settings.currentUserId) return <LoginPage/>;

  useEffect(()=>{
    if(!tabs.some(t=>t.id===tab)) setTab(tabs[0]?.id||'today');
  },[data.settings.currentUserId]);


  function handleFabLong(){
    const title=prompt('오늘 할 일 추가:');
    if(title&&title.trim()){
      addTask({title:title.trim(),domain:'work',dueDate:todayStr(),priority:2});
      showToast('오늘 할 일 추가됨','success');
    }
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'var(--bg)',color:'var(--t1)',overflow:'hidden'}}>
      <div style={{height:'env(safe-area-inset-top,0px)',background:'var(--s1)'}}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingBottom:'calc(64px + env(safe-area-inset-bottom,0px))'}}>
        {tab!=='today'&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 8px',background:'var(--s1)',borderBottom:'1px solid var(--b1)',flexShrink:0}}>
          <LogoMark size={26}/>
          <ThemeToggle/>
        </div>
      )}
      {tab==='today'&&<TodayPage/>}
        {tab==='plan'&&<PlanPage/>}
        {tab==='month'&&<MonthPage/>}
        {tab==='signal'&&<SignalPage/>}
        {tab==='inbox'&&<InboxPage/>}
        {tab==='family'&&<FamilyPage/>}
        {tab==='budget'&&<BudgetPage/>}
        {tab==='habits'&&<HabitsPage/>}
        {tab==='notes'&&<NotesPage/>}
        {tab==='admin'&&<AdminPage/>}
        {tab==='settings'&&<SettingsPage/>}

        {tab==='tdash'&&<TeacherDashboardPage/>}
        {tab==='lessons'&&<LessonsPage/>}
        {tab==='board'&&<BoardPage/>}
        {tab==='thw'&&<TeacherHomeworkPage/>}
        {tab==='files'&&<FilesPage/>}

        {tab==='checklist'&&<ChecklistPage/>}
        {tab==='lboard'&&<LessonBoardChildPage/>}
</div>
      <TabBar active={tab} onChange={setTab} tabs={tabs}/>
      <FAB onShortPress={()=>{
        const r=myRole(data);
        if(r==='teacher'){setTab('board');return;}
        // 탭별 동작
        if(tab==='today'||tab==='plan'||tab==='month'||tab==='family'||tab==='inbox'){
          setShowAddTask(true);
        } else {
          setTab('inbox');
        }
      }} onLongPress={handleFabLong}/>
      {/* 전역 AddTaskSheet - FAB 버튼으로 열림 */}
      <AddTaskSheet
        open={showAddTask}
        onClose={()=>setShowAddTask(false)}
        defaultDomain={tab==='family'?'work':tab==='inbox'?'inbox':'work'}
        defaultDueDate={tab==='today'||tab==='family'?todayStr():null}
      />
    </div>
  );
}



function PageHeader({title, chips=[], action=null, subtitle=null}){
  return (
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:14}}>
      <div style={{minWidth:0}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>{title}</div>
        {subtitle ? (
          <div style={{fontSize:13,color:'var(--t2)',marginTop:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {subtitle}
          </div>
        ) : null}
        {chips.length>0 ? (
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}}>
            {chips.map((c,idx)=>(
              <span key={idx}
                style={{
                  height:28,display:'inline-flex',alignItems:'center',
                  padding:'0 10px',borderRadius:999,border:'1px solid var(--b1)',
                  fontSize:12,fontWeight:900,background:c.active?'var(--s2)':'transparent',color:'var(--t2)'
                }}>
                {c.label}
              </span>
            ))}
          </div>
        ) : null}
      </div>

      {action ? (
        <button
          style={{
            height:36, padding:'0 12px', borderRadius:12,
            border:'1px solid var(--b1)',
            background: action.primary ? 'var(--work)' : 'var(--s2)',
            color: action.primary ? '#fff' : 'var(--t2)',
            fontSize:12, fontWeight:900, whiteSpace:'nowrap'
          }}
          onClick={action.onClick}>
          {action.label}
        </button>
      ) : <div style={{width:36}}/>}
    </div>
  );
}

function CompactHome({children,max=3}){
  const [open,setOpen]=useState(false);
  const items = React.Children.toArray(children);
  const top = items.slice(0,max);
  const rest = items.slice(max);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {top}
      {rest.length>0 && (
        <div>
          <button onClick={()=>setOpen(!open)}
            style={{fontSize:13,fontWeight:900,color:'var(--t2)',marginBottom:6}}>
            {open?'접기':'더보기'}
          </button>
          {open && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {rest}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* Auto-apply CompactHome to Today container heuristically */
window.addEventListener('load',()=>{
  const today = document.querySelector('[data-screen="today"]');
  if(!today) return;
  const cards = today.querySelectorAll('.panel,.card');
  if(cards.length>3){
    for(let i=3;i<cards.length;i++){
      cards[i].style.display='none';
    }
    const btn=document.createElement('button');
    btn.textContent='더보기';
    btn.style.margin='10px';
    btn.onclick=()=>{
      cards.forEach(c=>c.style.display='block');
      btn.remove();
    };
    today.appendChild(btn);
  }
});

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
