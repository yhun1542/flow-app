<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLOW — 생산성 OS v7</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DARK THEME (default)
═══════════════════════════════════════════ */
:root[data-theme="dark"] {
  --bg:#080809; --s1:#101012; --s2:#17171A; --s3:#1F1F24; --s4:#27272D;
  --b1:rgba(255,255,255,0.06); --b2:rgba(255,255,255,0.11); --b3:rgba(255,255,255,0.18);
  --t1:#EDEDF0; --t2:#8A8A9E; --t3:#555568;
  --work:#4F8EF7; --wlow:rgba(79,142,247,0.12); --wmid:rgba(79,142,247,0.25);
  --personal:#2DD4BF; --plow:rgba(45,212,191,0.12); --pmid:rgba(45,212,191,0.25);
  --danger:#F56565; --dlow:rgba(245,101,101,0.15);
  --warn:#FBBF24; --warnlow:rgba(251,191,36,0.15);
  --success:#34D399; --slow:rgba(52,211,153,0.15);
  --purple:#A78BFA; --purplow:rgba(167,139,250,0.15);
  --a1c:#FF6B6B; --a1low:rgba(255,107,107,0.15);
  --orange:#FB923C; --orangelow:rgba(251,146,60,0.15);
  --school:#F59E0B; --schoollow:rgba(245,158,11,0.15);
  --lesson:#8B5CF6; --lessonlow:rgba(139,92,246,0.15);
  --budget:#EC4899; --budgetlow:rgba(236,72,153,0.15);
  --tabbar-bg:rgba(8,8,9,0.93);
  --card-shadow:0 2px 12px rgba(0,0,0,0.4);
  --overlay:rgba(0,0,0,0.7);
}
/* ═══════════════════════════════════════════
   LIGHT THEME
═══════════════════════════════════════════ */
:root[data-theme="light"] {
  --bg:#F7F8FA; --s1:#FFFFFF; --s2:#F0F1F5; --s3:#E5E7EB; --s4:#D1D5DB;
  --b1:rgba(17,24,39,0.07); --b2:rgba(17,24,39,0.13); --b3:rgba(17,24,39,0.20);
  --t1:#111827; --t2:#6B7280; --t3:#9CA3AF;
  --work:#2563EB; --wlow:rgba(37,99,235,0.09); --wmid:rgba(37,99,235,0.18);
  --personal:#10B981; --plow:rgba(16,185,129,0.09); --pmid:rgba(16,185,129,0.18);
  --danger:#EF4444; --dlow:rgba(239,68,68,0.10);
  --warn:#F59E0B; --warnlow:rgba(245,158,11,0.12);
  --success:#10B981; --slow:rgba(16,185,129,0.12);
  --purple:#8B5CF6; --purplow:rgba(139,92,246,0.12);
  --a1c:#EF4444; --a1low:rgba(239,68,68,0.10);
  --orange:#FB923C; --orangelow:rgba(251,146,60,0.12);
  --school:#D97706; --schoollow:rgba(217,119,6,0.12);
  --lesson:#7C3AED; --lessonlow:rgba(124,58,237,0.12);
  --budget:#DB2777; --budgetlow:rgba(219,39,119,0.12);
  --tabbar-bg:rgba(255,255,255,0.93);
  --card-shadow:0 2px 12px rgba(0,0,0,0.08);
  --overlay:rgba(0,0,0,0.5);
}
:root { data-theme: dark; }

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body,#root{
  height:100%;
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--t1);
}
body{overflow:hidden}
::-webkit-scrollbar{width:0;height:0}
button,input,textarea,select{font-family:inherit}
input,textarea,select{background:none;color:inherit}
input::placeholder,textarea::placeholder{color:var(--t3)}
input:focus,textarea:focus,select:focus{outline:none}
button:focus{outline:none}
button{cursor:pointer}

.press{transition:transform 0.08s ease,opacity 0.08s ease;cursor:pointer}
.press:active{transform:scale(0.96);opacity:0.85}
.no-dim.press:active{opacity:1}

@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet-in{animation:su 0.22s cubic-bezier(0.16,1,0.3,1) forwards}
.fade-in{animation:fi 0.18s ease forwards}
@keyframes faderow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row-in{animation:faderow 0.2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease infinite}
@keyframes tapflash{0%{opacity:0.18}100%{opacity:0}}
.tap-flash::after{content:'';position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,0.12);animation:tapflash 0.14s ease forwards;pointer-events:none}
@keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.pop-in{animation:popIn 0.18s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

.mono{font-family:'DM Mono',monospace}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── 다크/라이트 토글 스위치 ── */
.theme-toggle-wrap{
  display:flex;align-items:center;gap:6px;
}
.theme-toggle-track{
  width:48px;height:26px;border-radius:13px;
  background:var(--s3);border:1.5px solid var(--b2);
  position:relative;cursor:pointer;
  transition:background 0.25s ease;
  flex-shrink:0;
}
.theme-toggle-track.dark-on{ background:#4f8ef7; border-color:#4f8ef7; }
.theme-toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:18px;height:18px;border-radius:50%;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.35);
  transition:transform 0.22s cubic-bezier(0.16,1,0.3,1);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;line-height:1;
}
.theme-toggle-track.dark-on .theme-toggle-thumb{ transform:translateX(22px); }
.theme-toggle-label{
  font-size:11px;font-weight:600;color:var(--t2);
  user-select:none;
}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--tabbar-bg);
  border-top:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.fab{
  position:fixed;bottom:74px;right:20px;
  width:56px;height:56px;border-radius:28px;
  background:var(--work);border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(79,142,247,0.45);
  z-index:110;cursor:pointer;
  transition:transform 0.12s ease,box-shadow 0.12s ease;
}
.fab:active{transform:scale(0.92);box-shadow:0 2px 10px rgba(79,142,247,0.3)}
.fab.held{transform:scale(1.08);background:#6BA3FF;box-shadow:0 6px 28px rgba(79,142,247,0.6)}
.prog-track{height:4px;border-radius:2px;background:var(--s3);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--success);transition:width 0.4s cubic-bezier(0.16,1,0.3,1)}
.focus-item{display:flex;align-items:center;gap:12px;padding:10px 0}
.focus-item+.focus-item{border-top:1px solid var(--b1)}

/* Swipe */
.swipe-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:6px;user-select:none}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;border-radius:12px}
.swipe-bg-left{justify-content:flex-start;padding-left:16px;gap:8px}
.swipe-bg-right{justify-content:flex-end;padding-right:16px;gap:8px}
.swipe-front{position:relative;border-radius:12px;background:var(--s1);border:1px solid var(--b1);will-change:transform;transition:transform 0.22s cubic-bezier(0.16,1,0.3,1)}
.swipe-front.dragging{transition:none}

.dot{width:5px;height:5px;border-radius:3px;display:inline-block}
.tl-now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);pointer-events:none;z-index:5}
.tl-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:5px;background:var(--danger)}
.energy-dot{width:8px;height:8px;border-radius:4px;display:inline-block;flex-shrink:0}
select{-webkit-appearance:none;appearance:none}

/* Budget gauge */
.budget-gauge{height:12px;border-radius:6px;background:var(--s3);overflow:hidden}
.budget-fill{height:100%;border-radius:6px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}

/* Habit circle */
.habit-circle{width:44px;height:44px;border-radius:22px;border:2.5px solid var(--s4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;font-size:20px}
.habit-circle.done{background:var(--success);border-color:var(--success)}

/* Role banner */
.role-banner{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;
  background:var(--s2);
  border-bottom:1px solid var(--b1);
}

/* Card */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;box-shadow:var(--card-shadow)}

/* Theme transition */
:root{transition:background 0.3s ease,color 0.3s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useContext,createContext,useCallback,useReducer}=React;

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
let _uid=0;
function uid(){return 'id_'+(++_uid)+'_'+Math.random().toString(36).slice(2,7)}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function addDays(dateStr,days){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d+days);
  return `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`;
}
function fmt(dateStr){
  if(!dateStr)return{m:0,d:0,day:'',full:''};
  const [y,m,d]=dateStr.split('-').map(Number);
  const days=['일','월','화','수','목','금','토'];
  const dt=new Date(y,m-1,d);
  return{m,d,day:days[dt.getDay()],full:`${m}월 ${d}일 (${days[dt.getDay()]})`,dow:dt.getDay()};
}
function toMin(hhmm){if(!hhmm)return 0;const [h,m]=hhmm.split(':').map(Number);return h*60+(m||0)}
function toHHMM(min){return `${p2(Math.floor(min/60))}:${p2(min%60)}`}
function relativeDay(dateStr){
  const today=todayStr();
  if(dateStr===today)return'오늘';
  if(dateStr===addDays(today,1))return'내일';
  if(dateStr===addDays(today,-1))return'어제';
  const f=fmt(dateStr);
  return `${f.m}/${f.d}(${f.day})`;
}
function daysBetween(a,b){
  const [ay,am,ad]=a.split('-').map(Number);
  const [by,bm,bd]=b.split('-').map(Number);
  const da=new Date(ay,am-1,ad).getTime();
  const db=new Date(by,bm-1,bd).getTime();
  return Math.round((db-da)/86400000);
}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function nowHHMM(){const d=new Date();return `${p2(d.getHours())}:${p2(d.getMinutes())}`}
function fmtMoney(n){return n.toLocaleString('ko-KR')+'원'}

/* ═══════════════════════════════════════════
   SIGNAL / BUCKET UTILS
═══════════════════════════════════════════ */
function importanceOf(t){if(t.priority===1)return'A';if(t.priority===2)return'B';return'C'}
function urgencyOf(t,today){
  const d=t.deadlineDate||t.dueDate;
  if(!d)return 3;
  const diff=daysBetween(today,d);
  if(diff<=1)return 1;if(diff<=3)return 2;return 3;
}
function bucketOf(t,today){return importanceOf(t)+''+urgencyOf(t,today)}
function bucketSortKey(b){const imp=b[0]==='A'?0:b[0]==='B'?1:2;return imp*10+(Number(b[1])-1)}
const ALL_BUCKETS=['A1','A2','A3','B1','B2','B3','C1','C2','C3'];

/* ═══════════════════════════════════════════
   DEPENDENCY PARSING
═══════════════════════════════════════════ */
function parseDeps(notes){
  if(!notes)return[];
  const re=/^(선행|depends_on|prereq)\s*:\s*([^\n]+)/im;
  const m=(notes||'').match(re);
  if(!m)return[];
  return m[2].split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
}
function upsertDepsInNotes(notes,depIds){
  const lines=(notes||'').split('\n');
  const next=lines.filter(l=>!/^(선행|depends_on|prereq)\s*:/i.test(l.trim()));
  if(depIds.length)next.unshift('선행: '+[...new Set(depIds)].join(', '));
  return next.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function buildDepGraph(tasks){
  const depsByTaskId=new Map();
  const dependentsByTaskId=new Map();
  const existing=new Set(tasks.filter(t=>!t.deletedAt).map(t=>t.id));
  for(const t of tasks){
    if(t.deletedAt)continue;
    const deps=parseDeps(t.notes).filter(id=>existing.has(id));
    depsByTaskId.set(t.id,deps);
    for(const depId of deps){
      const arr=dependentsByTaskId.get(depId)||[];
      arr.push(t.id);
      dependentsByTaskId.set(depId,arr);
    }
  }
  return{depsByTaskId,dependentsByTaskId};
}

/* ═══════════════════════════════════════════
   HEURISTIC TRIAGE
═══════════════════════════════════════════ */
const KW_RISK=['계약','자금','대출','등기','세금','분양','착공','준공','소송','민원','투자','법인','허가'];
const KW_URGENT=['오늘','내일','긴급','당장','마감','회신','제출','즉시','바로'];
const KW_DEEP=['작성','기획','전략','검토','분석','제안서','계약서','보고서','설계','연구','정리','구현'];
const KW_CALL=['전화','콜','통화','연락','회신','미팅','회의'];
const KW_ERRAND=['방문','현장','이동','픽업','구매','배달','수령'];
function includesAny(text,words){const t=(text||'').toLowerCase();return words.some(w=>t.includes(w.toLowerCase()))}
function heuristicTriage(title,today){
  let type='admin';
  if(includesAny(title,KW_DEEP))type='deepwork';
  if(includesAny(title,KW_CALL))type='call';
  if(includesAny(title,KW_ERRAND))type='errand';
  let dur=30;
  if(type==='deepwork')dur=90;
  if(type==='errand')dur=60;
  if(type==='call')dur=30;
  let priority=3;
  if(includesAny(title,KW_RISK))priority=1;
  else if(includesAny(title,KW_URGENT))priority=1;
  else if(type==='deepwork')priority=2;
  let dueDate=null;
  if(includesAny(title,KW_URGENT))dueDate=today;
  return{type,durationMin:dur,priority,dueDate};
}

/* ═══════════════════════════════════════════
   PROMOTION REASON
═══════════════════════════════════════════ */
function computePromotionReason(task,allTasks,today){
  let score=0;const bullets=[];
  const d=task.deadlineDate||task.dueDate;
  if(d){
    const diff=daysBetween(today,d);
    if(diff<=0){score+=60;bullets.push('마감/실행일이 오늘이거나 지연 → 지금 처리 가치 매우 큼');}
    else if(diff<=1){score+=45;bullets.push('내일까지 영향 → 미루면 일정 깨질 확률 큼');}
    else if(diff<=3){score+=25;bullets.push('3일 이내 마감 → 이번 주 초반 처리 유리');}
    else{score+=10;bullets.push('마감은 여유 있으나 선제 처리로 리스크 감소');}
  }else{score+=8;bullets.push('명시 마감 없음 → 리스크/의존성 기반 선제 처리 후보');}
  const riskHit=KW_RISK.filter(w=>task.title.includes(w));
  if(riskHit.length){score+=35;bullets.push('리스크/금액 키워드: '+riskHit.slice(0,3).join(', '));}
  const graph=buildDepGraph(allTasks);
  const deps=(graph.dependentsByTaskId.get(task.id)||[]);
  const byId=new Map(allTasks.map(t=>[t.id,t]));
  const activeDeps=deps.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt&&t.status!=='done');
  if(activeDeps.length){
    let pressure=0;
    for(const dt of activeDeps){
      const dd2=dt.deadlineDate||dt.dueDate;
      if(dd2){const diff=daysBetween(today,dd2);pressure+=diff<=0?30:diff<=1?22:diff<=3?14:8;}
      else pressure+=4;
    }
    const bonus=Math.min(30,activeDeps.length*6+Math.round(pressure/10));
    score+=bonus;
    bullets.push(`병목: 후행 ${activeDeps.length}개 대기 → ${activeDeps.slice(0,2).map(t=>t.title).join(', ')}`);
  }
  if(task.type==='deepwork'){score+=12;bullets.push('딥워크 → 90분 블록 확보 필요');}
  else if(task.type==='call'){score+=10;bullets.push('콜/회신 → 짧게 처리하면 대기 감소');}
  const dur=task.durationMin||30;
  if(dur>=120){score-=6;bullets.push('2시간+ → 오늘은 1개만 배치 권장');}
  else if(dur>=60){score+=6;bullets.push('1시간 내외 → 오늘 타임라인 배치 적합');}
  else{score+=8;bullets.push('30분 내외 → 오늘 끝내기 좋은 퀵윈');}
  return{score:clamp(score,0,100),bullets:bullets.slice(0,4)};
}

/* ═══════════════════════════════════════════
   SCHEDULER v3 — improved clustering + insights
═══════════════════════════════════════════ */
const MEETING_GAP=30;
function mergeBusy(busy){
  const arr=busy.slice().sort((a,b)=>a.start-b.start);
  const out=[];
  for(const s of arr){const l=out[out.length-1];if(l&&s.start<=l.end)l.end=Math.max(l.end,s.end);else out.push({...s});}
  return out;
}
function clusterBusy(busy){
  const merged=mergeBusy(busy);
  if(merged.length<=1)return merged;
  const out=[];let cur={...merged[0]};
  for(let i=1;i<merged.length;i++){
    const nxt=merged[i];
    if(nxt.start-cur.end<=MEETING_GAP)cur.end=Math.max(cur.end,nxt.end);
    else{out.push(cur);cur={...nxt};}
  }
  out.push(cur);return out;
}
function subtractBusy(free,busy){
  let out=[...free];
  for(const b of busy){
    const next=[];
    for(const s of out){
      if(b.end<=s.start||b.start>=s.end){next.push(s);continue;}
      if(b.start>s.start)next.push({start:s.start,end:b.start});
      if(b.end<s.end)next.push({start:b.end,end:s.end});
    }
    out=next.filter(s=>s.end>s.start);
  }
  return out;
}
function splitIntoSlots(ranges,slotMin){
  const out=[];
  for(const r of ranges){let c=r.start;while(c+slotMin<=r.end){out.push({start:c,end:c+slotMin});c+=slotMin;}}
  return out;
}
function overlapMin(r,windows){
  let s=0;
  for(const w of windows)s+=Math.max(0,Math.min(r.end,w.end)-Math.max(r.start,w.start));
  return s;
}
function findBestRun(slots,needMin,deepWindows,preferDeep){
  if(!slots.length)return null;
  const slotLen=slots[0]?slots[0].end-slots[0].start:30;
  if(slotLen<=0)return null;
  const needSlots=Math.ceil(needMin/slotLen);
  let best=null,bestScore=-1e9;
  for(let i=0;i<slots.length;i++){
    let end=slots[i].end,count=1;
    const start=slots[i].start;
    for(let j=i+1;j<slots.length&&slots[j].start===end;j++){end=slots[j].end;count++;}
    if(count>=needSlots){
      const run={start,end:start+needSlots*slotLen};
      let sc=preferDeep&&deepWindows?overlapMin(run,deepWindows)*2:0;
      sc+=(1000-start);
      if(sc>bestScore){bestScore=sc;best=run;}
    }
  }
  return best;
}
function consumeRun(slots,run){
  return slots.filter(s=>{
    const ov=Math.min(s.end,run.end)-Math.max(s.start,run.start);
    return ov<=0;
  });
}
function scoreTask(t,date){
  let s=(4-(t.priority||3))*100;
  if(t.dueDate===date)s+=90;
  if(t.deadlineDate){const dl=daysBetween(date,t.deadlineDate);s+=clamp(220-25*dl,-100,220);}
  if(t.type==='deepwork')s+=60;
  if(!t.durationMin)s-=120;
  return s;
}
function scheduleDayV3({date,tasks,events,existingBlocks,settings}){
  const ws=toMin(settings.workdayStart||'09:00');
  const we=toMin(settings.workdayEnd||'18:00');
  const ls=toMin(settings.lunchStart||'12:00');
  const le=toMin(settings.lunchEnd||'13:00');
  const slotMin=settings.slotMin||30;
  const deepWin=(settings.deepWorkWindows||[{start:'10:00',end:'12:00'},{start:'14:00',end:'16:00'}])
    .map(w=>({start:toMin(w.start),end:toMin(w.end)}));

  const eventBusy=(events||[]).filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===date)
    .map(e=>({start:toMin((e.startDateTime||'').slice(11,16)),end:toMin((e.endDateTime||'').slice(11,16))}))
    .filter(e=>e.start<e.end);

  const fixedBusy=(existingBlocks||[]).filter(b=>!b.deletedAt&&b.date===date&&!b.linkedTaskId)
    .map(b=>({start:toMin(b.startTime),end:toMin(b.endTime)}))
    .filter(b=>b.start<b.end);

  const rawBusy=[{start:ls,end:le},...eventBusy,...fixedBusy];
  const busy=clusterBusy(rawBusy);
  const freeRanges=subtractBusy([{start:ws,end:we}],busy);
  let freeSlots=splitIntoSlots(freeRanges,slotMin);
  const totalFreeMin=freeRanges.reduce((s,r)=>s+(r.end-r.start),0);

  const eligible=(tasks||[]).filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&t.durationMin>0)
    .filter(t=>(t.dueDate?t.dueDate<=date:true));

  const sortBySc=(arr)=>arr.slice().map(t=>({t,s:scoreTask(t,date)})).sort((a,b)=>b.s-a.s).map(x=>x.t);
  const deepTasks=sortBySc(eligible.filter(t=>t.type==='deepwork'));
  const otherTasks=sortBySc(eligible.filter(t=>t.type!=='deepwork'));

  const proposed=[];
  const skipped=[];

  function tryPlace(t,preferDeep){
    const dur=t.durationMin||30;
    const run=findBestRun(freeSlots,dur,deepWin,preferDeep);
    if(!run){skipped.push(t);return;}
    const actualEnd=Math.min(run.start+dur,run.end);
    proposed.push({
      id:uid(),date,
      startTime:toHHMM(run.start),
      endTime:toHHMM(actualEnd),
      title:t.title,domain:'work',
      linkedTaskId:t.id,
      createdAt:Date.now(),updatedAt:Date.now()
    });
    freeSlots=consumeRun(freeSlots,{start:run.start,end:actualEnd});
  }

  for(const t of deepTasks)tryPlace(t,true);
  for(const t of otherTasks)tryPlace(t,false);

  const deepWorkMin=proposed.filter(b=>{
    const t=eligible.find(t=>t.id===b.linkedTaskId);
    return t&&t.type==='deepwork';
  }).reduce((s,b)=>s+(toMin(b.endTime)-toMin(b.startTime)),0);

  const insights=[];
  if(deepWorkMin>=90)insights.push({type:'success',msg:`딥워크 ${deepWorkMin}분 확보됨`});
  else if(deepWorkMin>0)insights.push({type:'warn',msg:`딥워크 ${deepWorkMin}분 (90분 미달)`});
  else insights.push({type:'warn',msg:'딥워크 블록 없음 — 내일 재시도 권장'});
  if(skipped.length)insights.push({type:'info',msg:`${skipped.length}개 미배치 (시간 부족)`});
  if(proposed.length===0)insights.push({type:'info',msg:'배치할 태스크가 없거나 시간이 부족합니다'});

  return{
    proposedBlocks:proposed,
    movedBlocks:[],
    skippedTasks:skipped,
    insights,
    diagnostics:{freeMinutes:totalFreeMin,deepWorkMin,placedCount:proposed.length,skippedCount:skipped.length}
  };
}

/* ═══════════════════════════════════════════
   BUDGET AI INSIGHTS (heuristic)
═══════════════════════════════════════════ */
function computeBudgetInsights(expenses,budget,month){
  const monthExp=expenses.filter(e=>e.date&&e.date.startsWith(month)&&!e.deletedAt);
  const total=monthExp.reduce((s,e)=>s+e.amount,0);
  const pct=budget>0?Math.round((total/budget)*100):0;
  const today=todayStr();
  const [y,m]=month.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const dayOfMonth=parseInt(today.split('-')[2]);
  const remaining=budget-total;
  const daysLeft=daysInMonth-dayOfMonth;
  const dailyBudget=daysLeft>0?Math.round(remaining/daysLeft):0;

  // Category breakdown
  const catMap={};
  for(const e of monthExp){
    catMap[e.category]=(catMap[e.category]||0)+e.amount;
  }
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Anomalies (expenses > 2x average)
  const avg=monthExp.length>0?total/monthExp.length:0;
  const anomalies=monthExp.filter(e=>e.amount>avg*2.5&&e.amount>50000).slice(0,2);

  // Burn rate
  const burnRate=dayOfMonth>0?Math.round(total/dayOfMonth):0;
  const projectedTotal=burnRate*daysInMonth;
  const overBudget=projectedTotal>budget;

  return{total,pct,remaining,daysLeft,dailyBudget,topCats,anomalies,burnRate,projectedTotal,overBudget};
}

      return{
        ...SEED,...parsed,
        settings:{...SEED.settings,...(parsed.settings||{})},
        familyMembers:parsed.familyMembers||SEED.familyMembers,
        lessons:parsed.lessons||SEED.lessons,
        announcements:parsed.announcements||SEED.announcements,

        expenses:parsed.expenses||SEED.expenses,
        budget:parsed.budget||SEED.budget,
        notes:parsed.notes||SEED.notes,
      };
    }
  }catch(e){}
  return SEED;
}

    setData(d=>({...d,homeworks:d.homeworks.map(h=>h.id===id?{...h,...patch}:h)}));
  }
  function addHomework(hw){
    const h={id:uid(),status:'todo',progress:0,createdAt:Date.now(),...hw};
    setData(d=>({...d,homeworks:[...d.homeworks,h]}));
    showToast('숙제 추가됨','success');
  }

  // Expense operations
  function addExpense(exp){
    const e={id:uid(),createdAt:Date.now(),...exp};
    setData(d=>({...d,expenses:[e,...d.expenses]}));
    showToast('지출 기록됨','success');
  }
  function deleteExpense(id){
    setData(d=>({...d,expenses:d.expenses.map(e=>e.id===id?{...e,deletedAt:Date.now()}:e)}));
  }
  function updateBudget(patch){
    setData(d=>({...d,budget:{...d.budget,...patch}}));
  }

  // Notes
  function addNote(note){
    const n={id:uid(),type:'note',tags:[],createdAt:Date.now(),...note};
    setData(d=>({...d,notes:[n,...d.notes]}));
    showToast('노트 저장됨','success');
  }
  function deleteNote(id){
    setData(d=>({...d,notes:d.notes.filter(n=>n.id!==id)}));
  }

  // Reset
  function resetData(){
    setData(SEED);
    showToast('데이터 초기화됨');
  }

  const currentUser=data.familyMembers.find(m=>m.id===data.settings.currentUserId)||data.familyMembers[0];

  return(
    <AppCtx.Provider value={{
      data,currentUser,
      showToast,
      addTask,updateTask,deleteTask,toggleDone,moveTomorrow,
      upsertBlocks,deleteBlock,
      addEvent,deleteEvent,
      addProject,deleteProject,
      addHabit,deleteHabit,toggleHabitLog,
      updateSettings,
      addAnnouncement,markAnnouncementSeen,
      updateHomework,addHomework,
      addExpense,deleteExpense,updateBudget,
      addNote,deleteNote,
      resetData,
    }}>
      {children}
      <ToastStack toasts={toasts}/>
    </AppCtx.Provider>
  );

/* ═══════════════════════════════════════════
   SWIPE ROW (iOS Mail style, 2-stage snap)
═══════════════════════════════════════════ */
function SwipeRow({children,onLeft1,onLeft2,onRight1,onRight2,left1Label='완료',left2Label='삭제',right1Label='내일로',right2Label='스케줄',left1Color='var(--success)',left2Color='var(--danger)',right1Color='var(--work)',right2Color='var(--purple)',disabled=false}){
  const frontRef=useRef(null);
  const stateRef=useRef({startX:0,startY:0,dx:0,stage:0,active:false,locked:false,dir:null});
  const SNAP1=72,SNAP2=140,THRESH=0.55;
  const [dx,setDx]=useState(0);
  const [stage,setStage]=useState(0);

  function getDir(dx){return dx>0?'right':'left';}

  function onPD(e){
    if(disabled)return;
    const t=e.touches?e.touches[0]:e;
    stateRef.current={startX:t.clientX,startY:t.clientY,dx:0,stage:0,active:true,locked:false,dir:null};
  }
  function onPM(e){
    const s=stateRef.current;
    if(!s.active||s.locked)return;
    const t=e.touches?e.touches[0]:e;
    const rawDx=t.clientX-s.startX;
    const rawDy=t.clientY-s.startY;
    if(!s.dir){
      if(Math.abs(rawDx)<4&&Math.abs(rawDy)<4)return;
      if(Math.abs(rawDy)>Math.abs(rawDx)*1.5){s.locked=true;return;}
      s.dir=rawDx>0?'right':'left';
    }
    if(s.dir==='right'&&rawDx<0)return;
    if(s.dir==='left'&&rawDx>0)return;
    e.preventDefault&&e.preventDefault();
    const clamped=clamp(rawDx,-SNAP2*1.1,SNAP2*1.1);
    s.dx=clamped;
    setDx(clamped);
  }
  function onPU(){
    const s=stateRef.current;
    if(!s.active)return;
    s.active=false;
    const abs=Math.abs(s.dx);
    const dir=s.dir;
    if(!dir||abs<4){setDx(0);setStage(0);return;}
    const w=frontRef.current?.offsetWidth||320;
    if(abs>w*THRESH){
      // Full action
      if(dir==='left'){setDx(0);setStage(0);s.dx=0;if(abs>SNAP1*1.5)onLeft2&&onLeft2();else onLeft1&&onLeft1();}
      else{setDx(0);setStage(0);s.dx=0;if(abs>SNAP1*1.5)onRight2&&onRight2();else onRight1&&onRight1();}
    } else if(abs>SNAP1*0.6){
      // Snap to stage 1
      const snap=dir==='left'?-SNAP1:SNAP1;
      setDx(snap);setStage(1);s.dx=snap;
    } else {
      setDx(0);setStage(0);s.dx=0;
    }
  }

  const showLeft=dx<0;
  const showRight=dx>0;
  const absD=Math.abs(dx);
  const btnOpacity=clamp((absD-20)/40,0,1);

  return(
    <div className="swipe-wrap" style={{touchAction:'pan-y'}}>
      {showLeft&&(
        <div className="swipe-bg swipe-bg-right" style={{opacity:btnOpacity}}>
          <button onClick={()=>{setDx(0);setStage(0);onLeft2&&onLeft2();}} style={{background:left2Color,border:'none',color:'#fff',borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{left2Label}</button>
          <button onClick={()=>{setDx(0);setStage(0);onLeft1&&onLeft1();}} style={{background:left1Color,border:'none',color:'#fff',borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{left1Label}</button>
        </div>
      )}
      {showRight&&(
        <div className="swipe-bg swipe-bg-left" style={{opacity:btnOpacity}}>
          <button onClick={()=>{setDx(0);setStage(0);onRight1&&onRight1();}} style={{background:right1Color,border:'none',color:'#fff',borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{right1Label}</button>
          <button onClick={()=>{setDx(0);setStage(0);onRight2&&onRight2();}} style={{background:right2Color,border:'none',color:'#fff',borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{right2Label}</button>
        </div>
      )}
      <div
        ref={frontRef}
        className={`swipe-front${stateRef.current.active?' dragging':''}`}
        style={{transform:`translateX(${dx}px)`}}
        onMouseDown={onPD} onMouseMove={onPM} onMouseUp={onPU} onMouseLeave={onPU}
        onTouchStart={onPD} onTouchMove={onPM} onTouchEnd={onPU}
        onClick={dx!==0?(e=>{e.stopPropagation();setDx(0);setStage(0);}):undefined}
      >
        {children}
      </div>
    </div>
  );
}

  const {data,upsertBlocks,showToast}=useApp();

            {[
              ['여유시간',`${result.diagnostics.freeMinutes}분`],
              ['딥워크',`${result.diagnostics.deepWorkMin}분`],
              ['배치',`${result.diagnostics.placedCount}개`],

/* ═══════════════════════════════════════════
   TIMELINE COMPONENT
═══════════════════════════════════════════ */
function Timeline({date,blocks,events,onAddEvent}){
  const START=8,END=21;
  const totalMin=(END-START)*60;
  const nowMin=useMemo(()=>{
    const d=new Date();
    const m=d.getHours()*60+d.getMinutes();
    return m;
  },[]);
  const isToday=date===todayStr();
  const nowPct=isToday?clamp(((nowMin-START*60)/totalMin)*100,0,100):null;

  const allBlocks=[
    ...blocks.filter(b=>!b.deletedAt&&b.date===date).map(b=>({...b,isBlock:true})),
    ...events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===date).map(e=>({
      id:e.id,title:e.title,
      startTime:(e.startDateTime||'').slice(11,16),
      endTime:(e.endDateTime||'').slice(11,16),
      domain:'event',isEvent:true,
    })),
  ].sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));

  const HOURS=Array.from({length:END-START},(_,i)=>START+i);

  return(
    <div style={{position:'relative',marginTop:8}}>
      {/* Hour lines */}
      {HOURS.map(h=>{
        const pct=((h-START)/((END-START)))*100;
        return(
          <div key={h} style={{position:'absolute',left:0,right:0,top:`${pct}%`,borderTop:'1px solid var(--b1)',display:'flex',alignItems:'center',zIndex:1}}>
            <span style={{fontSize:10,color:'var(--t3)',minWidth:36,fontFamily:'DM Mono,monospace',paddingRight:4}}>{p2(h)}:00</span>
          </div>
        );
      })}

      {/* Now line */}
      {nowPct!==null&&(
        <div className="tl-now-line" style={{top:`${nowPct}%`}}/>
      )}

      {/* Blocks */}
      <div style={{marginLeft:40,position:'relative',height:`${(END-START)*48}px`}}>
        {allBlocks.map(b=>{
          const sm=toMin(b.startTime);const em=toMin(b.endTime);
          const top=((sm-START*60)/totalMin)*100;
          const height=((em-sm)/totalMin)*100;
          const isNow=isToday&&nowMin>=sm&&nowMin<em;
          const bgColor=b.isEvent?'var(--orange)':b.domain==='personal'?'var(--personal)':'var(--work)';
          return(
            <div key={b.id} style={{
              position:'absolute',left:0,right:0,
              top:`${top}%`,height:`${Math.max(height,2.5)}%`,
              background:bgColor+'22',border:`1.5px solid ${bgColor}`,
              borderRadius:8,padding:'3px 8px',overflow:'hidden',
              display:'flex',alignItems:'center',gap:6,
            }}>
              {isNow&&<span className="pulse" style={{width:6,height:6,borderRadius:3,background:bgColor,flexShrink:0}}/>}
              <span style={{fontSize:11,fontWeight:700,color:bgColor,fontFamily:'DM Mono,monospace',flexShrink:0}}>{b.startTime}</span>
              <span style={{fontSize:11,fontWeight:600,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.title}</span>
              {isNow&&<span style={{fontSize:9,fontWeight:700,color:bgColor,marginLeft:'auto',flexShrink:0}}>진행중</span>}
            </div>
          );
        })}
      </div>

      <button onClick={onAddEvent} style={{display:'flex',alignItems:'center',gap:6,marginTop:8,padding:'8px 14px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:13,cursor:'pointer',width:'100%',justifyContent:'center'}}>
        + 일정 추가
      </button>
    </div>
  );
}

function TodayPage(){
  const {data,currentUser,showToast}=useApp();
  const today=todayStr();
  const [detailTask,setDetailTask]=useState(null);
  const [showSchedule,setShowSchedule]=useState(false);
  const [showTriage,setShowTriage]=useState(false);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [showAddTask,setShowAddTask]=useState(false);

  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const todayTasks=tasks.filter(t=>t.dueDate===today&&t.status!=='done');
  const doneTodayTasks=tasks.filter(t=>t.dueDate===today&&t.status==='done');
  const totalToday=todayTasks.length+doneTodayTasks.length;
  const doneCount=doneTodayTasks.length;
  const pct=totalToday>0?Math.round((doneCount/totalToday)*100):0;

  // Focus 3: top priority tasks for today
  const focus3=tasks
    .filter(t=>t.status!=='done'&&(t.dueDate===today||t.priority===1))
    .sort((a,b)=>{
      const as=scoreTask(a,today);const bs=scoreTask(b,today);return bs-as;
    }).slice(0,3);

  // Work tasks grouped by project
  const workTasks=todayTasks.filter(t=>t.domain==='work');
  const projMap={};
  for(const t of workTasks){
    const key=t.projectId||'__none__';
    if(!projMap[key])projMap[key]=[];
    projMap[key].push(t);
  }

  // Personal tasks
  const personalTasks=todayTasks.filter(t=>t.domain==='personal');

  // Overdue
  const overdue=tasks.filter(t=>t.status!=='done'&&t.dueDate&&t.dueDate<today);

  // Today's blocks and events
  const todayBlocks=data.timeBlocks.filter(b=>!b.deletedAt&&b.date===today);
  const todayEvents=data.events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===today);

  // Family summary (for parent)
  const isParent=currentUser.role==='parent';
  const familyProgress=isParent?data.familyMembers.filter(m=>m.role==='child').map(child=>{
    const childTasks=tasks.filter(t=>t.assigneeId===child.id||t.ownerUserId===child.id);
    const done=childTasks.filter(t=>t.status==='done').length;
    return{child,done,total:childTasks.length};
  }):[];

  const sectionStyle={marginBottom:24};
  const sectionTitle={fontSize:12,fontWeight:700,color:'var(--t2)',letterSpacing:1,textTransform:'uppercase',marginBottom:10};

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>{fmt(today).full}</div>
          <div style={{fontSize:13,color:'var(--t2)',marginTop:2}}>
            {pct===100?'🎉 오늘 완료!':pct>=50?`${pct}% 완료 · 잘 하고 있어요`:`${totalToday-doneCount}개 남음`}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setShowTriage(true)} style={{padding:'8px 12px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:12,fontWeight:600,cursor:'pointer'}}>⚡ 우선순위</button>
          <button onClick={()=>setShowSchedule(true)} style={{padding:'8px 12px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>🗓 자동배치</button>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{marginBottom:20}}>
        <div className="prog-track">
          <div className="prog-fill" style={{width:`${pct}%`}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
          <span style={{fontSize:11,color:'var(--t3)'}}>완료 {doneCount}/{totalToday}</span>
          <span style={{fontSize:11,color:'var(--t3)'}}>{pct}%</span>
        </div>
      </div>

      {/* Overdue */}
      {overdue.length>0&&(
        <div style={{...sectionStyle,background:'var(--dlow)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--danger)33'}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--danger)',marginBottom:8}}>⚠️ 지연 {overdue.length}개</div>
          {overdue.slice(0,3).map(t=>(
            <div key={t.id} style={{fontSize:13,color:'var(--t1)',padding:'4px 0',cursor:'pointer'}} onClick={()=>setDetailTask(t)}>
              {t.title} <span style={{fontSize:11,color:'var(--danger)'}}>({relativeDay(t.dueDate)})</span>
            </div>
          ))}
        </div>
      )}

      {/* Family summary (parent only) */}
      {isParent&&familyProgress.some(f=>f.total>0)&&(
        <div style={sectionStyle}>
          <div style={sectionTitle}>가족 현황</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {familyProgress.filter(f=>f.total>0).map(({child,done,total})=>(
              <div key={child.id} style={{background:'var(--s2)',borderRadius:12,padding:'10px 14px',flex:1,minWidth:100}}>
                <div style={{fontSize:18,marginBottom:4}}>{child.avatar}</div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--t1)'}}>{child.name}</div>
                <div style={{fontSize:11,color:'var(--t3)'}}>{done}/{total}</div>
                <div className="prog-track" style={{marginTop:6}}>
                  <div className="prog-fill" style={{width:`${total>0?Math.round(done/total*100):0}%`}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Focus 3 */}
      {focus3.length>0&&(
        <div style={sectionStyle}>
          <div style={sectionTitle}>🎯 Focus 3</div>
          <div style={{background:'var(--s2)',borderRadius:14,padding:'4px 0',border:'1px solid var(--b1)'}}>
            {focus3.map((t,i)=>(
              <div key={t.id} className="focus-item press" onClick={()=>setDetailTask(t)} style={{padding:'10px 14px'}}>
                <span style={{fontSize:16,fontWeight:900,color:'var(--t3)',minWidth:20}}>{i+1}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>{t.title}</div>
                  <div style={{display:'flex',gap:6,marginTop:2}}>
                    {t.energy&&<EnergyDot level={t.energy}/>}
                    <span style={{fontSize:11,color:'var(--t3)'}}>{t.durationMin}분</span>
                    {t.type==='deepwork'&&<span style={{fontSize:10,color:'var(--purple)'}}>🧠</span>}
                  </div>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:t.priority===1?'var(--a1c)':t.priority===2?'var(--warn)':'var(--t3)'}}>
                  {t.priority===1?'A1':t.priority===2?'B1':'C1'}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Work tasks by project */}
      {Object.keys(projMap).length>0&&(
        <div style={sectionStyle}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={sectionTitle}>💼 업무</div>
            <button onClick={()=>setShowAddTask(true)} style={{fontSize:12,color:'var(--work)',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>+ 추가</button>
          </div>
          {Object.entries(projMap).map(([projId,ptasks])=>{
            const proj=projId!=='__none__'?data.projects.find(p=>p.id===projId):null;
            return(
              <div key={projId} style={{marginBottom:12}}>
                {proj&&<div style={{fontSize:11,fontWeight:700,color:proj.color,marginBottom:6,display:'flex',alignItems:'center',gap:6}}><span style={{width:8,height:8,borderRadius:4,background:proj.color,display:'inline-block'}}/>{proj.name}</div>}
                {ptasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject={false}/>)}
              </div>
            );
          })}
        </div>
      )}

      {/* Personal tasks */}
      {personalTasks.length>0&&(
        <div style={sectionStyle}>
          <div style={sectionTitle}>🌿 개인</div>
          {personalTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask}/>)}
        </div>
      )}

      {/* Timeline */}
      <div style={sectionStyle}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={sectionTitle}>⏱ 타임라인</div>
          <button onClick={()=>setShowSchedule(true)} style={{fontSize:12,color:'var(--work)',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>자동 배치</button>
        </div>
        <Timeline date={today} blocks={todayBlocks} events={todayEvents} onAddEvent={()=>setShowAddEvent(true)}/>
      </div>

      {/* Done */}
      {doneTodayTasks.length>0&&(
        <div style={sectionStyle}>
          <div style={sectionTitle}>✅ 완료 ({doneTodayTasks.length})</div>
          {doneTodayTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} compact/>)}
        </div>
      )}

      {/* Sheets */}
      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <ScheduleSheet open={showSchedule} onClose={()=>setShowSchedule(false)} date={today}/>
      <TriageSuggestSheet open={showTriage} onClose={()=>setShowTriage(false)}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={today}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={today}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PLAN PAGE (14-day)
═══════════════════════════════════════════ */
function PlanPage(){
  const {data}=useApp();
  const today=todayStr();
  const [expandedDate,setExpandedDate]=useState(today);
  const [detailTask,setDetailTask]=useState(null);
  const [showAddTask,setShowAddTask]=useState(false);
  const [addTaskDate,setAddTaskDate]=useState(today);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [showSchedule,setShowSchedule]=useState(false);
  const [scheduleDate,setScheduleDate]=useState(today);

  const days=Array.from({length:14},(_,i)=>addDays(today,i));
  const tasks=data.tasks.filter(t=>!t.deletedAt);

  function tasksForDate(d){
    return tasks.filter(t=>t.dueDate===d&&t.status!=='done');
  }
  function eventsForDate(d){
    return data.events.filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===d);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{fontSize:22,fontWeight:900,color:'var(--t1)',marginBottom:20}}>14일 계획</div>
      {days.map(d=>{
        const f=fmt(d);
        const dayTasks=tasksForDate(d);
        const dayEvents=eventsForDate(d);
        const isToday=d===today;
        const isExpanded=expandedDate===d;
        const isWeekend=f.dow===0||f.dow===6;
        const hasDone=tasks.filter(t=>t.dueDate===d&&t.status==='done').length;

        return(
          <div key={d} style={{marginBottom:8}}>
            <div
              className="press"
              onClick={()=>setExpandedDate(isExpanded?null:d)}
              style={{
                display:'flex',alignItems:'center',gap:12,
                padding:'12px 16px',borderRadius:14,
                background:isToday?'var(--wlow)':isExpanded?'var(--s2)':'var(--s1)',
                border:`1.5px solid ${isToday?'var(--work)':isExpanded?'var(--b2)':'var(--b1)'}`,
                cursor:'pointer',
              }}
            >
              <div style={{textAlign:'center',minWidth:36}}>
                <div style={{fontSize:18,fontWeight:900,color:isToday?'var(--work)':isWeekend?'var(--danger)':'var(--t1)'}}>{f.d}</div>
                <div style={{fontSize:10,color:isToday?'var(--work)':'var(--t3)'}}>{f.day}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {dayEvents.slice(0,2).map(e=>(
                    <span key={e.id} style={{fontSize:11,background:'var(--orangelow)',color:'var(--orange)',borderRadius:6,padding:'2px 6px',fontWeight:600}}>{e.title}</span>
                  ))}
                  {dayTasks.slice(0,3).map(t=>(
                    <span key={t.id} style={{fontSize:11,background:t.priority===1?'var(--a1low)':'var(--s3)',color:t.priority===1?'var(--a1c)':'var(--t2)',borderRadius:6,padding:'2px 6px'}}>{t.title}</span>
                  ))}
                  {dayTasks.length===0&&dayEvents.length===0&&<span style={{fontSize:12,color:'var(--t3)'}}>비어있음</span>}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
                {dayTasks.length>0&&<span style={{fontSize:11,fontWeight:700,color:'var(--t2)'}}>{dayTasks.length}개</span>}
                {hasDone>0&&<span style={{fontSize:10,color:'var(--success)'}}>✓{hasDone}</span>}
                <span style={{fontSize:12,color:'var(--t3)'}}>{isExpanded?'▲':'▼'}</span>
              </div>
            </div>

            {isExpanded&&(
              <div style={{background:'var(--s2)',borderRadius:'0 0 14px 14px',padding:'12px 16px',border:'1px solid var(--b1)',borderTop:'none',marginTop:-4}}>
                {dayEvents.map(e=>(
                  <div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--b1)'}}>
                    <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'var(--orange)',minWidth:80}}>{(e.startDateTime||'').slice(11,16)} – {(e.endDateTime||'').slice(11,16)}</span>
                    <span style={{fontSize:13,color:'var(--t1)'}}>{e.title}</span>
                    <span style={{fontSize:10,background:'var(--orangelow)',color:'var(--orange)',borderRadius:4,padding:'1px 5px'}}>일정</span>
                  </div>
                ))}
                {dayTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject compact/>)}
                {tasks.filter(t=>t.dueDate===d&&t.status==='done').map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} compact/>)}
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  <button onClick={()=>{setAddTaskDate(d);setShowAddTask(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:12,cursor:'pointer'}}>+ 태스크</button>
                  <button onClick={()=>{setAddTaskDate(d);setShowAddEvent(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:12,cursor:'pointer'}}>+ 일정</button>
                  <button onClick={()=>{setScheduleDate(d);setShowSchedule(true);}} style={{flex:1,padding:'8px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>자동배치</button>
                </div>
              </div>
            )}
          </div>
        );
      })}

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={addTaskDate}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={addTaskDate}/>
      <ScheduleSheet open={showSchedule} onClose={()=>setShowSchedule(false)} date={scheduleDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MONTH PAGE
═══════════════════════════════════════════ */
function MonthPage(){
  const {data}=useApp();
  const today=todayStr();
  const [viewDate,setViewDate]=useState(()=>{const[y,m]=today.split('-').map(Number);return{y,m};});
  const [selectedDate,setSelectedDate]=useState(today);
  const [showAddEvent,setShowAddEvent]=useState(false);
  const [showAddTask,setShowAddTask]=useState(false);
  const [detailTask,setDetailTask]=useState(null);

  const {y,m}=viewDate;
  const firstDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const events=data.events.filter(e=>!e.deletedAt);

  function dotsForDate(d){
    const dateStr=`${y}-${p2(m)}-${p2(d)}`;
    const hasTasks=tasks.some(t=>t.dueDate===dateStr&&t.status!=='done');
    const hasEvents=events.some(e=>(e.startDateTime||'').slice(0,10)===dateStr);
    const hasPersonal=tasks.some(t=>t.dueDate===dateStr&&t.domain==='personal'&&t.status!=='done');
    return{hasTasks,hasEvents,hasPersonal};
  }

  const selDateStr=selectedDate;
  const selTasks=tasks.filter(t=>t.dueDate===selDateStr);
  const selEvents=events.filter(e=>(e.startDateTime||'').slice(0,10)===selDateStr);

  const DOW=['일','월','화','수','목','금','토'];

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <button onClick={()=>setViewDate(v=>v.m===1?{y:v.y-1,m:12}:{y:v.y,m:v.m-1})} style={{background:'var(--s2)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',color:'var(--t1)',fontSize:16}}>‹</button>
        <span style={{fontSize:20,fontWeight:900,color:'var(--t1)'}}>{y}년 {m}월</span>
        <button onClick={()=>setViewDate(v=>v.m===12?{y:v.y+1,m:1}:{y:v.y,m:v.m+1})} style={{background:'var(--s2)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',color:'var(--t1)',fontSize:16}}>›</button>
      </div>

      {/* DOW headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {DOW.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:i===0?'var(--danger)':i===6?'var(--work)':'var(--t3)',padding:'4px 0'}}>{d}</div>)}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {Array.from({length:firstDay},(_,i)=><div key={'e'+i}/>)}
        {Array.from({length:daysInMonth},(_,i)=>{
          const d=i+1;
          const dateStr=`${y}-${p2(m)}-${p2(d)}`;
          const isToday=dateStr===today;
          const isSel=dateStr===selectedDate;
          const isWeekend=new Date(y,m-1,d).getDay()===0||new Date(y,m-1,d).getDay()===6;
          const dots=dotsForDate(d);
          return(
            <div key={d} className="press" onClick={()=>setSelectedDate(dateStr)} style={{
              textAlign:'center',padding:'6px 2px',borderRadius:10,cursor:'pointer',
              background:isSel?'var(--work)':isToday?'var(--wlow)':'transparent',
              border:isToday&&!isSel?'1.5px solid var(--work)':'1.5px solid transparent',
            }}>
              <div style={{fontSize:14,fontWeight:isToday||isSel?700:400,color:isSel?'#fff':isWeekend?'var(--danger)':'var(--t1)'}}>{d}</div>
              <div style={{display:'flex',justifyContent:'center',gap:2,marginTop:2}}>
                {dots.hasTasks&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--work)'}}/>}
                {dots.hasPersonal&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--personal)'}}/>}
                {dots.hasEvents&&<span className="dot" style={{background:isSel?'rgba(255,255,255,0.7)':'var(--orange)'}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      <div style={{marginTop:20,background:'var(--s1)',borderRadius:16,border:'1px solid var(--b1)',padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:16,color:'var(--t1)'}}>{fmt(selDateStr).full}</span>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowAddTask(true)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:12,cursor:'pointer'}}>+ 태스크</button>
            <button onClick={()=>setShowAddEvent(true)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--work)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>+ 일정</button>
          </div>
        </div>
        {selEvents.map(e=>(
          <div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--b1)'}}>
            <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'var(--orange)',minWidth:80}}>{(e.startDateTime||'').slice(11,16)} – {(e.endDateTime||'').slice(11,16)}</span>
            <span style={{fontSize:13,color:'var(--t1)',flex:1}}>{e.title}</span>
          </div>
        ))}
        {selTasks.map(t=><TaskRow key={t.id} task={t} onTap={setDetailTask} showProject/>)}
        {selTasks.length===0&&selEvents.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:'20px 0',fontSize:13}}>이 날은 비어있어요</div>}
      </div>

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <AddEventSheet open={showAddEvent} onClose={()=>setShowAddEvent(false)} defaultDate={selectedDate}/>
      <AddTaskSheet open={showAddTask} onClose={()=>setShowAddTask(false)} defaultDomain="work" defaultDueDate={selectedDate}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SIGNAL PAGE (9-Bucket Board)
═══════════════════════════════════════════ */
function SignalPage(){
  const {data,updateTask,showToast}=useApp();
  const today=todayStr();
  const [view,setView]=useState('board'); // 'board' | 'list'
  const [detailTask,setDetailTask]=useState(null);
  const [showTriage,setShowTriage]=useState(false);

  const tasks=data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work');

  const buckets=useMemo(()=>{
    const map={};
    for(const b of ALL_BUCKETS)map[b]=[];
    for(const t of tasks){
      const b=bucketOf(t,today);
      if(map[b])map[b].push(t);
    }
    return map;
  },[tasks,today]);

  const a1Count=buckets['A1']?.length||0;
  const b1Count=buckets['B1']?.length||0;
  const deepMin=tasks.filter(t=>t.type==='deepwork').reduce((s,t)=>s+(t.durationMin||0),0);
  const totalMin=tasks.reduce((s,t)=>s+(t.durationMin||0),0);

  function promote(taskId){
    updateTask(taskId,{priority:1,dueDate:today});
    showToast('A1으로 승격됨','success');
  }

  const BUCKET_COLORS={
    A1:'var(--a1c)',A2:'var(--warn)',A3:'var(--t3)',
    B1:'var(--work)',B2:'var(--purple)',B3:'var(--t3)',
    C1:'var(--personal)',C2:'var(--t3)',C3:'var(--t3)',
  };

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>Signal</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setView(v=>v==='board'?'list':'board')} style={{padding:'8px 12px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:12,cursor:'pointer'}}>{view==='board'?'목록':'보드'}</button>
          <button onClick={()=>setShowTriage(true)} style={{padding:'8px 12px',borderRadius:10,border:'none',background:'var(--a1c)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>⚡ 승격</button>
        </div>
      </div>

      {/* Stats bar */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:20}}>
        {[
          ['A1',a1Count+'개','var(--a1c)'],
          ['B1',b1Count+'개','var(--work)'],
          ['딥워크',deepMin+'분','var(--purple)'],
          ['총',totalMin+'분','var(--t2)'],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:'var(--s2)',borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',fontWeight:600}}>{l}</div>
            <div style={{fontSize:16,fontWeight:800,color:c,marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>

      {view==='board'?(
        /* Board view: 3x3 grid */
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:2,marginBottom:4}}>
            {['긴급(1)','보통(2)','여유(3)'].map(l=><div key={l} style={{textAlign:'center',fontSize:10,color:'var(--t3)',fontWeight:700,padding:'4px'}}>{l}</div>)}
          </div>
          {['A','B','C'].map(imp=>(
            <div key={imp} style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4,marginBottom:4}}>
              {[1,2,3].map(urg=>{
                const b=imp+urg;
                const bTasks=buckets[b]||[];
                const col=BUCKET_COLORS[b];
                return(
                  <div key={b} style={{background:'var(--s2)',borderRadius:12,padding:'8px',minHeight:80,border:`1.5px solid ${b==='A1'?'var(--a1c)':b==='B1'?'var(--work)':'var(--b1)'}`}}>
                    <div style={{fontSize:10,fontWeight:800,color:col,marginBottom:6}}>{b}</div>
                    {bTasks.slice(0,3).map(t=>(
                      <div key={t.id} className="press" onClick={()=>setDetailTask(t)} style={{fontSize:10,color:'var(--t1)',padding:'3px 0',borderBottom:'1px solid var(--b1)',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {t.title}
                      </div>
                    ))}
                    {bTasks.length>3&&<div style={{fontSize:9,color:'var(--t3)',marginTop:4}}>+{bTasks.length-3}개</div>}
                    {bTasks.length===0&&<div style={{fontSize:10,color:'var(--t3)',textAlign:'center',marginTop:8}}>—</div>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      ):(
        /* List view */
        <div>
          {ALL_BUCKETS.filter(b=>(buckets[b]||[]).length>0).map(b=>{
            const bTasks=buckets[b]||[];
            const col=BUCKET_COLORS[b];
            return(
              <div key={b} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:800,color:col}}>{b}</span>
                  <span style={{fontSize:11,color:'var(--t3)'}}>{bTasks.length}개</span>
                  {b==='B1'&&<button onClick={()=>setShowTriage(true)} style={{fontSize:10,padding:'3px 8px',borderRadius:6,border:'none',background:'var(--a1c)',color:'#fff',cursor:'pointer',fontWeight:700}}>↑A1 승격</button>}
                </div>
                {bTasks.map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <div style={{flex:1}}><TaskRow task={t} onTap={setDetailTask} showProject compact/></div>
                    {b==='B1'&&<button onClick={()=>promote(t.id)} style={{padding:'6px 10px',borderRadius:8,border:'none',background:'var(--a1low)',color:'var(--a1c)',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>↑A1</button>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
      <TriageSuggestSheet open={showTriage} onClose={()=>setShowTriage(false)}/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   INBOX PAGE
═══════════════════════════════════════════ */
function InboxPage(){
  const {data,addTask,deleteTask,showToast}=useApp();
  const [input,setInput]=useState('');
  const [organizeTask,setOrganizeTask]=useState(null);
  const [detailTask,setDetailTask]=useState(null);
  const inputRef=useRef(null);

  const inboxTasks=data.tasks.filter(t=>!t.deletedAt&&t.domain==='inbox').sort((a,b)=>b.createdAt-a.createdAt);

  function submit(){
    const title=input.trim();
    if(!title)return;
    addTask({title,domain:'inbox'});
    setInput('');
    showToast('Inbox에 추가됨');
  }

  function organizeAll(){
    if(inboxTasks.length===0)return;
    setOrganizeTask(inboxTasks[0]);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>Inbox</div>
        {inboxTasks.length>0&&(
          <button onClick={organizeAll} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>정리 ({inboxTasks.length})</button>
        )}
      </div>

      {/* Quick input */}
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        <input
          ref={inputRef}
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          placeholder="무엇이든 빠르게 입력..."
          style={{flex:1,background:'var(--s1)',border:'1.5px solid var(--b2)',borderRadius:12,padding:'12px 16px',color:'var(--t1)',fontSize:15}}
        />
        <button onClick={submit} style={{padding:'12px 18px',borderRadius:12,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>+</button>
      </div>

      {inboxTasks.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--t3)'}}>
          <div style={{fontSize:40,marginBottom:12}}>📥</div>
          <div style={{fontSize:15,fontWeight:600}}>Inbox가 비어있어요</div>
          <div style={{fontSize:13,marginTop:6}}>위에서 빠르게 입력하세요</div>
        </div>
      )}

      {inboxTasks.map(t=>(
        <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <div style={{flex:1}}>
            <SwipeRow
              onLeft1={()=>deleteTask(t.id)}
              onLeft2={()=>deleteTask(t.id)}
              onRight1={()=>setOrganizeTask(t)}
              left1Label="삭제" left2Label="삭제"
              right1Label="정리" right2Label="정리"
              left1Color="var(--danger)" left2Color="var(--danger)"
              right1Color="var(--work)" right2Color="var(--work)"
            >
              <div className="press" onClick={()=>setDetailTask(t)} style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>📥</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--t1)'}}>{t.title}</div>
                  <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{new Date(t.createdAt).toLocaleDateString('ko-KR')}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();setOrganizeTask(t);}} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--wlow)',color:'var(--work)',fontSize:12,fontWeight:700,cursor:'pointer'}}>정리</button>
              </div>
            </SwipeRow>
          </div>
        </div>
      ))}

      <OrganizeSheet open={!!organizeTask} onClose={()=>setOrganizeTask(null)} task={organizeTask}/>
      <TaskDetailSheet task={detailTask} open={!!detailTask} onClose={()=>setDetailTask(null)}/>
    </div>
  );
}

function FamilyPage(){
  const {data,markAnnouncementSeen,updateHomework,addAnnouncement,currentUser,showToast}=useApp();
  const [tab,setTab]=useState('overview'); // 'overview' | 'homework' | 'announcements'
  const [showAddAnn,setShowAddAnn]=useState(false);
  const [annTitle,setAnnTitle]=useState('');
  const [annBody,setAnnBody]=useState('');
  const [annAudience,setAnnAudience]=useState('family');
  const [annPriority,setAnnPriority]=useState('normal');

  const children=data.familyMembers.filter(m=>m.role==='child');
  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const today=todayStr();

  function submitAnn(){
    if(!annTitle.trim())return;
    addAnnouncement({title:annTitle,body:annBody,authorId:currentUser.id,audience:annAudience,priority:annPriority});
    setAnnTitle('');setAnnBody('');setShowAddAnn(false);
  }

  const fieldStyle={background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginTop:6};

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{fontSize:22,fontWeight:900,color:'var(--t1)',marginBottom:16}}>가족</div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,marginBottom:20,background:'var(--s2)',borderRadius:12,padding:4}}>
        {[['overview','현황'],['homework','숙제'],['announcements','공지']].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'8px',borderRadius:10,border:'none',background:tab===v?'var(--s1)':'transparent',color:tab===v?'var(--t1)':'var(--t3)',fontWeight:tab===v?700:400,fontSize:13,cursor:'pointer',transition:'all 0.15s'}}>{l}</button>
        ))}
      </div>

      {tab==='overview'&&(
        <div>
          {children.map(child=>{
            const childTasks=tasks.filter(t=>(t.assigneeId===child.id||t.ownerUserId===child.id));
            const todayTasks=childTasks.filter(t=>t.dueDate===today);
            const done=todayTasks.filter(t=>t.status==='done').length;
            const pct=todayTasks.length>0?Math.round(done/todayTasks.length*100):0;
            const childHW=data.homeworks.filter(hw=>hw.assigneeId===child.id&&hw.status!=='done');
            return(
              <div key={child.id} style={{background:'var(--s1)',borderRadius:16,padding:'16px',marginBottom:12,border:'1px solid var(--b1)'}}>

                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:16,color:'var(--t1)'}}>{child.name}</div>
                    <div style={{fontSize:12,color:'var(--t3)'}}>오늘 {done}/{todayTasks.length} 완료</div>
                  </div>
                  <span style={{fontSize:20,fontWeight:900,color:child.color}}>{pct}%</span>
                </div>
                <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`,background:child.color}}/></div>
                {childHW.length>0&&(
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--t2)',marginBottom:6}}>미완료 숙제</div>
                    {childHW.slice(0,2).map(hw=>{
                      const lesson=data.lessons.find(l=>l.id===hw.lessonId);
                      return(
                        <div key={hw.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderTop:'1px solid var(--b1)'}}>

                            <div style={{fontSize:12,color:'var(--t1)'}}>{hw.title}</div>
                            {lesson&&<div style={{fontSize:10,color:'var(--t3)'}}>{lesson.name}</div>}
                          </div>
                          <div style={{width:60}}>
                            <div className="prog-track"><div className="prog-fill" style={{width:`${hw.progress}%`}}/></div>
                            <div style={{fontSize:9,color:'var(--t3)',textAlign:'right',marginTop:2}}>{hw.progress}%</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab==='homework'&&(
        <div>
          {data.lessons.map(lesson=>{
            const teacher=data.familyMembers.find(m=>m.id===lesson.teacherId);
            const lessonHW=data.homeworks.filter(hw=>hw.lessonId===lesson.id);
            return(
              <div key={lesson.id} style={{marginBottom:20}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{width:10,height:10,borderRadius:5,background:lesson.color,display:'inline-block'}}/>
                  <span style={{fontWeight:700,fontSize:15,color:'var(--t1)'}}>{lesson.name}</span>
                  {teacher&&<span style={{fontSize:11,color:'var(--t3)'}}>{teacher.name}</span>}
                </div>
                {lessonHW.map(hw=>{
                  const student=data.familyMembers.find(m=>m.id===hw.assigneeId);
                  return(
                    <div key={hw.id} style={{background:'var(--s1)',borderRadius:12,padding:'12px 14px',marginBottom:6,border:'1px solid var(--b1)'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:18}}>{student?.avatar||'👤'}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--t1)'}}>{hw.title}</div>
                          <div style={{fontSize:11,color:'var(--t3)'}}>{student?.name} · 마감 {relativeDay(hw.dueDate)}</div>
                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:hw.status==='done'?'var(--success)':hw.status==='doing'?'var(--warn)':'var(--t3)'}}>

                        </span>
                      </div>
                      <div style={{marginTop:8}}>
                        <div className="prog-track"><div className="prog-fill" style={{width:`${hw.progress}%`}}/></div>
                        <div style={{fontSize:10,color:'var(--t3)',textAlign:'right',marginTop:2}}>{hw.progress}%</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {tab==='announcements'&&(
        <div>
          <button onClick={()=>setShowAddAnn(true)} style={{width:'100%',padding:'12px',borderRadius:12,border:'1px dashed var(--b2)',background:'transparent',color:'var(--work)',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:16}}>+ 공지 작성</button>
          {data.announcements.map(ann=>{
            const author=data.familyMembers.find(m=>m.id===ann.authorId);
            const seen=ann.seenBy.includes(currentUser.id);
            return(
              <div key={ann.id} onClick={()=>markAnnouncementSeen(ann.id,currentUser.id)} style={{background:'var(--s1)',borderRadius:14,padding:'14px',marginBottom:8,border:`1.5px solid ${ann.priority==='high'?'var(--danger)33':'var(--b1)'}`,cursor:'pointer',opacity:seen?0.7:1}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      {ann.priority==='high'&&<span style={{fontSize:10,fontWeight:700,color:'var(--danger)',background:'var(--dlow)',borderRadius:4,padding:'1px 5px'}}>중요</span>}
                      {!seen&&<span style={{width:6,height:6,borderRadius:3,background:'var(--work)',display:'inline-block'}}/>}
                      <span style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>{ann.title}</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--t2)',marginBottom:6}}>{ann.body}</div>
                    <div style={{fontSize:11,color:'var(--t3)'}}>{author?.name} · {ann.seenBy.length}명 확인</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Add announcement modal */}
      <Modal open={showAddAnn} onClose={()=>setShowAddAnn(false)} title="공지 작성">
        <input value={annTitle} onChange={e=>setAnnTitle(e.target.value)} style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:10}} placeholder="공지 제목"/>
        <textarea value={annBody} onChange={e=>setAnnBody(e.target.value)} style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',minHeight:80,resize:'vertical',marginBottom:10}} placeholder="내용"/>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          {[['family','전체'],['lesson','레슨']].map(([v,l])=>(
            <button key={v} onClick={()=>setAnnAudience(v)} style={{flex:1,padding:'8px',borderRadius:10,border:`1.5px solid ${annAudience===v?'var(--work)':'var(--b2)'}`,background:annAudience===v?'var(--wlow)':'var(--s2)',color:annAudience===v?'var(--work)':'var(--t2)',fontWeight:600,fontSize:13,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[['normal','일반'],['high','중요']].map(([v,l])=>(
            <button key={v} onClick={()=>setAnnPriority(v)} style={{flex:1,padding:'8px',borderRadius:10,border:`1.5px solid ${annPriority===v?'var(--danger)':'var(--b2)'}`,background:annPriority===v?'var(--dlow)':'var(--s2)',color:annPriority===v?'var(--danger)':'var(--t2)',fontWeight:600,fontSize:13,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        <button onClick={submitAnn} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>등록</button>
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════
   BUDGET PAGE (Mom-focused)
═══════════════════════════════════════════ */
const EXPENSE_CATEGORIES=['식비','교육비','생활비','교통','취미','의료','쇼핑','기타'];

function BudgetPage(){
  const {data,addExpense,deleteExpense,updateBudget,showToast}=useApp();
  const today=todayStr();
  const month=today.slice(0,7);
  const [showAdd,setShowAdd]=useState(false);
  const [amount,setAmount]=useState('');
  const [category,setCategory]=useState('식비');
  const [note,setNote]=useState('');
  const [editBudget,setEditBudget]=useState(false);
  const [budgetInput,setBudgetInput]=useState(String(data.budget.total));

  const expenses=data.expenses.filter(e=>!e.deletedAt);
  const insights=useMemo(()=>computeBudgetInsights(expenses,data.budget.total,month),[expenses,data.budget.total,month]);

  function submitExpense(){
    if(!amount||isNaN(Number(amount)))return;
    addExpense({amount:Number(amount),category,note,date:today});
    setAmount('');setNote('');setShowAdd(false);
  }

  function saveBudget(){
    updateBudget({total:Number(budgetInput),month});
    setEditBudget(false);
    showToast('예산 저장됨','success');
  }

  const gaugeColor=insights.pct>=90?'var(--danger)':insights.pct>=70?'var(--warn)':'var(--success)';

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>가계부</div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'10px 16px',borderRadius:12,border:'none',background:'var(--budget)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>+ 지출</button>
      </div>

      {/* Budget gauge */}
      <div style={{background:'var(--s1)',borderRadius:16,padding:'16px',marginBottom:16,border:'1px solid var(--b1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:12,color:'var(--t3)'}}>이번 달 예산</div>
            {editBudget?(
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
                <input type="number" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:8,padding:'6px 10px',color:'var(--t1)',fontSize:16,fontWeight:700,width:140}} onKeyDown={e=>e.key==='Enter'&&saveBudget()}/>
                <button onClick={saveBudget} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,cursor:'pointer'}}>저장</button>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontSize:24,fontWeight:900,color:'var(--t1)'}}>{fmtMoney(data.budget.total)}</div>
                <button onClick={()=>setEditBudget(true)} style={{fontSize:11,color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}>수정</button>
              </div>
            )}
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:12,color:'var(--t3)'}}>사용</div>
            <div style={{fontSize:20,fontWeight:800,color:gaugeColor}}>{insights.pct}%</div>
          </div>
        </div>
        <div className="budget-gauge">
          <div className="budget-fill" style={{width:`${Math.min(insights.pct,100)}%`,background:gaugeColor}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
          <span style={{fontSize:11,color:'var(--t3)'}}>사용 {fmtMoney(insights.total)}</span>
          <span style={{fontSize:11,color:insights.remaining<0?'var(--danger)':'var(--t3)'}}>잔여 {fmtMoney(Math.max(0,insights.remaining))}</span>
        </div>
        {insights.overBudget&&<div style={{fontSize:11,color:'var(--danger)',marginTop:6,fontWeight:600}}>⚠️ 현재 소비 속도로는 예산 초과 예상</div>}
        <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>일 평균 {fmtMoney(insights.burnRate)} · 남은 {insights.daysLeft}일 · 일 가용 {fmtMoney(Math.max(0,insights.dailyBudget))}</div>
      </div>

      {/* AI Insights cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {insights.topCats.slice(0,2).map(([cat,amt],i)=>(
          <div key={cat} style={{background:'var(--s1)',borderRadius:14,padding:'12px',border:'1px solid var(--b1)'}}>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>TOP {i+1} 지출</div>
            <div style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>{cat}</div>
            <div style={{fontSize:16,fontWeight:900,color:'var(--budget)'}}>{fmtMoney(amt)}</div>

      {/* Anomalies */}
      {insights.anomalies.length>0&&(
        <div style={{background:'var(--warnlow)',borderRadius:12,padding:'12px 14px',marginBottom:16,border:'1px solid var(--warn)33'}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--warn)',marginBottom:6}}>⚠️ 이상 지출 감지</div>
          {insights.anomalies.map(e=>(
            <div key={e.id} style={{fontSize:13,color:'var(--t1)'}}>{e.note||e.category}: {fmtMoney(e.amount)}</div>
          ))}
        </div>
      )}

      {/* Expense list */}
      <div style={{fontSize:13,fontWeight:700,color:'var(--t2)',marginBottom:10}}>이번 달 지출</div>
      {expenses.filter(e=>e.date&&e.date.startsWith(month)).sort((a,b)=>b.createdAt-a.createdAt).map(e=>(

          <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px'}}>
            <div style={{flex:1}}>

              <div style={{fontSize:11,color:'var(--t3)'}}>{e.category} · {relativeDay(e.date)}</div>
            </div>
            <div style={{fontSize:16,fontWeight:800,color:'var(--t1)'}}>{fmtMoney(e.amount)}</div>
