<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLOW — 생산성 OS v6</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080809; --s1:#101012; --s2:#17171A; --s3:#1F1F24; --s4:#27272D;
  --b1:rgba(255,255,255,0.06); --b2:rgba(255,255,255,0.11); --b3:rgba(255,255,255,0.18);
  --t1:#EDEDF0; --t2:#8A8A9E; --t3:#555568;
  --work:#4F8EF7; --wlow:rgba(79,142,247,0.12); --wmid:rgba(79,142,247,0.25);
  --personal:#2DD4BF; --plow:rgba(45,212,191,0.12); --pmid:rgba(45,212,191,0.25);
  --danger:#F56565; --dlow:rgba(245,101,101,0.15);
  --warn:#FBBF24; --warnlow:rgba(251,191,36,0.15);
  --success:#34D399; --slow:rgba(52,211,153,0.15);
  --purple:#A78BFA; --purplow:rgba(167,139,250,0.15);
  --a1c:#FF6B6B; --a1low:rgba(255,107,107,0.15);
  --orange:#FB923C; --orangelow:rgba(251,146,60,0.15);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1)}
body{overflow:hidden}
::-webkit-scrollbar{width:0;height:0}
button,input,textarea,select{font-family:inherit}
input,textarea,select{background:none;color:inherit}
input::placeholder,textarea::placeholder{color:var(--t3)}
input:focus,textarea:focus,select:focus{outline:none}
button:focus{outline:none}
button{cursor:pointer}

.press{transition:transform 0.08s ease,opacity 0.08s ease;cursor:pointer}
.press:active{transform:scale(0.96);opacity:0.85}
.no-dim.press:active{opacity:1}

@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet-in{animation:su 0.22s cubic-bezier(0.16,1,0.3,1) forwards}
.fade-in{animation:fi 0.18s ease forwards}
@keyframes faderow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row-in{animation:faderow 0.2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease infinite}
@keyframes tapflash{0%{opacity:0.18}100%{opacity:0}}
.tap-flash::after{content:'';position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,0.12);animation:tapflash 0.14s ease forwards;pointer-events:none}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.pop-in{animation:popIn 0.18s cubic-bezier(0.16,1,0.3,1) forwards}

.mono{font-family:'DM Mono',monospace}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,9,0.93);
  border-top:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.fab{
  position:fixed;bottom:74px;right:20px;
  width:56px;height:56px;border-radius:28px;
  background:var(--work);border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(79,142,247,0.45);
  z-index:110;cursor:pointer;
  transition:transform 0.12s ease,box-shadow 0.12s ease;
}
.fab:active{transform:scale(0.92);box-shadow:0 2px 10px rgba(79,142,247,0.3)}
.fab.held{transform:scale(1.08);background:#6BA3FF;box-shadow:0 6px 28px rgba(79,142,247,0.6)}
.prog-track{height:3px;border-radius:2px;background:var(--s3);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--success);transition:width 0.4s cubic-bezier(0.16,1,0.3,1)}
.focus-item{display:flex;align-items:center;gap:12px;padding:10px 0}
.focus-item+.focus-item{border-top:1px solid var(--b1)}
.swipe-wrap{position:relative;border-radius:12px;overflow:visible;margin-bottom:6px;user-select:none}
.dot{width:5px;height:5px;border-radius:3px;display:inline-block}
.tl-now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);pointer-events:none;z-index:5}
.tl-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:5px;background:var(--danger)}
.energy-dot{width:8px;height:8px;border-radius:4px;display:inline-block;flex-shrink:0}
select{-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useContext,createContext,useCallback,useReducer}=React;

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
let _uid=0;
function uid(){return 'id_'+(++_uid)+'_'+Math.random().toString(36).slice(2,7)}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function addDays(dateStr,days){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d+days);
  return `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`;
}
function fmt(dateStr){
  if(!dateStr)return{m:0,d:0,day:'',full:''};
  const [y,m,d]=dateStr.split('-').map(Number);
  const days=['일','월','화','수','목','금','토'];
  const dt=new Date(y,m-1,d);
  return{m,d,day:days[dt.getDay()],full:`${m}월 ${d}일 (${days[dt.getDay()]})`,dow:dt.getDay()};
}
function toMin(hhmm){if(!hhmm)return 0;const [h,m]=hhmm.split(':').map(Number);return h*60+(m||0)}
function toHHMM(min){return `${p2(Math.floor(min/60))}:${p2(min%60)}`}
function relativeDay(dateStr){
  const today=todayStr();
  if(dateStr===today)return'오늘';
  if(dateStr===addDays(today,1))return'내일';
  if(dateStr===addDays(today,-1))return'어제';
  const f=fmt(dateStr);
  return `${f.m}/${f.d}(${f.day})`;
}
function daysBetween(a,b){
  const [ay,am,ad]=a.split('-').map(Number);
  const [by,bm,bd]=b.split('-').map(Number);
  const da=new Date(ay,am-1,ad).getTime();
  const db=new Date(by,bm-1,bd).getTime();
  return Math.round((db-da)/86400000);
}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function nowHHMM(){const d=new Date();return `${p2(d.getHours())}:${p2(d.getMinutes())}`}

/* ═══════════════════════════════════════════
   SIGNAL / BUCKET UTILS  (A1…C3)
═══════════════════════════════════════════ */
function importanceOf(t){if(t.priority===1)return'A';if(t.priority===2)return'B';return'C'}
function urgencyOf(t,today){
  const d=t.deadlineDate||t.dueDate;
  if(!d)return 3;
  const diff=daysBetween(today,d);
  if(diff<=1)return 1;
  if(diff<=3)return 2;
  return 3;
}
function bucketOf(t,today){return importanceOf(t)+''+urgencyOf(t,today)}
function bucketSortKey(b){
  const imp=b[0]==='A'?0:b[0]==='B'?1:2;
  return imp*10+(Number(b[1])-1);
}
const ALL_BUCKETS=['A1','A2','A3','B1','B2','B3','C1','C2','C3'];

/* ═══════════════════════════════════════════
   DEPENDENCY PARSING
═══════════════════════════════════════════ */
function parseDeps(notes){
  if(!notes)return[];
  const re=/^(선행|depends_on|prereq)\s*:\s*([^\n]+)/im;
  const m=(notes||'').match(re);
  if(!m)return[];
  return m[2].split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
}
function upsertDepsInNotes(notes,depIds){
  const lines=(notes||'').split('\n');
  const next=lines.filter(l=>!/^(선행|depends_on|prereq)\s*:/i.test(l.trim()));
  if(depIds.length)next.unshift('선행: '+[...new Set(depIds)].join(', '));
  return next.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function buildDepGraph(tasks){
  const depsByTaskId=new Map();
  const dependentsByTaskId=new Map();
  const existing=new Set(tasks.filter(t=>!t.deletedAt).map(t=>t.id));
  for(const t of tasks){
    if(t.deletedAt)continue;
    const deps=parseDeps(t.notes).filter(id=>existing.has(id));
    depsByTaskId.set(t.id,deps);
    for(const depId of deps){
      const arr=dependentsByTaskId.get(depId)||[];
      arr.push(t.id);
      dependentsByTaskId.set(depId,arr);
    }
  }
  return{depsByTaskId,dependentsByTaskId};
}

/* ═══════════════════════════════════════════
   HEURISTIC TRIAGE
═══════════════════════════════════════════ */
const KW_RISK=['계약','자금','대출','등기','세금','분양','착공','준공','소송','민원','투자','법인','허가'];
const KW_URGENT=['오늘','내일','긴급','당장','마감','회신','제출','즉시','바로'];
const KW_DEEP=['작성','기획','전략','검토','분석','제안서','계약서','보고서','설계','연구','정리','구현'];
const KW_CALL=['전화','콜','통화','연락','회신','미팅','회의'];
const KW_ERRAND=['방문','현장','이동','픽업','구매','배달','수령'];
function includesAny(text,words){const t=(text||'').toLowerCase();return words.some(w=>t.includes(w.toLowerCase()))}
function heuristicTriage(title,today){
  let type='admin';
  if(includesAny(title,KW_DEEP))type='deepwork';
  if(includesAny(title,KW_CALL))type='call';
  if(includesAny(title,KW_ERRAND))type='errand';
  let dur=30;
  if(type==='deepwork')dur=90;
  if(type==='errand')dur=60;
  if(type==='call')dur=30;
  let priority=3;
  if(includesAny(title,KW_RISK))priority=1;
  else if(includesAny(title,KW_URGENT))priority=1;
  else if(type==='deepwork')priority=2;
  let dueDate=null;
  if(includesAny(title,KW_URGENT))dueDate=today;
  return{type,durationMin:dur,priority,dueDate};
}

/* ═══════════════════════════════════════════
   PROMOTION REASON
═══════════════════════════════════════════ */
function computePromotionReason(task,allTasks,today){
  let score=0;const bullets=[];
  const d=task.deadlineDate||task.dueDate;
  if(d){
    const diff=daysBetween(today,d);
    if(diff<=0){score+=60;bullets.push('마감/실행일이 오늘이거나 지연 → 지금 처리 가치 매우 큼');}
    else if(diff<=1){score+=45;bullets.push('내일까지 영향 → 미루면 일정 깨질 확률 큼');}
    else if(diff<=3){score+=25;bullets.push('3일 이내 마감 → 이번 주 초반 처리 유리');}
    else{score+=10;bullets.push('마감은 여유 있으나 선제 처리로 리스크 감소');}
  } else{score+=8;bullets.push('명시 마감 없음 → 리스크/의존성 기반 선제 처리 후보');}
  const riskHit=KW_RISK.filter(w=>task.title.includes(w));
  if(riskHit.length){score+=35;bullets.push('리스크/금액 키워드: '+riskHit.slice(0,3).join(', '));}
  const graph=buildDepGraph(allTasks);
  const deps=(graph.dependentsByTaskId.get(task.id)||[]);
  const byId=new Map(allTasks.map(t=>[t.id,t]));
  const activeDeps=deps.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt&&t.status!=='done');
  if(activeDeps.length){
    let pressure=0;
    for(const dt of activeDeps){
      const dd2=dt.deadlineDate||dt.dueDate;
      if(dd2){const diff=daysBetween(today,dd2);pressure+=diff<=0?30:diff<=1?22:diff<=3?14:8;}
      else pressure+=4;
    }
    const bonus=Math.min(30,activeDeps.length*6+Math.round(pressure/10));
    score+=bonus;
    bullets.push(`병목: 후행 ${activeDeps.length}개 대기 → ${activeDeps.slice(0,2).map(t=>t.title).join(', ')}`);
  }
  if(task.type==='deepwork'){score+=12;bullets.push('딥워크 → 90분 블록 확보 필요');}
  else if(task.type==='call'){score+=10;bullets.push('콜/회신 → 짧게 처리하면 대기 감소');}
  const dur=task.durationMin||30;
  if(dur>=120){score-=6;bullets.push('2시간+ → 오늘은 1개만 배치 권장');}
  else if(dur>=60){score+=6;bullets.push('1시간 내외 → 오늘 타임라인 배치 적합');}
  else{score+=8;bullets.push('30분 내외 → 오늘 끝내기 좋은 퀵윈');}
  return{score:clamp(score,0,100),bullets:bullets.slice(0,4)};
}

/* ═══════════════════════════════════════════
   SCHEDULER v2 — meeting clustering + deepwork priority + insights
═══════════════════════════════════════════ */
const MEETING_GAP=30;
const MIN_DEEPWORK=90;

function mergeBusy(busy){
  const arr=busy.slice().sort((a,b)=>a.start-b.start);
  const out=[];
  for(const s of arr){const l=out[out.length-1];if(l&&s.start<=l.end)l.end=Math.max(l.end,s.end);else out.push({...s});}
  return out;
}
function clusterBusy(busy){
  const merged=mergeBusy(busy);
  if(merged.length<=1)return merged;
  const out=[];let cur={...merged[0]};
  for(let i=1;i<merged.length;i++){
    const nxt=merged[i];
    if(nxt.start-cur.end<=MEETING_GAP)cur.end=Math.max(cur.end,nxt.end);
    else{out.push(cur);cur={...nxt};}
  }
  out.push(cur);return out;
}
function subtractBusy(free,busy){
  let out=[...free];
  for(const b of busy){
    const next=[];
    for(const s of out){
      if(b.end<=s.start||b.start>=s.end){next.push(s);continue;}
      if(b.start>s.start)next.push({start:s.start,end:b.start});
      if(b.end<s.end)next.push({start:b.end,end:s.end});
    }
    out=next.filter(s=>s.end>s.start);
  }
  return out;
}
function splitIntoSlots(ranges,slotMin){
  const out=[];
  for(const r of ranges){let c=r.start;while(c+slotMin<=r.end){out.push({start:c,end:c+slotMin});c+=slotMin;}}
  return out;
}
function overlapMin(r,windows){
  let s=0;
  for(const w of windows)s+=Math.max(0,Math.min(r.end,w.end)-Math.max(r.start,w.start));
  return s;
}
function findBestRun(slots,needMin,deepWindows,preferDeep){
  if(!slots.length)return null;
  const slotLen=slots[0].end-slots[0].start||30;
  const needSlots=Math.ceil(needMin/slotLen);
  let best=null,bestScore=-1e9;
  for(let i=0;i<slots.length;i++){
    let end=slots[i].end,count=1;
    const start=slots[i].start;
    while(i+count<slots.length&&slots[i+count].start===end){end=slots[i+count].end;count++;
      if(count>=needSlots){
        const run={start,end:start+needSlots*slotLen};
        let sc=0;
        if(preferDeep&&deepWindows)sc+=overlapMin(run,deepWindows)*2;
        sc+=(1000-run.start);
        if(sc>bestScore){bestScore=sc;best=run;}
        break;
      }
    }
    if(count>=needSlots&&!best){
      const run={start,end:start+needSlots*slotLen};
      let sc=preferDeep&&deepWindows?overlapMin(run,deepWindows)*2:0;
      sc+=(1000-start);
      if(sc>bestScore){bestScore=sc;best=run;}
    }
  }
  return best;
}
function consumeRun(slots,run){
  return slots.filter(s=>{
    const ov=Math.min(s.end,run.end)-Math.max(s.start,run.start);
    return ov<=0;
  });
}
function scoreTask(t,date){
  let s=(4-(t.priority||3))*100;
  if(t.dueDate===date)s+=90;
  if(t.deadlineDate){const dl=daysBetween(date,t.deadlineDate);s+=clamp(220-25*dl,-100,220);}
  if(t.type==='deepwork')s+=60;
  if(!t.durationMin)s-=120;
  return s;
}

function scheduleDayV2({date,tasks,events,existingBlocks,settings}){
  const ws=toMin(settings.workdayStart||'09:00');
  const we=toMin(settings.workdayEnd||'18:00');
  const ls=toMin(settings.lunchStart||'12:00');
  const le=toMin(settings.lunchEnd||'13:00');
  const slotMin=settings.slotMin||30;
  const deepWin=(settings.deepWorkWindows||[{start:'10:00',end:'12:00'},{start:'13:00',end:'15:00'}])
    .map(w=>({start:toMin(w.start),end:toMin(w.end)}));

  const eventBusy=(events||[]).filter(e=>!e.deletedAt&&(e.startDateTime||'').slice(0,10)===date)
    .map(e=>({start:toMin((e.startDateTime||'').slice(11,16)),end:toMin((e.endDateTime||'').slice(11,16))}));

  const fixedBusy=(existingBlocks||[]).filter(b=>!b.deletedAt&&b.date===date&&!b.linkedTaskId)
    .map(b=>({start:toMin(b.startTime),end:toMin(b.endTime)}));

  const rawBusy=[{start:ls,end:le},...eventBusy,...fixedBusy];
  const busy=clusterBusy(rawBusy);

  const freeRanges=subtractBusy([{start:ws,end:we}],busy);
  let freeSlots=splitIntoSlots(freeRanges,slotMin);

  const eligible=(tasks||[]).filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work')
    .filter(t=>(t.dueDate?t.dueDate<=date:true));

  const deepTasks=eligible.filter(t=>t.type==='deepwork');
  const otherTasks=eligible.filter(t=>t.type!=='deepwork');
  const sortBySc=(arr)=>arr.slice().map(t=>({t,s:scoreTask(t,date)})).sort((a,b)=>b.s-a.s).map(x=>x.t);

  const proposed=[];
  const deferred=[];
  let protectedDeep=0;

  function placeTask(t,preferDeep){
    const dur=t.type==='deepwork'?Math.max(t.durationMin||30,MIN_DEEPWORK):t.durationMin||30;
    const run=findBestRun(freeSlots,dur,deepWin,preferDeep);
    if(!run){
      if(t.splitAllowed){
        let remaining=dur;const blocks=[];
        for(const s of freeSlots){
          if(remaining<=0)break;
          const take=Math.min(remaining,s.end-s.start);
          if(take<15)continue;
          blocks.push({taskId:t.id,date,startTime:toHHMM(s.start),endTime:toHHMM(s.start+take),title:t.title+' (분할)',domain:t.domain});
          remaining-=take;
        }
        if(remaining<=0){
          proposed.push(...blocks);
          for(const b of blocks)freeSlots=consumeRun(freeSlots,{start:toMin(b.startTime),end:toMin(b.endTime)});
        } else deferred.push({taskId:t.id,reason:'no_free_slot'});
      } else deferred.push({taskId:t.id,reason:'no_contiguous_slot'});
      return;
    }
    const actualEnd=run.start+dur;
    if(preferDeep)protectedDeep+=overlapMin({start:run.start,end:actualEnd},deepWin);
    proposed.push({taskId:t.id,date,startTime:toHHMM(run.start),endTime:toHHMM(actualEnd),title:t.title,domain:t.domain});
    freeSlots=consumeRun(freeSlots,{start:run.start,end:actualEnd});
  }

  for(const t of sortBySc(deepTasks))placeTask(t,true);
  for(const t of sortBySc(otherTasks))placeTask(t,false);

  const movableBlocks=(existingBlocks||[]).filter(b=>!b.deletedAt&&b.date===date&&!!b.linkedTaskId)
    .sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const movedBlocks=[];
  let conflictsResolved=0;
  for(const b of movableBlocks){
    const dur=toMin(b.endTime)-toMin(b.startTime);
    const run=findBestRun(freeSlots,dur,null,false);
    if(!run){conflictsResolved++;continue;}
    movedBlocks.push({...b,startTime:toHHMM(run.start),endTime:toHHMM(run.start+dur),updatedAt:Date.now()});
    freeSlots=consumeRun(freeSlots,{start:run.start,end:run.start+dur});
    conflictsResolved++;
  }

  const proposedIds=new Set(proposed.map(p=>p.taskId));
  const focus3=sortBySc(eligible).filter(t=>proposedIds.has(t.id)).slice(0,3).map(t=>t.id);

  const freeMinutes=freeSlots.reduce((a,s)=>a+(s.end-s.start),0);
  const totalWork=(we-ws)-(le-ls)-eventBusy.reduce((a,e)=>a+(e.end-e.start),0);
  const avoidedMeetingMin=eventBusy.reduce((a,e)=>a+(e.end-e.start),0);

  return{
    proposedBlocks:proposed,movedBlocks,focus3,deferred,
    diagnostics:{freeMinutes,utilization:clamp(totalWork>0?1-freeMinutes/totalWork:0,0,1)},
    insights:{
      protectedDeepWorkMin:Math.round(protectedDeep),
      avoidedMeetingMin:Math.round(avoidedMeetingMin),
      conflictsResolved,
      movedBlocksCount:movedBlocks.length,
      deferredCount:deferred.length
    }
  };
}

const Ctx=createContext(null);

function AppProvider({children}){
  const [data,setData]=useState(()=>{
    try{
      const s=localStorage.getItem('flow_v6');
      if(s){
        const p=JSON.parse(s);
        return{
          tasks:p.tasks||SEED_TASKS,projects:p.projects||SEED_PROJECTS,
          events:p.events||SEED_EVENTS,timeBlocks:p.timeBlocks||SEED_BLOCKS,
          settings:{...DEFAULT_SETTINGS,...(p.settings||{})},focus3:p.focus3||[],
          habits:p.habits||[],habitLogs:p.habitLogs||[],
        };
      }
    }catch(e){}
    return{tasks:SEED_TASKS,projects:SEED_PROJECTS,events:SEED_EVENTS,timeBlocks:SEED_BLOCKS,settings:DEFAULT_SETTINGS,focus3:[],habits:[],habitLogs:[]};
  });
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{
    try{localStorage.setItem('flow_v6',JSON.stringify(data));}catch(e){}
  },[data]);

  function showToast(msg,type='info'){
    const id=uid();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  }
  const mut=(fn)=>setData(d=>{const n=JSON.parse(JSON.stringify(d));fn(n);return n;});

  const a={
    addTask:(t)=>mut(d=>{d.tasks=[...d.tasks,{id:uid(),createdAt:Date.now(),updatedAt:Date.now(),...t}]}),
    updateTask:(id,u)=>mut(d=>{d.tasks=d.tasks.map(t=>t.id===id?{...t,...u,updatedAt:Date.now()}:t)}),
    deleteTask:(id)=>{mut(d=>{d.tasks=d.tasks.filter(t=>t.id!==id)});showToast('삭제됨','warn');},
    toggleDone:(id)=>mut(d=>{
      d.tasks=d.tasks.map(t=>{
        if(t.id!==id)return t;
        const next=t.status==='done'?'todo':'done';
        return{...t,status:next,completedAt:next==='done'?Date.now():null,updatedAt:Date.now()};
      });
    }),
    moveTomorrow:(id)=>{mut(d=>{d.tasks=d.tasks.map(t=>t.id===id?{...t,dueDate:addDays(todayStr(),1),updatedAt:Date.now()}:t)});showToast('내일로 이동됨');},
    organizeTask:(id,u)=>mut(d=>{d.tasks=d.tasks.map(t=>t.id===id?{...t,...u,status:'todo',updatedAt:Date.now()}:t)}),
    upsertBlocks:(blocks)=>mut(d=>{
      const now=Date.now();
      for(const b of blocks){
        const key=`${b.date}::${b.linkedTaskId||b.id}`;
        const idx=d.timeBlocks.findIndex(x=>`${x.date}::${x.linkedTaskId||x.id}`===key);
        if(idx>=0){
          d.timeBlocks[idx]={...d.timeBlocks[idx],...b,id:d.timeBlocks[idx].id,updatedAt:now};
        } else {
          d.timeBlocks.push({id:uid(),...b,createdAt:now,updatedAt:now});
        }
      }
    }),
    addBlocks:(blocks)=>mut(d=>{d.timeBlocks=[...d.timeBlocks,...blocks.map(b=>({id:uid(),...b,createdAt:Date.now(),updatedAt:Date.now()}))]}),
    deleteBlock:(id)=>mut(d=>{d.timeBlocks=d.timeBlocks.filter(b=>b.id!==id)}),
    clearTodayBlocks:()=>mut(d=>{d.timeBlocks=d.timeBlocks.filter(b=>b.date!==todayStr())}),
    addEvent:(e)=>mut(d=>{d.events=[...d.events,{id:uid(),createdAt:Date.now(),updatedAt:Date.now(),...e}]}),
    deleteEvent:(id)=>mut(d=>{d.events=d.events.filter(e=>e.id!==id)}),
    addProject:(p)=>mut(d=>{d.projects=[...d.projects,{id:uid(),...p}]}),
    deleteProject:(id)=>mut(d=>{d.projects=d.projects.filter(p=>p.id!==id)}),
    updateSettings:(u)=>mut(d=>{d.settings={...d.settings,...u}}),
    syncFocus3:(today2)=>mut(d=>{
      const activeWork=d.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work');
      let a1=activeWork.filter(t=>bucketOf(t,today2)==='A1')
        .sort((x,y)=>{
          const dx=(x.deadlineDate||x.dueDate||'9999-12-31');
          const dy=(y.deadlineDate||y.dueDate||'9999-12-31');
          return dx.localeCompare(dy);
        });
      if(!a1.length){
        a1=activeWork.filter(t=>bucketOf(t,today2)==='B1')
          .sort((x,y)=>(x.deadlineDate||x.dueDate||'9999-12-31').localeCompare(y.deadlineDate||y.dueDate||'9999-12-31'));
      }
      d.focus3=a1.slice(0,3).map(t=>t.id);
    }),
    setFocus3:(ids)=>mut(d=>{d.focus3=ids.slice(0,3);}),
    // Habits
    addHabit:(h)=>mut(d=>{d.habits=[...d.habits,{id:uid(),createdAt:Date.now(),...h}]}),
    deleteHabit:(id)=>mut(d=>{d.habits=d.habits.filter(h=>h.id!==id)}),
    toggleHabitLog:(habitId,date)=>mut(d=>{
      const key=`${habitId}::${date}`;
      const idx=d.habitLogs.findIndex(l=>l.key===key);
      if(idx>=0)d.habitLogs.splice(idx,1);
      else d.habitLogs.push({key,habitId,date,ts:Date.now()});
    }),
    resetData:()=>{
      mut(d=>{Object.assign(d,{tasks:SEED_TASKS,projects:SEED_PROJECTS,events:SEED_EVENTS,timeBlocks:SEED_BLOCKS,settings:DEFAULT_SETTINGS,focus3:[],habits:[],habitLogs:[]})});
      showToast('데이터 초기화됨');
    },
    showToast,
  };

  return(
    <Ctx.Provider value={{data,...a}}>
      {children}
      <ToastContainer toasts={toasts}/>
    </Ctx.Provider>
  );
}
const useApp=()=>useContext(Ctx);

        }}>{t.msg}</div>

}

    <div onClick={onClick} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:pad?'14px 16px':0,...style}}>
      {children}
    </div>
  );
}
function SecLabel({children,right}){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.1em'}}>{children}</div>
      {right}
    </div>
  );
}
function Chip({children,on,color,onClick,sm}){
  const bg=on?(color?color+'25':'var(--wmid)'):'transparent';
  const bd=on?(color?color+'55':'var(--work)'):'var(--b2)';
  const cl=on?(color||'var(--work)'):'var(--t2)';
  return(
    <button onClick={onClick} className="press" style={{
      display:'inline-flex',alignItems:'center',gap:4,
      height:sm?24:30,padding:sm?'0 8px':'0 13px',
      borderRadius:999,background:bg,border:`1px solid ${bd}`,
      color:cl,fontSize:sm?11:12,fontWeight:500,whiteSpace:'nowrap',
      transition:'all 0.15s ease',flexShrink:0
    }}>{children}</button>
  );
}
function PrimaryBtn({children,onClick,disabled,danger,small}){
  return(
    <button onClick={onClick} disabled={disabled} className="press" style={{
      flex:1,height:small?38:48,borderRadius:12,border:'none',
      background:disabled?'var(--s3)':danger?'var(--danger)':'var(--work)',
      color:'#fff',fontSize:small?13:15,fontWeight:600,
      opacity:disabled?0.5:1,cursor:disabled?'not-allowed':'pointer'
    }}>{children}</button>
  );
}
function GhostBtn({children,onClick,small}){
  return(
    <button onClick={onClick} className="press" style={{
      flex:1,height:small?38:48,borderRadius:12,
      border:'1px solid var(--b2)',background:'transparent',
      color:'var(--t2)',fontSize:small?13:15,cursor:'pointer'
    }}>{children}</button>
  );
}

/* ═══════════════════════════════════════════
   SHEET
═══════════════════════════════════════════ */
function Sheet({open,onClose,title,children,footer,maxH}){
  if(!open)return null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:200}}>
      <div className="fade-in" onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}/>
      <div className="sheet-in" style={{
        position:'absolute',left:0,right:0,bottom:0,
        background:'var(--s1)',borderTop:'1px solid var(--b2)',
        borderRadius:'20px 20px 0 0',padding:'12px 20px 32px',
        maxHeight:maxH||'90vh',display:'flex',flexDirection:'column',
        boxShadow:'0 -8px 40px rgba(0,0,0,0.5)'
      }}>
        <div style={{width:40,height:4,borderRadius:2,background:'var(--b2)',margin:'0 auto 16px',flexShrink:0}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:700}}>{title}</div>
          <button onClick={onClose} className="press" style={{width:32,height:32,borderRadius:16,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="x" s={15} c="var(--t2)"/>
          </button>
        </div>
        <div className="scroll" style={{flex:1,paddingRight:2,overflowY:'auto'}}>{children}</div>
        {footer&&<div style={{marginTop:16,flexShrink:0}}>{footer}</div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TASK ROW — 2-stage swipe (iOS Mail feel)
   Stage 1 (≥COMMIT): icon only revealed
   Stage 2 (≥FULL): immediate action
   Tap (<TAP_SLOP, <250ms): open TaskDetail
═══════════════════════════════════════════ */
function TaskRow({task,onToggle,onDelete,onTomorrow,onSchedule,projects,compact,onOpenDetail}){
  const [dx,setDx]=useState(0);
  const [committed,setCommitted]=useState(null);
  const [armed,setArmed]=useState(false);
  const [tapFlash,setTapFlash]=useState(false);
  const drag=useRef(false);
  const sx=useRef(0),sy=useRef(0),pid=useRef(null);
  const dxRef=useRef(0);
  const downAt=useRef(0);
  const didSwipe=useRef(false);

  const AW=152,COMMIT=AW*0.5,FULL=AW*1.2,MAX=AW*1.5;
  const TAP_SLOP=10,TAP_MS=260;

  function reset(){setDx(0);setCommitted(null);setArmed(false);drag.current=false;dxRef.current=0;}

  function pd(e){
    if(e.button&&e.button!==0)return;
    pid.current=e.pointerId;
    e.currentTarget.setPointerCapture(e.pointerId);
    drag.current=true;didSwipe.current=false;
    sx.current=e.clientX;sy.current=e.clientY;
    downAt.current=performance.now();
  }
  function pm(e){
    if(!drag.current||e.pointerId!==pid.current)return;
    const ddx=e.clientX-sx.current,ddy=e.clientY-sy.current;
    if(Math.abs(ddy)>14&&Math.abs(ddy)>Math.abs(ddx)){drag.current=false;return;}
    if(Math.abs(ddx)>TAP_SLOP)didSwipe.current=true;
    const base=committed==='left'?-AW:committed==='right'?AW:0;
    const newDx=Math.max(-MAX,Math.min(MAX,base+ddx));
    dxRef.current=newDx;setDx(newDx);
    const isFull=newDx<=-FULL||newDx>=FULL;
    if(isFull&&!armed)setArmed(true);
    if(!isFull&&armed)setArmed(false);
  }
  function pu(e){
    if(!drag.current||e.pointerId!==pid.current)return;
    drag.current=false;
    const cur=dxRef.current;
    const elapsed=performance.now()-downAt.current;

    if(cur<=-FULL){act('done');return;}
    if(cur>=FULL){act('tomorrow');return;}

    const nearZero=Math.abs(cur)<TAP_SLOP;
    if(!didSwipe.current&&nearZero&&elapsed<TAP_MS&&committed===null){
      setTapFlash(true);
      setTimeout(()=>setTapFlash(false),140);
      onOpenDetail?.(task.id);
      return;
    }

    if(committed===null){
      if(cur<=-COMMIT){setDx(-AW);setCommitted('left');}
      else if(cur>=COMMIT){setDx(AW);setCommitted('right');}
      else reset();
    } else {
      const ct=AW*0.35;
      if((committed==='left'&&cur>-ct)||(committed==='right'&&cur<ct))reset();
      else setDx(committed==='left'?-AW:AW);
    }
  }

  function act(a){
    reset();
    if(a==='done')onToggle?.(task.id);
    else if(a==='delete')onDelete?.(task.id);
    else if(a==='tomorrow')onTomorrow?.(task.id);
    else if(a==='schedule')onSchedule?.(task.id);
  }

  const lr=Math.min(1,Math.max(0,-dx/AW));
  const rr=Math.min(1,Math.max(0,dx/AW));
  const done=task.status==='done';
  const proj=projects?.find(p=>p.id===task.projectId);
  const h=compact?48:56;
  const showLabels=committed!==null;

  const leftBg=armed&&dx<-FULL/2?'linear-gradient(90deg,var(--success),var(--danger))':'linear-gradient(90deg,var(--success)60%,var(--danger))';
  const rightBg=armed&&dx>FULL/2?'linear-gradient(90deg,var(--warn),var(--work))':'linear-gradient(90deg,var(--warn)50%,var(--work))';

  const actionBtn=(label,icon,action)=>(
    <button onClick={()=>act(action)} style={{
      flex:1,background:'transparent',border:'none',
      color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,
      letterSpacing:'0.04em'
    }}>
      <Ic n={icon} s={16} c="#fff"/>
      {showLabels&&<span style={{opacity:0.9}}>{label}</span>}
    </button>
  );

  const energyColor=task.energy==='high'?'var(--danger)':task.energy==='med'?'var(--warn)':'var(--t3)';

  return(
    <div className="swipe-wrap">
      <div style={{position:'absolute',inset:0,display:'flex',borderRadius:12,overflow:'hidden',opacity:lr,pointerEvents:lr>0.2?'auto':'none',background:leftBg}}>
        {actionBtn('완료','check','done')}
        {actionBtn('삭제','trash','delete')}
      </div>
      <div style={{position:'absolute',inset:0,display:'flex',justifyContent:'flex-end',borderRadius:12,overflow:'hidden',opacity:rr,pointerEvents:rr>0.2?'auto':'none',background:rightBg}}>
        {actionBtn('내일로','clock','tomorrow')}
        {actionBtn('스케줄','calendar','schedule')}
      </div>
      {armed&&dx<-FULL/2&&(
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'flex-start',padding:'0 20px',pointerEvents:'none',zIndex:2}}>
          <div style={{fontSize:12,fontWeight:800,color:'#fff',letterSpacing:'0.1em',textShadow:'0 1px 4px rgba(0,0,0,0.4)'}}>✓ 완료</div>
        </div>
      )}
      {armed&&dx>FULL/2&&(
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'0 20px',pointerEvents:'none',zIndex:2}}>
          <div style={{fontSize:12,fontWeight:800,color:'#000',letterSpacing:'0.1em',textShadow:'0 1px 4px rgba(255,255,255,0.3)'}}>내일로 →</div>
        </div>
      )}
      <div
        onPointerDown={pd} onPointerMove={pm} onPointerUp={pu} onPointerCancel={pu}
        className={`no-dim press${tapFlash?' tap-flash':''}`}
        style={{
          position:'relative',display:'flex',alignItems:'center',gap:12,
          height:h,padding:'0 13px',
          background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:12,
          transform:`translate3d(${dx}px,0,0)`,
          transition:drag.current?'none':'transform 0.14s cubic-bezier(0.16,1,0.3,1)',
          touchAction:'pan-y',
        }}
      >
        <button
          onPointerDown={e=>e.stopPropagation()}
          onClick={()=>onToggle?.(task.id)}
          style={{
            width:22,height:22,borderRadius:11,flexShrink:0,
            border:`1.8px solid ${done?'var(--success)':'var(--b2)'}`,
            background:done?'var(--success)':'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all 0.15s ease',
          }}
        >
          {done&&<Ic n="check" s={11} c="#052e16"/>}
        </button>
        {task.energy&&!compact&&<span className="energy-dot" style={{background:energyColor}}/>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{
            fontSize:compact?13.5:14.5,fontWeight:440,
            color:done?'var(--t3)':'var(--t1)',
            textDecoration:done?'line-through':'none',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'
          }}>{task.title}</div>
          {!compact&&(
            <div style={{display:'flex',gap:6,marginTop:2,alignItems:'center',flexWrap:'wrap'}}>
              {task.domain&&<span style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',color:task.domain==='work'?'var(--work)':'var(--personal)'}}>{task.domain==='work'?'WORK':'PERSONAL'}</span>}
              {proj&&<span style={{fontSize:10,fontWeight:600,color:proj.color}}>· {proj.name}</span>}
              {task.durationMin&&<span className="mono" style={{fontSize:10,color:'var(--t3)'}}>{task.durationMin}m</span>}
              {task.dueDate&&task.dueDate!==TODAY&&<span style={{fontSize:10,color:'var(--t3)'}}>· {relativeDay(task.dueDate)}</span>}
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0,alignItems:'center'}}>
          {task.type==='deepwork'&&<span style={{fontSize:9,padding:'2px 5px',borderRadius:4,background:'var(--purplow)',color:'var(--purple)',fontWeight:700}}>DEEP</span>}
          {task.priority===1&&<span style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'var(--dlow)',color:'var(--danger)',fontWeight:700}}>P1</span>}
          {task.priority===2&&<span style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'var(--warnlow)',color:'var(--warn)',fontWeight:700}}>P2</span>}
        </div>
        {committed!==null&&(
          <button onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();reset();}}
            style={{width:24,height:24,borderRadius:12,background:'var(--s2)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Ic n="x" s={12} c="var(--t3)"/>
          </button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PROJECT GROUP
═══════════════════════════════════════════ */
function ProjectGroup({proj,tasks,onToggle,onDelete,onTomorrow,onSchedule,onOpenDetail}){
  const [open,setOpen]=useState(true);
  const {data}=useApp();
  const todo=tasks.filter(t=>t.status!=='done');
  const done=tasks.filter(t=>t.status==='done').length;
  const pct=tasks.length>0?Math.round((done/tasks.length)*100):0;
  return(
    <Card pad={false} style={{overflow:'hidden',marginBottom:8}}>
      <button onClick={()=>setOpen(!open)} className="press" style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'11px 14px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
        <div style={{width:8,height:8,borderRadius:4,background:proj.color,flexShrink:0}}/>
        <div style={{flex:1,fontSize:14,fontWeight:600,color:'var(--t1)'}}>{proj.name}</div>
        {pct>0&&<div className="mono" style={{fontSize:10,color:pct===100?'var(--success)':'var(--t3)'}}>{pct}%</div>}
        {done>0&&<span className="mono" style={{fontSize:10,color:'var(--success)'}}>✓{done}</span>}
        <span className="mono" style={{fontSize:11,color:'var(--t3)'}}>{todo.length}/{tasks.length}</span>
        <Ic n={open?'chevDown':'chevRight'} s={15} c="var(--t3)"/>
      </button>
      {open&&(
        <div style={{padding:'0 10px 10px',display:'flex',flexDirection:'column',gap:6}}>
          {tasks.length===0
            ?<div style={{textAlign:'center',padding:'12px 0',color:'var(--t3)',fontSize:12}}>할 일 없음</div>
            :tasks.map(t=>(
              <TaskRow key={t.id} task={t} onToggle={onToggle} onDelete={onDelete}
                onTomorrow={onTomorrow} onSchedule={onSchedule} projects={data.projects} onOpenDetail={onOpenDetail}/>
            ))
          }
        </div>
      )}
    </Card>
  );
}

/* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
function FAB({onShort,onLong}){
  const timer=useRef(null);
  const held=useRef(false);
  const [isHeld,setIsHeld]=useState(false);
  function start(e){
    e.preventDefault();
    held.current=false;
    timer.current=setTimeout(()=>{held.current=true;setIsHeld(true);onLong?.();},500);
  }
  function end(){
    clearTimeout(timer.current);
    if(!held.current)onShort?.();
    setIsHeld(false);held.current=false;
  }
  return(
    <button className={`fab${isHeld?' held':''}`}
      onPointerDown={start} onPointerUp={end} onPointerCancel={end}
    >
      <Ic n="plus" s={26} c="#fff"/>
    </button>
  );
}

/* ═══════════════════════════════════════════
   QUICK ADD SHEET
═══════════════════════════════════════════ */
function QuickAddSheet({open,onClose,defTarget}){
  const {addTask,showToast}=useApp();
  const [text,setText]=useState('');
  const [domain,setDomain]=useState('work');
  const [target,setTarget]=useState(defTarget||'inbox');
  const [priority,setPriority]=useState(3);
  const [dur,setDur]=useState(30);
  const ref=useRef();
  useEffect(()=>{if(open){setText('');setTarget(defTarget||'inbox');setPriority(3);setDur(30);setTimeout(()=>ref.current?.focus(),120);}},[open,defTarget]);
  function go(){
    if(!text.trim())return;
    const tri=heuristicTriage(text.trim(),todayStr());
    addTask({
      title:text.trim(),
      domain:target==='today'?domain:null,
      status:target==='today'?'todo':'inbox',
      dueDate:target==='today'?todayStr():null,
      priority:target==='today'?priority:tri.priority,
      durationMin:target==='today'?dur:tri.durationMin,
      type:tri.type,
    });
    showToast(target==='today'?'오늘 할 일에 추가됨':'인박스에 저장됨','success');
    setText('');onClose();
  }
  return(
    <Sheet open={open} onClose={onClose} title="빠른 추가"
      footer={<div style={{display:'flex',gap:10}}><GhostBtn onClick={onClose}>취소</GhostBtn><PrimaryBtn onClick={go}>저장</PrimaryBtn></div>}
    >
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <input ref={ref} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}
          placeholder="무엇이든 입력하세요 (자동 분류)..."
          style={{width:'100%',padding:'13px 15px',borderRadius:12,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:16,color:'var(--t1)'}}
        />
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>저장 위치</div>
          <div style={{display:'flex',gap:8}}>
            <Chip on={target==='inbox'} onClick={()=>setTarget('inbox')}>📥 인박스</Chip>
            <Chip on={target==='today'} onClick={()=>setTarget('today')}>⚡ 오늘 할 일</Chip>
          </div>
        </div>
        {target==='today'&&(
          <>
            <div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>분류</div>
              <div style={{display:'flex',gap:8}}>
                <Chip on={domain==='work'} color="var(--work)" onClick={()=>setDomain('work')}>💼 Work</Chip>
                <Chip on={domain==='personal'} color="var(--personal)" onClick={()=>setDomain('personal')}>👤 Personal</Chip>
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>우선순위</div>
              <div style={{display:'flex',gap:8}}>
                {[[1,'P1 긴급','var(--danger)'],[2,'P2 보통','var(--warn)'],[3,'P3 낮음','var(--t3)']].map(([v,l,c])=>(
                  <Chip key={v} on={priority===v} color={c} onClick={()=>setPriority(v)}>{l}</Chip>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--t3)',marginBottom:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>예상 시간</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[15,30,60,90].map(m=>(
                  <Chip key={m} on={dur===m} onClick={()=>setDur(m)}>{m}m</Chip>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   ORGANIZE SHEET
═══════════════════════════════════════════ */
function OrganizeSheet({task,open,onClose}){
  const {data,organizeTask,showToast}=useApp();
  const [domain,setDomain]=useState('work');
  const [projId,setProjId]=useState(null);
  const [when,setWhen]=useState('today');
  const [pri,setPri]=useState(2);
  const [dur,setDur]=useState(60);
  const [type,setType]=useState('admin');
  const [energy,setEnergy]=useState('med');
  useEffect(()=>{
    if(task){
      setDomain(task.domain||'work');
      setProjId(task.projectId||null);
      setPri(task.priority||2);
      setDur(task.durationMin||60);
      setType(task.type||'admin');
      setEnergy(task.energy||'med');
    }
  },[task]);
  function getDate(){
    if(when==='today')return todayStr();
    if(when==='tomorrow')return addDays(todayStr(),1);
    if(when==='week')return addDays(todayStr(),4);
    return addDays(todayStr(),7);
  }
  function save(){
    if(!task)return;
    organizeTask(task.id,{domain,projectId:domain==='work'?projId:null,dueDate:getDate(),priority:pri,durationMin:dur,type,energy});
    showToast('정리 완료!','success');
    onClose();
  }
  return(
    <Sheet open={open} onClose={onClose} title="정리하기"
      footer={<div style={{display:'flex',gap:10}}><GhostBtn onClick={onClose}>취소</GhostBtn><PrimaryBtn onClick={save}>저장</PrimaryBtn></div>}
    >
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        {task&&<div style={{padding:'10px 14px',background:'var(--s2)',borderRadius:10,fontSize:14,color:'var(--t2)',fontStyle:'italic'}}>"{task.title}"</div>}
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>분류</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['work','💼 Work','var(--work)'],['personal','👤 Personal','var(--personal)']].map(([v,l,c])=>(
              <button key={v} onClick={()=>setDomain(v)} className="press" style={{height:44,borderRadius:11,border:`1px solid ${domain===v?c:'var(--b1)'}`,background:domain===v?c+'20':'transparent',color:domain===v?c:'var(--t2)',fontWeight:700,fontSize:14,cursor:'pointer'}}>{l}</button>
            ))}
          </div>
        </div>
        {domain==='work'&&(
          <div>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>프로젝트</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              <Chip on={!projId} onClick={()=>setProjId(null)}>없음</Chip>
              {data.projects.map(p=>(<Chip key={p.id} on={projId===p.id} color={p.color} onClick={()=>setProjId(p.id)}><span style={{width:7,height:7,borderRadius:4,background:p.color,display:'inline-block',marginRight:2}}/>{p.name}</Chip>))}
            </div>
          </div>
        )}
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>날짜</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[['today','오늘'],['tomorrow','내일'],['week','이번주'],['next','다음주']].map(([v,l])=>(<Chip key={v} on={when===v} onClick={()=>setWhen(v)}>{l}</Chip>))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>예상 시간</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[15,30,45,60,90,120].map(m=>(<Chip key={m} on={dur===m} onClick={()=>setDur(m)}>{m}m</Chip>))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>우선순위</div>
          <div style={{display:'flex',gap:8}}>
            {[[1,'P1 긴급','var(--danger)'],[2,'P2 보통','var(--warn)'],[3,'P3 낮음','var(--t3)']].map(([v,l,c])=>(<Chip key={v} on={pri===v} color={c} onClick={()=>setPri(v)}>{l}</Chip>))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>에너지 레벨</div>
          <div style={{display:'flex',gap:8}}>
            {[['high','🔴 High','var(--danger)'],['med','🟡 Med','var(--warn)'],['low','🟢 Low','var(--success)']].map(([v,l,c])=>(
              <Chip key={v} on={energy===v} color={c} onClick={()=>setEnergy(v)}>{l}</Chip>
            ))}
          </div>
        </div>
        {domain==='work'&&(
          <div>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>작업 유형</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <Chip on={type==='deepwork'} color="var(--purple)" onClick={()=>setType('deepwork')}>🧠 딥워크</Chip>
              <Chip on={type==='admin'} onClick={()=>setType('admin')}>📋 어드민</Chip>
              <Chip on={type==='call'} onClick={()=>setType('call')}>📞 콜</Chip>
              <Chip on={type==='errand'} onClick={()=>setType('errand')}>🚗 심부름</Chip>
            </div>
          </div>
        )}
      </div>
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   TASK DETAIL SHEET (dependency UI + notes + edit)
═══════════════════════════════════════════ */
function TaskDetailSheet({taskId,open,onClose}){
  const {data,updateTask,showToast}=useApp();
  const [query,setQuery]=useState('');
  const [editTitle,setEditTitle]=useState(false);
  const [titleVal,setTitleVal]=useState('');
  const today=todayStr();

  const task=useMemo(()=>data.tasks.find(t=>t.id===taskId&&!t.deletedAt),[data.tasks,taskId]);
  const graph=useMemo(()=>buildDepGraph(data.tasks),[data.tasks]);

  const prereqs=useMemo(()=>{
    if(!task)return[];
    const deps=parseDeps(task.notes);
    const byId=new Map(data.tasks.map(t=>[t.id,t]));
    return deps.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt);
  },[task,data.tasks]);

  const dependents=useMemo(()=>{
    if(!task)return[];
    const ids=graph.dependentsByTaskId.get(task.id)||[];
    const byId=new Map(data.tasks.map(t=>[t.id,t]));
    return ids.map(id=>byId.get(id)).filter(t=>t&&!t.deletedAt);
  },[task,graph,data.tasks]);

  const searchResults=useMemo(()=>{
    if(!query.trim()||!task)return[];
    const q=query.toLowerCase();
    return data.tasks.filter(t=>!t.deletedAt&&t.status!=='done'&&t.id!==task.id&&t.title.toLowerCase().includes(q)).slice(0,6);
  },[query,data.tasks,task]);

  function addPrereq(depId){
    if(!task)return;
    const cur=parseDeps(task.notes);
    if(cur.includes(depId)){showToast('이미 선행으로 설정됨');return;}
    const nextNotes=upsertDepsInNotes(task.notes,[...cur,depId]);
    updateTask(task.id,{notes:nextNotes});
    showToast('선행 추가됨','success');
    setQuery('');
  }
  function removePrereq(depId){
    if(!task)return;
    const cur=parseDeps(task.notes);
    updateTask(task.id,{notes:upsertDepsInNotes(task.notes,cur.filter(x=>x!==depId))});
    showToast('선행 제거됨');
  }
  function updateNotes(next){if(task)updateTask(task.id,{notes:next});}
  function saveTitle(){
    if(task&&titleVal.trim())updateTask(task.id,{title:titleVal.trim()});
    setEditTitle(false);
  }

  const bucket=task?bucketOf(task,today):'--';
  const energyColor=task?.energy==='high'?'var(--danger)':task?.energy==='med'?'var(--warn)':'var(--success)';

  return(
    <Sheet open={open&&!!task} onClose={onClose} title="Task Detail">
      {task&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Header */}
          <div style={{padding:'12px 14px',background:'var(--s2)',borderRadius:12}}>
            {editTitle?(
              <div style={{display:'flex',gap:8,marginBottom:6}}>
                <input value={titleVal} onChange={e=>setTitleVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape')setEditTitle(false);}}
                  autoFocus style={{flex:1,fontSize:16,fontWeight:700,padding:'4px 8px',borderRadius:8,background:'var(--s3)',border:'1px solid var(--b2)',color:'var(--t1)'}}/>
                <button onClick={saveTitle} className="press" style={{padding:'4px 12px',borderRadius:8,background:'var(--work)',border:'none',color:'#fff',fontSize:13,fontWeight:700}}>저장</button>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div style={{fontSize:16,fontWeight:700,flex:1}}>{task.title}</div>
                <button onClick={()=>{setTitleVal(task.title);setEditTitle(true);}} className="press" style={{width:28,height:28,borderRadius:14,background:'var(--s3)',border:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ic n="edit" s={13} c="var(--t3)"/>
                </button>
              </div>
            )}
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:task.domain==='work'?'var(--wlow)':'var(--plow)',color:task.domain==='work'?'var(--work)':'var(--personal)',fontWeight:700}}>{(task.domain||'inbox').toUpperCase()}</span>
              <span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:'var(--s3)',color:'var(--t2)',fontWeight:700}}>P{task.priority}</span>
              <span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:bucket==='A1'?'var(--a1low)':'var(--s3)',color:bucket==='A1'?'var(--a1c)':'var(--t2)',fontWeight:700}}>{bucket}</span>
              {task.type&&<span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:'var(--purplow)',color:'var(--purple)',fontWeight:700}}>{task.type}</span>}
              {task.durationMin&&<span className="mono" style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:'var(--s3)',color:'var(--t3)',fontWeight:700}}>{task.durationMin}m</span>}
              {task.energy&&<span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:'var(--s3)',color:energyColor,fontWeight:700}}>⚡{task.energy}</span>}
              {(task.deadlineDate||task.dueDate)&&<span style={{fontSize:11,padding:'2px 7px',borderRadius:5,background:'var(--s3)',color:'var(--t3)'}}>
                {task.deadlineDate?`deadline ${task.deadlineDate}`:task.dueDate?`due ${task.dueDate}`:''}
              </span>}
            </div>
          </div>

          {/* Inline field editors */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div style={{padding:'10px 12px',background:'var(--s2)',borderRadius:10}}>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:6,fontWeight:700,textTransform:'uppercase'}}>실행일</div>
              <input type="date" value={task.dueDate||''} onChange={e=>updateTask(task.id,{dueDate:e.target.value||null})}
                style={{width:'100%',fontSize:13,color:'var(--t1)',background:'transparent',border:'none',cursor:'pointer'}}/>
            </div>
            <div style={{padding:'10px 12px',background:'var(--s2)',borderRadius:10}}>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:6,fontWeight:700,textTransform:'uppercase'}}>마감일</div>
              <input type="date" value={task.deadlineDate||''} onChange={e=>updateTask(task.id,{deadlineDate:e.target.value||null})}
                style={{width:'100%',fontSize:13,color:'var(--t1)',background:'transparent',border:'none',cursor:'pointer'}}/>
            </div>
          </div>

          {/* Prerequisites */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <Ic n="link" s={14} c="var(--t3)"/>
                <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.1em'}}>선행 작업</div>
              </div>
              <span style={{fontSize:11,color:'var(--t3)'}}>{prereqs.length}개</span>
            </div>
            {prereqs.length===0&&(
              <div style={{fontSize:12,color:'var(--t3)',padding:'8px 12px',background:'var(--s2)',borderRadius:8}}>
                선행이 없으면 병목 점수가 낮아져요. 아래에서 추가하세요.
              </div>
            )}
            {prereqs.length>0&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
                {prereqs.map(p=>(
                  <div key={p.id} style={{display:'flex',alignItems:'center',gap:6,height:28,padding:'0 10px',borderRadius:999,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:12}}>
                    <span style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</span>
                    <button onPointerDown={e=>e.stopPropagation()} onClick={()=>removePrereq(p.id)} style={{width:16,height:16,borderRadius:8,background:'var(--s3)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <Ic n="x" s={9} c="var(--t3)"/>
                    </button>
                  </div>
                ))}
              </div>
            )}
            <input value={query} onChange={e=>setQuery(e.target.value)}
              placeholder="선행 작업 검색 (예: 계약, 등기)..."
              style={{width:'100%',padding:'10px 13px',borderRadius:10,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:14,color:'var(--t1)'}}
            />
            {query.trim()&&(
              <div style={{marginTop:6,display:'flex',flexDirection:'column',gap:4}}>
                {searchResults.length===0&&<div style={{fontSize:12,color:'var(--t3)',padding:'6px 10px'}}>검색 결과 없음</div>}
                {searchResults.map(t=>(
                  <button key={t.id} onClick={()=>addPrereq(t.id)} className="press" style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:'var(--s2)',border:'1px solid var(--b1)',textAlign:'left'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                      <div style={{fontSize:11,color:'var(--t3)'}}>{bucketOf(t,today)} · P{t.priority} · {t.type||'admin'}</div>
                    </div>
                    <Ic n="plus" s={16} c="var(--work)"/>
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Dependents */}
          {dependents.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:9}}>
                후행 작업 (나를 기다리는 {dependents.length}개)
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {dependents.slice(0,4).map(d=>(
                  <div key={d.id} style={{padding:'8px 12px',background:'var(--s2)',borderRadius:10,border:'1px solid var(--b1)'}}>
                    <div style={{fontSize:14}}>{d.title}</div>
                    <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>
                      {bucketOf(d,today)} · {d.deadlineDate?`deadline ${d.deadlineDate}`:d.dueDate?`due ${d.dueDate}`:'no date'}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Notes */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:9}}>Notes</div>
            <textarea value={task.notes||''} onChange={e=>updateNotes(e.target.value)}
              placeholder={'예시:\n선행: t1, t2\n- 메모\n- 링크'}
              style={{width:'100%',minHeight:100,padding:'12px 14px',borderRadius:12,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:14,color:'var(--t1)',resize:'vertical'}}
            />
            <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>팁: "선행: task_id" 형식으로 입력하거나 위 UI로 추가하세요.</div>
          </div>
        </div>
      )}
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   SCHEDULE SHEET v2 — ProposalInsightsCard + upsert
═══════════════════════════════════════════ */
function ScheduleSheet({open,onClose,taskId}){
  const {data,upsertBlocks,showToast}=useApp();
  const date=todayStr();
  const [scope,setScope]=useState('a1');

  const inputTasks=useMemo(()=>{
    const base=data.tasks;
    if(taskId)return base.filter(t=>t.id===taskId);
    if(scope==='a1')return base.filter(t=>!t.deletedAt&&t.status!=='done'&&t.domain==='work'&&bucketOf(t,date)==='A1');
    return base;
  },[data.tasks,taskId,scope,date]);

  const existingBlocks=useMemo(()=>data.timeBlocks.filter(b=>!b.deletedAt&&b.date===date),[data.timeBlocks,date]);

  const result=useMemo(()=>scheduleDayV2({
    date,tasks:inputTasks,events:data.events,existingBlocks,settings:data.settings
  }),[inputTasks,data.events,existingBlocks,data.settings,date]);

  function apply(){
    const now=Date.now();
    const blocks=[
      ...result.proposedBlocks.map(b=>({date:b.date,startTime:b.startTime,endTime:b.endTime,title:b.title,domain:b.domain,linkedTaskId:b.taskId,createdAt:now,updatedAt:now})),
      ...result.movedBlocks.map(b=>({...b,updatedAt:now})),
    ];
    upsertBlocks(blocks);
    showToast(`${result.proposedBlocks.length}개 타임블록 생성 · ${result.movedBlocks.length}개 재배치됨`,'success');
    onClose();
  }

  const ins=result.insights;
  const fh=Math.floor(result.diagnostics.freeMinutes/60);
  const fm=result.diagnostics.freeMinutes%60;

  return(
    <Sheet open={open} onClose={onClose} title={taskId?'단일 태스크 배치':'스마트 자동 배치'}
      footer={
        <div style={{display:'flex',gap:10}}>
          <GhostBtn onClick={onClose}>취소</GhostBtn>
          <PrimaryBtn onClick={apply} disabled={result.proposedBlocks.length===0}>✓ Apply</PrimaryBtn>
        </div>
      }
    >
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {!taskId&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <button onClick={()=>setScope('a1')} className="press" style={{height:38,borderRadius:10,border:`1px solid ${scope==='a1'?'var(--work)':'var(--b1)'}`,background:scope==='a1'?'var(--wlow)':'transparent',color:scope==='a1'?'var(--work)':'var(--t2)',fontWeight:600,fontSize:13}}>A1 only</button>
            <button onClick={()=>setScope('all')} className="press" style={{height:38,borderRadius:10,border:`1px solid ${scope==='all'?'var(--work)':'var(--b1)'}`,background:scope==='all'?'var(--wlow)':'transparent',color:scope==='all'?'var(--work)':'var(--t2)',fontWeight:600,fontSize:13}}>All tasks</button>
          </div>
        )}

        <Card style={{background:'var(--s2)'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {[
              [result.proposedBlocks.length,'배치','var(--work)'],
              [`${fh}h${fm>0?fm+'m':''}`, '여유','var(--personal)'],
              [result.deferred.length,'연기','var(--warn)'],
              [Math.round(result.diagnostics.utilization*100)+'%','활용률','var(--t1)'],
            ].map(([v,l,c])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div className="mono" style={{fontSize:20,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:10,color:'var(--t3)',marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
        </Card>

        <Card style={{background:'var(--s2)'}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Why this schedule</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[
              ['shield',`딥워크 보호: ${ins.protectedDeepWorkMin}분`,'var(--purple)'],
              ['calendar',`미팅 압박 회피: ${ins.avoidedMeetingMin}분`,'var(--personal)'],
              ['sparkle',`충돌 해결: ${ins.conflictsResolved}건`,'var(--work)'],
              ['clock',`재배치: ${ins.movedBlocksCount}개 · 연기: ${ins.deferredCount}개`,'var(--warn)'],
            ].map(([icon,label,c])=>(
              <div key={label} style={{display:'flex',alignItems:'center',gap:10}}>
                <Ic n={icon} s={14} c={c}/>
                <div style={{fontSize:13,color:'var(--t2)'}}>{label}</div>
              </div>
            ))}
          </div>
        </Card>

        {result.proposedBlocks.length>0&&(
          <div>
            <SecLabel>제안된 타임블록</SecLabel>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {result.proposedBlocks.map((b,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 13px',background:'var(--s2)',borderRadius:11,border:'1px solid var(--b1)',borderLeft:`3px solid ${b.domain==='personal'?'var(--personal)':'var(--work)'}`}}>
                  <div style={{flexShrink:0,textAlign:'right',width:48}}>
                    <div className="mono" style={{fontSize:11,color:'var(--t3)'}}>{b.startTime}</div>
                    <div className="mono" style={{fontSize:11,color:'var(--t3)',opacity:0.6}}>{b.endTime}</div>
                  </div>
                  <div style={{flex:1,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.title}</div>
                  <span className="mono" style={{fontSize:10,padding:'3px 7px',borderRadius:5,background:'var(--wlow)',color:'var(--work)',fontWeight:700}}>
                    {toMin(b.endTime)-toMin(b.startTime)}m
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}

        {result.movedBlocks.length>0&&(
          <div>
            <SecLabel>재배치된 블록</SecLabel>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {result.movedBlocks.map((b,i)=>(
                <div key={i} style={{fontSize:13,color:'var(--t3)',padding:'7px 11px',background:'var(--s2)',borderRadius:8,border:'1px solid var(--b1)'}}>
                  ↻ {b.title} → {b.startTime}–{b.endTime}
                </div>
              ))}
            </div>
          </div>
        )}

        {result.proposedBlocks.length===0&&(
          <div style={{textAlign:'center',padding:32,color:'var(--t3)'}}>
            <div style={{fontSize:32,marginBottom:10}}>😔</div>
            배치 가능한 빈 슬롯이 없거나 대상 태스크가 없습니다
          </div>
        )}

        {result.deferred.length>0&&(
          <div>
            <SecLabel>연기된 태스크</SecLabel>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {result.deferred.map(d=>{
                const t=data.tasks.find(x=>x.id===d.taskId);
                return t?(
                  <div key={d.taskId} style={{fontSize:13,color:'var(--t3)',padding:'6px 10px',borderRadius:8,background:'var(--s2)'}}>
                    • {t.title} <span style={{fontSize:11,color:'var(--warn)'}}>({d.reason==='no_contiguous_slot'?'연속 슬롯 없음':'빈 슬롯 없음'})</span>
                  </div>
                ):null;
              })}
            </div>
          </div>
        )}
      </div>
    </Sheet>
  );
}

/* ═══════════════════════════════════════════
   ADD EVENT SHEET (신규)
═══════════════════════════════════════════ */
function AddEventSheet({open,onClose,defaultDate}){
  const {addEvent,showToast}=useApp();
  const [title,setTitle]=useState('');
  const [date,setDate]=useState(defaultDate||todayStr());
  const [startTime,setStartTime]=useState('10:00');
  const [endTime,setEndTime]=useState('11:00');
  const [domain,setDomain]=useState('work');
  const ref=useRef();
  useEffect(()=>{if(open){setTitle('');setDate(defaultDate||todayStr());setStartTime('10:00');setEndTime('11:00');setTimeout(()=>ref.current?.focus(),120);}},[open,defaultDate]);
  function save(){
    if(!title.trim())return;
    addEvent({title:title.trim(),domain,startDateTime:`${date}T${startTime}:00`,endDateTime:`${date}T${endTime}:00`});
    showToast('일정 추가됨','success');
    onClose();
  }
  return(
    <Sheet open={open} onClose={onClose} title="일정 추가"
      footer={<div style={{display:'flex',gap:10}}><GhostBtn onClick={onClose}>취소</GhostBtn><PrimaryBtn onClick={save}>저장</PrimaryBtn></div>}
    >
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <input ref={ref} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}
          placeholder="일정 제목..."
          style={{width:'100%',padding:'13px 15px',borderRadius:12,background:'var(--s2)',border:'1px solid var(--b2)',fontSize:16,color:'var(--t1)'}}
        />
        <div>
