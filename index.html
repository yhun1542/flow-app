          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="금액" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:12,padding:'14px 16px',color:'var(--t1)',fontSize:22,fontWeight:700,width:'100%',marginBottom:14}} onKeyDown={e=>e.key==='Enter'&&submitExpense()}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:14}}>
            {EXPENSE_CATEGORIES.map(c=>(
              <button key={c} onClick={()=>setCategory(c)} style={{padding:'10px 4px',borderRadius:10,border:`1.5px solid ${category===c?'var(--budget)':'var(--b2)'}`,background:category===c?'var(--budgetlow)':'var(--s2)',color:category===c?'var(--budget)':'var(--t2)',fontWeight:600,fontSize:12,cursor:'pointer'}}>{c}</button>
            ))}
          </div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="메모 (선택)" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:14}} onKeyDown={e=>e.key==='Enter'&&submitExpense()}/>
          <button onClick={submitExpense} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'var(--budget)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>기록하기</button>
        </div>
      </Sheet>
    </div>
  );
}

/* ═══════════════════════════════════════════
   HABITS PAGE
═══════════════════════════════════════════ */
function HabitsPage(){
  const {data,toggleHabitLog,addHabit,deleteHabit,showToast}=useApp();
  const today=todayStr();
  const [showAdd,setShowAdd]=useState(false);
  const [habitName,setHabitName]=useState('');
  const [habitIcon,setHabitIcon]=useState('⭐');
  const ICONS=['⭐','🏃','📚','💧','🧘','🎯','💪','🎵','✍️','🌱'];

  function computeStreak(habitId){
    let streak=0;let d=today;
    while(true){
      const key=`${habitId}::${d}`;
      if(data.habitLogs.find(l=>l.key===key)){streak++;d=addDays(d,-1);}
      else break;
      if(streak>365)break;
    }
    return streak;
  }

  function submitHabit(){
    if(!habitName.trim())return;
    addHabit({name:habitName,icon:habitIcon,frequency:'daily'});
    setHabitName('');setShowAdd(false);
    showToast('습관 추가됨','success');
  }

  const weekDays=Array.from({length:7},(_,i)=>addDays(today,-6+i));

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>습관</div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--success)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ 추가</button>
      </div>

      {/* Week header */}
      <div style={{display:'grid',gridTemplateColumns:`1fr repeat(7,32px)`,gap:4,marginBottom:8,alignItems:'center'}}>
        <div/>
        {weekDays.map(d=>{
          const f=fmt(d);
          const isToday=d===today;
          return <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:isToday?700:400,color:isToday?'var(--work)':'var(--t3)'}}>{f.d}<br/>{f.day}</div>;
        })}
      </div>

      {data.habits.map(h=>{
        const streak=computeStreak(h.id);
        const todayDone=!!data.habitLogs.find(l=>l.key===`${h.id}::${today}`);
        return(
          <div key={h.id} style={{background:'var(--s1)',borderRadius:14,padding:'12px 14px',marginBottom:8,border:'1px solid var(--b1)'}}>
            <div style={{display:'grid',gridTemplateColumns:`1fr repeat(7,32px)`,gap:4,alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:20}}>{h.icon}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{h.name}</div>
                  {streak>0&&<div style={{fontSize:11,color:'var(--warn)'}}>🔥 {streak}일 연속</div>}
                </div>
              </div>
              {weekDays.map(d=>{
                const done=!!data.habitLogs.find(l=>l.key===`${h.id}::${d}`);
                const isToday=d===today;
                return(
                  <button key={d} onClick={()=>toggleHabitLog(h.id,d)} style={{
                    width:32,height:32,borderRadius:16,border:`2px solid ${done?'var(--success)':'var(--s3)'}`,
                    background:done?'var(--success)':'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                    outline:isToday?`2px solid var(--work)`:none,outlineOffset:1,
                  }}>
                    {done&&<span style={{color:'#fff',fontSize:12,fontWeight:800}}>✓</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {data.habits.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--t3)'}}>
          <div style={{fontSize:40,marginBottom:12}}>🌱</div>
          <div style={{fontSize:15,fontWeight:600}}>습관을 추가해보세요</div>
        </div>
      )}

      <Sheet open={showAdd} onClose={()=>setShowAdd(false)} title="습관 추가">
        <div style={{paddingTop:12}}>
          <input value={habitName} onChange={e=>setHabitName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitHabit()} placeholder="습관 이름" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:15,width:'100%',marginBottom:14}}/>
          <div style={{fontSize:12,fontWeight:600,color:'var(--t2)',marginBottom:8}}>아이콘</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setHabitIcon(ic)} style={{width:44,height:44,borderRadius:12,border:`2px solid ${habitIcon===ic?'var(--work)':'var(--b2)'}`,background:habitIcon===ic?'var(--wlow)':'var(--s2)',fontSize:22,cursor:'pointer'}}>{ic}</button>
            ))}
          </div>
          <button onClick={submitHabit} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'var(--success)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>추가하기</button>
        </div>
      </Sheet>
    </div>
  );
}

/* ═══════════════════════════════════════════
   NOTES PAGE (Brain Notes)
═══════════════════════════════════════════ */
function NotesPage(){
  const {data,addNote,deleteNote}=useApp();
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [noteTitle,setNoteTitle]=useState('');
  const [noteBody,setNoteBody]=useState('');
  const [noteTags,setNoteTags]=useState('');
  const [selectedNote,setSelectedNote]=useState(null);

  const filtered=data.notes.filter(n=>{
    if(!search)return true;
    const q=search.toLowerCase();
    return n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q));
  });

  function submitNote(){
    if(!noteTitle.trim())return;
    addNote({title:noteTitle,body:noteBody,tags:noteTags.split(',').map(t=>t.trim()).filter(Boolean),authorId:data.settings.currentUserId});
    setNoteTitle('');setNoteBody('');setNoteTags('');setShowAdd(false);
  }

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--t1)'}}>노트</div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'var(--purple)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ 노트</button>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="제목, 내용, 태그 검색..." style={{background:'var(--s1)',border:'1px solid var(--b2)',borderRadius:12,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:16}}/>
      {filtered.map(n=>(
        <div key={n.id} className="press" onClick={()=>setSelectedNote(n)} style={{background:'var(--s1)',borderRadius:14,padding:'14px',marginBottom:8,border:'1px solid var(--b1)',cursor:'pointer'}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--t1)',marginBottom:4}}>{n.title}</div>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.body}</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {(n.tags||[]).map(tag=>(
              <span key={tag} style={{fontSize:10,background:'var(--purplow)',color:'var(--purple)',borderRadius:4,padding:'2px 6px',fontWeight:600}}>#{tag}</span>
            ))}
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:'var(--t3)'}}>
        <div style={{fontSize:40,marginBottom:12}}>📝</div>
        <div style={{fontSize:15}}>노트가 없어요</div>
      </div>}

      <Sheet open={showAdd} onClose={()=>setShowAdd(false)} title="노트 작성" height="90vh">
        <div style={{paddingTop:12}}>
          <input value={noteTitle} onChange={e=>setNoteTitle(e.target.value)} placeholder="제목" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:16,fontWeight:700,width:'100%',marginBottom:10}}/>
          <textarea value={noteBody} onChange={e=>setNoteBody(e.target.value)} placeholder="내용을 입력하세요..." style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'12px 14px',color:'var(--t1)',fontSize:14,width:'100%',minHeight:200,resize:'vertical',marginBottom:10}}/>
          <input value={noteTags} onChange={e=>setNoteTags(e.target.value)} placeholder="태그 (쉼표로 구분)" style={{background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginBottom:16}}/>
          <button onClick={submitNote} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'var(--purple)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>저장</button>
        </div>
      </Sheet>

      <Sheet open={!!selectedNote} onClose={()=>setSelectedNote(null)} title={selectedNote?.title||''} height="80vh">
        {selectedNote&&(
          <div style={{paddingTop:12}}>
            <div style={{fontSize:14,color:'var(--t1)',lineHeight:1.7,whiteSpace:'pre-wrap',marginBottom:16}}>{selectedNote.body}</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:16}}>
              {(selectedNote.tags||[]).map(tag=>(
                <span key={tag} style={{fontSize:11,background:'var(--purplow)',color:'var(--purple)',borderRadius:4,padding:'2px 8px',fontWeight:600}}>#{tag}</span>
              ))}
            </div>
            <button onClick={()=>{deleteNote(selectedNote.id);setSelectedNote(null);}} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--dlow)',color:'var(--danger)',fontWeight:700,fontSize:14,cursor:'pointer'}}>삭제</button>
          </div>
        )}
      </Sheet>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SETTINGS PAGE
═══════════════════════════════════════════ */
function SettingsPage(){
  const {data,updateSettings,addProject,deleteProject,resetData,showToast}=useApp();
  const s=data.settings;
  const [projName,setProjName]=useState('');
  const [projColor,setProjColor]=useState('#4F8EF7');
  const [showReset,setShowReset]=useState(false);

  const fieldStyle={background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14,width:'100%',marginTop:6};
  const labelStyle={fontSize:12,fontWeight:600,color:'var(--t2)',marginTop:14,display:'block'};
  const sectionTitle={fontSize:13,fontWeight:800,color:'var(--t2)',letterSpacing:0.5,marginTop:24,marginBottom:12,textTransform:'uppercase'};

  // Stats
  const tasks=data.tasks.filter(t=>!t.deletedAt);
  const done=tasks.filter(t=>t.status==='done').length;
  const total=tasks.length;
  const deepMin=tasks.filter(t=>t.type==='deepwork'&&t.status==='done').reduce((s,t)=>s+(t.durationMin||0),0);
  const habitStreak=data.habits.length>0?Math.max(...data.habits.map(h=>{
    let streak=0;let d=todayStr();
    while(data.habitLogs.find(l=>l.key===`${h.id}::${d}`)){streak++;d=addDays(d,-1);if(streak>365)break;}
    return streak;
  })):0;

  return(
    <div className="scroll" style={{flex:1,padding:'16px 16px 80px'}}>
      <div style={{fontSize:22,fontWeight:900,color:'var(--t1)',marginBottom:20}}>설정</div>

      {/* Stats dashboard */}
      <div style={sectionTitle}>📊 통계</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:8}}>
        {[
          ['완료 태스크',`${done}/${total}`,'var(--success)'],
          ['딥워크',`${deepMin}분`,'var(--purple)'],
          ['습관 스트릭',`${habitStreak}일 🔥`,'var(--warn)'],
          ['프로젝트',`${data.projects.length}개`,'var(--work)'],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:'var(--s1)',borderRadius:14,padding:'14px',border:'1px solid var(--b1)'}}>
            <div style={{fontSize:11,color:'var(--t3)'}}>{l}</div>
            <div style={{fontSize:20,fontWeight:800,color:c,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Theme */}
      <div style={sectionTitle}>🎨 테마</div>
      <div style={{display:'flex',gap:8}}>
        {[['dark','🌙 다크'],['light','☀️ 라이트']].map(([v,l])=>(
          <button key={v} onClick={()=>updateSettings({theme:v})} style={{flex:1,padding:'12px',borderRadius:12,border:`2px solid ${s.theme===v?'var(--work)':'var(--b2)'}`,background:s.theme===v?'var(--wlow)':'var(--s2)',color:s.theme===v?'var(--work)':'var(--t2)',fontWeight:700,fontSize:14,cursor:'pointer'}}>{l}</button>
        ))}
      </div>

      {/* Current user (role switch) */}
      <div style={sectionTitle}>👤 사용자 전환</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {data.familyMembers.map(m=>(
          <button key={m.id} onClick={()=>updateSettings({currentUserId:m.id})} style={{padding:'8px 14px',borderRadius:10,border:`2px solid ${s.currentUserId===m.id?m.color:'var(--b2)'}`,background:s.currentUserId===m.id?m.color+'22':'var(--s2)',color:s.currentUserId===m.id?m.color:'var(--t2)',fontWeight:600,fontSize:13,cursor:'pointer'}}>
            {m.avatar} {m.name}
          </button>
        ))}
      </div>

      {/* Work settings */}
      <div style={sectionTitle}>⏰ 업무 시간</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div><label style={labelStyle}>시작</label><input type="time" value={s.workdayStart} onChange={e=>updateSettings({workdayStart:e.target.value})} style={fieldStyle}/></div>
        <div><label style={labelStyle}>종료</label><input type="time" value={s.workdayEnd} onChange={e=>updateSettings({workdayEnd:e.target.value})} style={fieldStyle}/></div>
        <div><label style={labelStyle}>점심 시작</label><input type="time" value={s.lunchStart} onChange={e=>updateSettings({lunchStart:e.target.value})} style={fieldStyle}/></div>
        <div><label style={labelStyle}>점심 종료</label><input type="time" value={s.lunchEnd} onChange={e=>updateSettings({lunchEnd:e.target.value})} style={fieldStyle}/></div>
      </div>

      {/* Deep work windows */}
      <div style={sectionTitle}>🧠 딥워크 윈도우</div>
      {(s.deepWorkWindows||[]).map((w,i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,marginBottom:8,alignItems:'end'}}>
          <div><label style={labelStyle}>시작</label><input type="time" value={w.start} onChange={e=>{const dw=[...s.deepWorkWindows];dw[i]={...dw[i],start:e.target.value};updateSettings({deepWorkWindows:dw});}} style={fieldStyle}/></div>
          <div><label style={labelStyle}>종료</label><input type="time" value={w.end} onChange={e=>{const dw=[...s.deepWorkWindows];dw[i]={...dw[i],end:e.target.value};updateSettings({deepWorkWindows:dw});}} style={fieldStyle}/></div>
          <button onClick={()=>{const dw=s.deepWorkWindows.filter((_,j)=>j!==i);updateSettings({deepWorkWindows:dw});}} style={{padding:'10px 12px',borderRadius:10,border:'none',background:'var(--dlow)',color:'var(--danger)',cursor:'pointer',marginTop:20}}>✕</button>
        </div>
      ))}
      <button onClick={()=>updateSettings({deepWorkWindows:[...(s.deepWorkWindows||[]),{start:'10:00',end:'12:00'}]})} style={{padding:'8px 14px',borderRadius:10,border:'1px dashed var(--b2)',background:'transparent',color:'var(--t3)',fontSize:13,cursor:'pointer'}}>+ 윈도우 추가</button>

      {/* Projects */}
      <div style={sectionTitle}>📁 프로젝트</div>
      {data.projects.map(p=>(
        <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--s1)',borderRadius:12,marginBottom:6,border:'1px solid var(--b1)'}}>
          <span style={{width:12,height:12,borderRadius:6,background:p.color,display:'inline-block'}}/>
          <span style={{flex:1,fontSize:14,color:'var(--t1)'}}>{p.name}</span>
          <button onClick={()=>deleteProject(p.id)} style={{padding:'4px 10px',borderRadius:8,border:'none',background:'var(--dlow)',color:'var(--danger)',fontSize:12,cursor:'pointer'}}>삭제</button>
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <input value={projName} onChange={e=>setProjName(e.target.value)} placeholder="프로젝트 이름" style={{flex:1,background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:10,padding:'10px 14px',color:'var(--t1)',fontSize:14}}/>
        <input type="color" value={projColor} onChange={e=>setProjColor(e.target.value)} style={{width:44,height:44,borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',cursor:'pointer',padding:4}}/>
        <button onClick={()=>{if(projName.trim()){addProject({name:projName,color:projColor});setProjName('');}}} style={{padding:'10px 14px',borderRadius:10,border:'none',background:'var(--work)',color:'#fff',fontWeight:700,cursor:'pointer'}}>추가</button>
      </div>

      {/* Danger zone */}
      <div style={{...sectionTitle,color:'var(--danger)'}}>⚠️ 위험 구역</div>
      {!showReset?(
        <button onClick={()=>setShowReset(true)} style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid var(--danger)',background:'var(--dlow)',color:'var(--danger)',fontWeight:700,fontSize:14,cursor:'pointer'}}>데이터 초기화</button>
      ):(
        <div style={{background:'var(--dlow)',borderRadius:12,padding:'16px',border:'1.5px solid var(--danger)'}}>
          <div style={{fontSize:14,color:'var(--danger)',fontWeight:700,marginBottom:12}}>정말 초기화하시겠습니까? 모든 데이터가 삭제됩니다.</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowReset(false)} style={{flex:1,padding:'10px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontWeight:600,cursor:'pointer'}}>취소</button>
            <button onClick={()=>{resetData();setShowReset(false);}} style={{flex:1,padding:'10px',borderRadius:10,border:'none',background:'var(--danger)',color:'#fff',fontWeight:700,cursor:'pointer'}}>초기화</button>
          </div>
        </div>
      )}

      <div style={{textAlign:'center',marginTop:32,color:'var(--t3)',fontSize:12}}>FLOW v7 · localStorage 자동 저장</div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   FAB (Floating Action Button)
═══════════════════════════════════════════ */
function FAB({onShortPress,onLongPress}){
  const timerRef=useRef(null);
  const [pressing,setPressing]=useState(false);

  function handleStart(e){
    e.preventDefault();
    setPressing(true);
    timerRef.current=setTimeout(()=>{
      setPressing(false);
      onLongPress&&onLongPress();
    },500);
  }

  function handleEnd(e){
    e.preventDefault();
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    if(pressing){
      setPressing(false);
      onShortPress&&onShortPress();
    }
  }

  return(
    <button
      onPointerDown={handleStart}
      onPointerUp={handleEnd}
      onPointerCancel={()=>{clearTimeout(timerRef.current);setPressing(false);}}
      style={{
        position:'fixed',right:20,bottom:90,width:56,height:56,borderRadius:28,
        border:'none',background:'var(--work)',color:'#fff',fontSize:26,
        display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 4px 20px rgba(79,142,247,0.4)',cursor:'pointer',
        transform:pressing?'scale(0.92)':'scale(1)',transition:'transform 0.1s',
        zIndex:100,
      }}
    >+</button>
  );
}
